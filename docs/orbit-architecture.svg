    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0D1526"/>
      <stop offset="1" stop-color="#0B111F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
