  <rect x="0.5" y="0.5" width="919" height="811" rx="13.5" fill="none" stroke="#1E2A44"/>

  <!-- Signature: faint orbital arcs (nod to the ORBIT name) -->
  <g fill="none" stroke="#1A2541" stroke-width="1">
