<svg viewBox="0 0 920 812" width="920" height="812" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="ORBIT system architecture: client interfaces, core gateway, retrieval and skills layer, and LLM inference backends">
