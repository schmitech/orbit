services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Ollama - LLM inference server
  # ═══════════════════════════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    pull_policy: always
    container_name: orbit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # Ollama Init - One-shot model puller
  # ═══════════════════════════════════════════════════════════════════════════
  ollama-init:
    image: ollama/ollama:latest
    container_name: orbit-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Host:port only; docker-entrypoint.sh adds http:// when building URLs.
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling models..."
        # smollm2 is the Ollama tag used by ORBIT's smollm2-1.7b-cpu/gpu presets.
        ollama pull smollm2
        ollama pull nomic-embed-text:latest
        echo "Models pulled successfully."
    restart: "no"

  # ═══════════════════════════════════════════════════════════════════════════
  # ORBIT - API server
  # ═══════════════════════════════════════════════════════════════════════════
  orbit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orbit-server
    ports:
      - "${ORBIT_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      # Host:port only; docker-entrypoint.sh adds http:// when building URLs.
      - OLLAMA_HOST=ollama:11434
      - ORBIT_PRESET=auto
      - ENVIRONMENT=production
      # This image includes install/orbit.db.default for first-run convenience.
      # Rotate the default API key/admin password before exposing this service.
    volumes:
      - orbit-data:/orbit/data
      - orbit-logs:/orbit/logs
    restart: unless-stopped

volumes:
  ollama-data:
  orbit-data:
  orbit-logs:
