<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            color-scheme: dark;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.9);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --danger-bg: rgba(244, 63, 94, 0.12);
            --danger-border: rgba(244, 63, 94, 0.3);
            --danger-text: #fecdd3;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 32%),
                radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.18), transparent 28%),
                linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: var(--text);
        }
        .login-shell {
            width: min(100%, 420px);
            padding: 32px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: 0 30px 80px -48px rgba(14, 165, 233, 0.45);
            backdrop-filter: blur(16px);
        }
        h1 {
            margin: 0 0 24px;
            font-size: 2rem;
            line-height: 1.1;
            text-align: center;
        }
        .login-alert {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 14px;
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-text);
            font-size: 0.92rem;
        }
        form {
            display: grid;
            gap: 16px;
        }
        label {
            display: grid;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text);
        }
        input {
            width: 100%;
            min-height: 48px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            padding: 0 14px;
            font: inherit;
        }
        input:focus {
            outline: 2px solid rgba(56, 189, 248, 0.8);
            outline-offset: 2px;
            border-color: rgba(56, 189, 248, 0.42);
        }
        .password-field {
            position: relative;
        }
        .password-field input {
            padding-right: 52px;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }
        .password-toggle:hover {
            color: var(--text);
            background: rgba(148, 163, 184, 0.08);
        }
        .password-toggle:focus-visible {
            outline: 2px solid rgba(56, 189, 248, 0.85);
            outline-offset: 2px;
        }
        button {
            min-height: 50px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: #082f49;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            filter: brightness(1.05);
        }
        button:focus-visible {
            outline: 2px solid rgba(56, 189, 248, 0.85);
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <h1>Sign in to ORBIT</h1>
        {{ERROR_BLOCK}}
        <form method="post" action="/admin/login">
            <input type="hidden" name="next" value="{{NEXT_PATH}}">
            <label for="username">
                Username
                <input id="username" name="username" type="text" autocomplete="username" maxlength="100" required>
            </label>
            <label for="password">
                Password
                <span class="password-field">
                    <input id="password" name="password" type="password" autocomplete="current-password" maxlength="100" required>
                    <button
                        id="password-toggle"
                        class="password-toggle"
                        type="button"
                        aria-label="Show password"
                        aria-pressed="false"
                        title="Show password"
                    >
                        <svg id="password-toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </span>
            </label>
            <button type="submit">Sign In</button>
        </form>
    </main>
    <script>
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('password-toggle');
        const passwordToggleIcon = document.getElementById('password-toggle-icon');

        if (passwordInput && passwordToggle && passwordToggleIcon) {
            passwordToggle.addEventListener('click', () => {
                const showingPassword = passwordInput.type === 'text';
                passwordInput.type = showingPassword ? 'password' : 'text';
                passwordToggle.setAttribute('aria-pressed', String(!showingPassword));
                passwordToggle.setAttribute('aria-label', showingPassword ? 'Show password' : 'Hide password');
                passwordToggle.title = showingPassword ? 'Show password' : 'Hide password';
                passwordToggleIcon.innerHTML = showingPassword
                    ? '<path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path><circle cx="12" cy="12" r="3"></circle>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"></path><path stroke-linecap="round" stroke-linejoin="round" d="M10.585 10.586A2 2 0 0013.414 13.415"></path><path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A9.77 9.77 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.784 9.784 0 01-4.132 5.145M6.228 6.228A9.776 9.776 0 002.458 12C3.732 16.057 7.523 19 12 19a9.77 9.77 0 004.09-.88"></path>';
            });
        }
    </script>
</body>
</html>
