# MCP Client Configuration
#
# ORBIT can connect outward to external MCP servers, discover their tools,
# and let the LLM call them in a multi-step agentic loop.
#
# Each server entry supports two transports:
#   stdio  — spawns a local subprocess (e.g. via npx, uvx, python -m …)
#   sse    — connects to a remote SSE endpoint
#
# Secrets should be supplied via environment variables using ${VAR} syntax.
# They are expanded at runtime and never written to logs.
#
# This file provides examples; edit to match your environment.
# Enable it by setting enabled: true and adding the import to config.yaml:
#
#   import:
#     - "mcp_client.yaml"
#
# Then add "mcp-agent" to a consumer adapter's available_skills list and
# register config/adapters/mcp-agent.yaml in config/adapters.yaml.

mcp_client:
  enabled: false                     # Set to false to disable MCP tool calling

  tool_timeout: 30                  # Seconds before a tool call is aborted
  max_tool_iterations: 5            # Maximum tool-calling rounds per request
  tool_result_max_chars: 8000       # Cap on result text injected into model context (prevents context overflow)

  servers:
    # ── Filesystem MCP server (stdio, read-only local files) ─────────────
    # - name: "filesystem"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/orbit/docs"]
    #   enabled: true
    
    # ── Streamable HTTP server example ───────────────────────────────────
    #
    # First, set MCP_TOKEN in .env then run the test server: 
    #
    # python server/tests/test_services/mcp_http_test_server.py --port 9999 --token test-secret
    # 
    # - name: "test-server"
    #   transport: "http"
    #   url: "http://127.0.0.1:9999/mcp"
    #   token: "${MCP_TOKEN}"
    #   enabled: true

    # ════════════════════════════════════════════════════════════════════════
    # DEVELOPER WORKFLOW
    # ════════════════════════════════════════════════════════════════════════

    # ── GitHub (stdio) ────────────────────────────────────────────────────
    # Search repos, issues, PRs, commits, file contents, code.
    # Docs: https://github.com/modelcontextprotocol/servers/tree/main/src/github
    # - name: "github"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-github"]
    #   env:
    #     GITHUB_TOKEN: "${GITHUB_TOKEN}"
    #   enabled: false

    # ── GitLab (stdio) ────────────────────────────────────────────────────
    # Search repos, issues, MRs, pipelines on GitLab.com or self-hosted.
    # Docs: https://github.com/modelcontextprotocol/servers/tree/main/src/gitlab
    # - name: "gitlab"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-gitlab"]
    #   env:
    #     GITLAB_PERSONAL_ACCESS_TOKEN: "${GITLAB_TOKEN}"
    #     GITLAB_API_URL: "https://gitlab.com/api/v4"   # override for self-hosted
    #   enabled: false

    # ── Jira + Confluence / Atlassian (stdio) ─────────────────────────────
    # Search and manage Jira issues, Confluence pages and spaces.
    # Docs: https://github.com/sooperset/mcp-atlassian
    # - name: "atlassian"
    #   transport: "stdio"
    #   command: "uvx"
    #   args: ["mcp-atlassian"]
    #   env:
    #     JIRA_URL: "https://yourorg.atlassian.net"
    #     JIRA_USERNAME: "${ATLASSIAN_EMAIL}"
    #     JIRA_API_TOKEN: "${ATLASSIAN_API_TOKEN}"
    #     CONFLUENCE_URL: "https://yourorg.atlassian.net/wiki"
    #     CONFLUENCE_USERNAME: "${ATLASSIAN_EMAIL}"
    #     CONFLUENCE_API_TOKEN: "${ATLASSIAN_API_TOKEN}"
    #   enabled: false

    # ── Sentry (stdio) ────────────────────────────────────────────────────
    # Retrieve and analyse error events, issues, and stack traces from Sentry.
    # Docs: https://github.com/modelcontextprotocol/servers/tree/main/src/sentry
    # - name: "sentry"
    #   transport: "stdio"
    #   command: "uvx"
    #   args: ["mcp-server-sentry", "--auth-token", "${SENTRY_AUTH_TOKEN}"]
    #   enabled: false

    # ════════════════════════════════════════════════════════════════════════
    # COMMUNICATION
    # ════════════════════════════════════════════════════════════════════════

    # ── Slack (stdio) ─────────────────────────────────────────────────────
    # Read channels, post messages, search conversations.
    # Requires a Slack app with channels:read, chat:write, search:read scopes.
    # Docs: https://github.com/modelcontextprotocol/servers/tree/main/src/slack
    # - name: "slack"
