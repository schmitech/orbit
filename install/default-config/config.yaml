# Split configuration: each file below is merged into this one at load time.
# Provider/service definitions live in these modules (inference, embeddings,
# vision, voice, stores, ...); this file holds the server-wide settings.
import:
  - "ollama.yaml"
  - "llama_cpp.yaml"
  - "adapters.yaml"
  - "inference.yaml"
  - "datasources.yaml"
  - "embeddings.yaml"
  - "rerankers.yaml"
  - "stores.yaml"
  - "moderators.yaml"
  - "guardrails.yaml"
  - "vision.yaml"
  - "ocr.yaml"
  - "image.yaml"
  - "video.yaml"
  - "document.yaml"
  - "tts.yaml"
  - "stt.yaml"
  - "mcp_client.yaml"
  - "rewriters-prompts.yaml"

# Core server settings: the HTTP(S) listener, session identification, and the
# default LLM provider used whenever an adapter doesn't specify its own.
general:
  port: 3000                        # HTTP port the API server listens on
  # Optional: add `verbose: true` here for extra per-request diagnostic logging
  # (language detection, routing decisions, etc.). Defaults to false.
  https:
    enabled: false                  # Serve over TLS using the cert/key below
    port: 3443
    cert_file: "./cert.pem"
    key_file: "./key.pem"
    key_password: ${ORBIT_TLS_KEY_PASSWORD}  # optional: passphrase for encrypted private key
  session_id:
    header_name: "X-Session-ID"     # HTTP header carrying the conversation/session id
    required: true                  # Reject requests that omit the session header
  inference_provider: "ollama"      # Default provider (a key from inference.yaml) when an adapter sets none

# Detects the language of each user message with an ensemble of local libraries
# (weighted voting plus script/heuristic checks). Used to keep replies in the
# user's language and to bias RAG retrieval toward same-language documents.
# Runs fully in-process — no network calls.
language_detection:
  enabled: true
  # Detection libraries to combine (installed via the language-detection profile).
  backends:
    - "langdetect"
    - "langid"
    - "pycld2"
  # Relative trust of each backend when combining votes (higher = more influence).
  backend_weights:
    langdetect: 1.0
    langid: 1.2
    pycld2: 1.5
  min_confidence: 0.7               # Min confidence for the winning language; below -> fallback_language
  min_margin: 0.2                   # Min lead over the runner-up; below -> fallback_language
  prefer_english_for_ascii: true    # Bias pure-ASCII text toward English (avoids es/de/nl false positives)
  enable_stickiness: false          # Reuse the session's previous language for short/ambiguous messages
  fallback_language: "en"           # Language assumed when detection is uncertain
  backend_timeout: 10.0  # Timeout per backend in seconds (increase for cold starts)

  # Configurable heuristic nudges for voting adjustments
  heuristic_nudges:
    en_boost: 0.2       # Boost for English in ASCII-heavy text
    es_penalty: 0.1     # Penalty for Spanish in pure ASCII (avoids es/en confusion)
    script_boost: 0.2   # Boost when script detection matches ensemble winner

  # Mixed language detection
  mixed_language_threshold: 0.3  # Min confidence for secondary language to flag as mixed

  # Chat history language prior (uses recent messages to stabilize detection)
  use_chat_history_prior: true
  chat_history_prior_weight: 0.3  # Weight given to chat history distribution
  chat_history_messages_count: 5  # Number of recent messages to consider

  # RAG retrieval language boosting (boosts documents matching user's language)
  retrieval_match_boost: 0.1       # Boost for documents matching detected language
  retrieval_mismatch_penalty: 0.05 # Penalty for non-matching language documents
  retrieval_min_confidence: 0.7    # Min detection confidence to apply boost

# Server concurrency and response-optimization tuning: worker processes, thread
# pools, and optional GZip/ETag layers.
performance:
  workers: 4                        # Uvicorn worker processes (scale with CPU cores)
  # Rate-limit fallback note: when the cache service is disabled or unavailable,
  # each worker enforces its own in-memory fixed-window counters. With
  # workers > 1, the aggregate fallback ceiling can be up to limit * workers.
  keep_alive_timeout: 30

  # Adapter preload timeout (seconds) - increase for Ollama cold starts
  # This is the maximum time to wait for each adapter to initialize during startup
  adapter_preload_timeout: 120  # 2 minutes (default was 60s)

  # GZip compression for responses (opt-in)
  # Compresses responses larger than minimum_size bytes (30-60% bandwidth savings for JSON)
  # Note: Streaming endpoints are automatically excluded to preserve word-by-word streaming
  # Recommended for deployments with large JSON responses on non-streaming endpoints
  compression:
    enabled: false  # Disabled by default - enable if needed for bandwidth optimization
    minimum_size: 2048  # Minimum response size in bytes to compress
    excluded_paths:     # Paths excluded from compression (streaming endpoints)
      - "/v1/chat"      # SSE streaming endpoint
      - "/ws"           # WebSocket endpoints
      - "/mcp"          # MCP protocol endpoints

  # ETag caching for GET requests (opt-in)
  # Returns 304 Not Modified for unchanged responses
  # Recommended for read-heavy REST API deployments, less useful for chat-focused use
  etag_caching:
    enabled: false  # Disabled by default - enable if clients implement ETag caching
    excluded_paths:
      - "/v1/chat"  # SSE streaming endpoint
      - "/ws"       # WebSocket endpoints
      - "/mcp"      # MCP protocol endpoints

  thread_pools:
    # Total capacity is the sum of these pools per worker. With workers=4
    # and the defaults below, peak pool capacity is 140 per worker / 560 total.
    io_workers: 50              # Up from 10
    cpu_workers: 30             # CPU-bound tasks
    inference_workers: 20       # Model inference
    embedding_workers: 15       # Embedding generation
    db_workers: 25              # Database operations

# Resilience for adapter/provider calls: a circuit breaker that trips on
# repeated failures, plus per-call timeout and retry policy.
fault_tolerance:
  circuit_breaker:
    failure_threshold: 5        # Consecutive failures before opening
    recovery_timeout: 30        # Base recovery wait in seconds (exponential backoff applied)
    success_threshold: 3        # Consecutive successes in HALF_OPEN before closing
    max_recovery_timeout: 300.0 # Backoff ceiling in seconds
    enable_exponential_backoff: true
    max_half_open_calls: 1      # Max concurrent probes allowed while HALF_OPEN
  execution:
    strategy: "all"  # Only "all" is currently implemented; first_success/best_effort are planned
    timeout: 35      # Total operation timeout per adapter call (30% init, 70% query)
    max_retries: 3
    retry_delay: 1
  
# Canned fallback replies returned to the user in specific situations instead
# of an LLM-generated answer.
messages:
  no_results_response: "I'm sorry, but I don't have any specific information about that topic in my knowledge base."  # When retrieval finds no relevant context
  collection_not_found: "I couldn't find the requested collection. Please make sure the collection exists before querying it."  # When the requested collection/data is missing

# Authentication for the /admin panel and management APIs. The built-in
# username/password login below always works; external SSO is optional (see
# providers:).
auth:
  session_duration_hours: 12        # Admin login session lifetime before re-auth is required
  default_admin_username: admin     # Bootstrap admin account, created on first startup
  default_admin_password: ${ORBIT_DEFAULT_ADMIN_PASSWORD}  # Set via env; change before production
  pbkdf2_iterations: 600000         # PBKDF2 rounds for password hashing (higher = slower to brute-force)
  # Credential storage method: "keyring" (default) or "file"
  # - keyring: Uses system keychain (macOS Keychain, Linux Secret Service)
  # - file: Uses plain text file in ~/.orbit/.env (less secure but visible)
  credential_storage: keyring

  # External identity providers (OIDC / OAuth2). Optional — the built-in
  # username/password auth above always works. When enabled, ORBIT validates
  # access-token JWTs presented as `Authorization: Bearer <jwt>` by clients
  # (e.g. orbitchat) that have already completed the OAuth login. Requires the
  # 'auth-providers' dependency profile (PyJWT[crypto]).
  providers:
    enabled: false                 # Master switch for external-provider bearer-token validation
    default_role: "user"           # Role assigned to users provisioned on first login
    # Microsoft Entra ID (Azure AD)
    entra:
      enabled: false
      tenant_id: ${ORBIT_AUTH_ENTRA_TENANT_ID:-}
      client_id: ${ORBIT_AUTH_ENTRA_CLIENT_ID:-}       # Expected token audience (this app's client id)
      client_secret: ${ORBIT_AUTH_ENTRA_CLIENT_SECRET:-}  # Optional; only for admin-panel SSO confidential clients
    # Auth0
    auth0:
      enabled: false
      domain: ${ORBIT_AUTH_AUTH0_DOMAIN:-}             # e.g. your-tenant.us.auth0.com
      audience: ${ORBIT_AUTH_AUTH0_AUDIENCE:-}         # API identifier = expected token audience
      client_id: ${ORBIT_AUTH_AUTH0_CLIENT_ID:-}       # Required for admin-panel SSO (id_token audience)
      client_secret: ${ORBIT_AUTH_AUTH0_CLIENT_SECRET:-}  # Optional; only for admin-panel SSO confidential clients

    # Admin-panel browser SSO (server-side OAuth Authorization Code + PKCE).
    # Lets admins sign in to /admin with Entra/Auth0 instead of a password.
    # Register this redirect URI with each provider:
    #   {base_url or auto-detected}/admin/auth/{entra|auth0}/callback
    admin_sso:
      enabled: false
      base_url: ${ORBIT_ADMIN_BASE_URL:-}   # Optional; overrides auto-detected redirect base (needed behind a proxy)
      admin_users: [] # Emails and/or "provider:subject" granted admin at login

# Client API-key authentication for the inference endpoints (/v1/chat, ...).
# Keys are created and managed from the admin panel or the orbit CLI.
api_keys:
  header_name: "X-API-Key"     # HTTP header clients send their API key in
  prefix: "orbit_"             # Prefix prepended to every generated key

# Loads and caches the named system prompts assigned to adapters / API keys, so
# they aren't re-fetched from the database on every request.
prompt_service:
  cache:
    ttl_seconds: 3600  # 1 hour - how long to cache prompts

# Application logging: global level, file/console handlers, and per-logger
# overrides to quiet noisy third-party libraries.
logging:
  level: "INFO"                      # Root level: DEBUG, INFO, WARNING, ERROR
  handlers:
    file:
      enabled: true
      directory: "logs"
      filename: "orbit.log"
      max_size_mb: 10
      backup_count: 30
      rotation: "midnight"
      format: "text"
    console:
      enabled: false
      format: "text"
  capture_warnings: true
  propagate: false
  loggers:
    # Suppress langid third-party library initialization spam
    langid.langid:
      level: "WARNING"
      propagate: false
    # Suppress Matplotlib's categorical-axis advisory messages.
    matplotlib.category:
      level: "WARNING"
      propagate: false
    # Suppress all Python warnings (ResourceWarnings, DeprecationWarnings, etc.)
    py.warnings:
      level: "ERROR"
      propagate: false
      disabled: true
    # Reduce WebSocket message spam from inference server
    server.inference_server:
      level: "WARNING"
      propagate: false
    # Suppress uvicorn WebSocket connection logs
    uvicorn:
      level: "WARNING"
      propagate: false
    uvicorn.access:
      level: "WARNING"
      propagate: false
    uvicorn.asgi:
      level: "WARNING"
      propagate: false
    # Suppress Elasticsearch client transport logs
    elastic_transport:
      level: "WARNING"
      propagate: false
    elastic_transport.transport:
      level: "WARNING"
      propagate: false
    elasticsearch:
      level: "WARNING"
      propagate: false
    # Suppress Elasticsearch datasource connection logs
    datasources.implementations.elasticsearch_datasource:
      level: "WARNING"
      propagate: false
    inference.clients.llama_cpp:
      level: "ERROR"
    llama_cpp:
      level: "ERROR"
    llama_cpp.llama:
      level: "ERROR"
    ggml:
      level: "ERROR"
    metal:
      level: "ERROR"
    azure.core.pipeline.policies.http_logging_policy:
      level: "WARNING"
      propagate: false
    azure:
      level: "WARNING"
      propagate: false
    httpx:
      level: "WARNING"
    httpcore:
      level: "WARNING"
    primp:
      level: "WARNING"
    hpack:
      level: "WARNING"
    docling:
      level: "WARNING"
    docling.datamodel.document:
      level: "WARNING"
    docling.document_converter:
      level: "WARNING"
    docling.pipeline.base_pipeline:
      level: "WARNING"
    docling.backend.msexcel_backend:
      level: "WARNING"
    docling.backend.pypdfium2_backend:
      level: "WARNING"
    docling.backend.docling_parse_backend:
      level: "WARNING"
    PIL.Image:
      level: "WARNING"
    pdfminer:
      level: "WARNING"
      propagate: false
    pdfminer.psparser:
      level: "WARNING"
      propagate: false
    pdfminer.pdfdocument:
      level: "WARNING"
      propagate: false
    pdfminer.pdfinterp:
      level: "WARNING"
      propagate: false
    matplotlib.font_manager:
      level: "ERROR"
      propagate: false

# Injects the current date/time into the model's context so it can answer
# time-aware questions ("what day is it?", "how long until..."). Without it the
# model only knows its training cutoff.
clock_service:
  enabled: true
  default_timezone: "America/Toronto"        # IANA timezone name; falls back to UTC if invalid
  format: "%A, %B %d, %Y at %I:%M:%S %p %Z"  # Python strftime format for the injected timestamp

internal_services:
  # Backend database configuration
  # Choose between 'sqlite' (no installation required), 'mongodb', or 'postgres' (require a running server)
  backend:
    type: "sqlite" # sqlite, mongodb, or postgres
    sqlite:
      database_path: "orbit.db"  # Path to SQLite database file (relative to project root)
    postgres:
      host: ${INTERNAL_SERVICES_POSTGRES_HOST}
      port: ${INTERNAL_SERVICES_POSTGRES_PORT}
      database: ${INTERNAL_SERVICES_POSTGRES_DB}
      username: ${INTERNAL_SERVICES_POSTGRES_USERNAME}
      password: ${INTERNAL_SERVICES_POSTGRES_PASSWORD}
      sslmode: ${INTERNAL_SERVICES_POSTGRES_SSLMODE}
  
  elasticsearch:
    enabled: false
    node: ${INTERNAL_SERVICES_ELASTICSEARCH_NODE}
    index: 'orbit'
    username: ${INTERNAL_SERVICES_ELASTICSEARCH_USERNAME}
    password: ${INTERNAL_SERVICES_ELASTICSEARCH_PASSWORD}

  # Audit trail storage configuration
  # Stores conversation audit logs for compliance and analytics
  audit:
    enabled: false  # Opt-in: persists every request/response for compliance & analytics
    # Storage backend for audit logs
    # Options: "elasticsearch", "sqlite", "mongodb", "postgres", "database"
    # "database" means use the same backend as internal_services.backend.type
    storage_backend: "database"
    # Collection/table name for audit logs
    collection_name: "audit_logs"
    # Enable gzip compression for response field (saves storage, reduces I/O)
    # Set to false for debugging/testing to see plain text responses
    # Compressed responses are stored as base64-encoded gzip data
    compress_responses: true
    # Clear audit logs on server startup
    # WARNING: This will delete ALL audit logs when the server starts
    # Use with caution - only recommended for development/testing environments
    clear_on_startup: false
    # Admin & auth event auditing (opt-in). Records mutations on /admin/*
    # and /auth/* endpoints (user CRUD, API-key management, config changes,
    # login/logout, etc.) into a separate collection/table.
    admin_events:
      enabled: false
      collection_name: "audit_admin_logs"

  mongodb:
    host: ${INTERNAL_SERVICES_MONGODB_HOST}
    port: ${INTERNAL_SERVICES_MONGODB_PORT}
    username: ${INTERNAL_SERVICES_MONGODB_USERNAME}
    password: ${INTERNAL_SERVICES_MONGODB_PASSWORD}
    database: ${INTERNAL_SERVICES_MONGODB_DB}
    users_collection: users
    sessions_collection: sessions
    apikey_collection: api_keys
    prompts_collection: system_prompts

  # Cache provider selection — applies to all caching consumers (rate limiting,
  # quotas, prompt cache, autocomplete, query burst cache, thread datasets, ...).
  # Switch backends by changing `provider` and enabling the matching block below;
  # no other config needs to change. To add a new backend, see
  # server/services/cache_backends/factory.py.
  #   sqlite    - zero-config default; no external service, persists across restarts
  #   redis     - best for multi-instance deployments needing shared/distributed caching
  #   memcached - lighter-weight alternative to Redis for single-purpose caching
  cache:
    # Master switch. When false, NO cache provider is created at all - no
    # connection pool, no cache database file - regardless of `provider` below.
    # Dependent features (quota/throttling hard limits, autocomplete distributed
    # cache, query burst cache, cache-backed conversation threading) fall back
    # to in-memory/no-op behavior and log a warning. Use for light deployments
    # that don't need caching.
    enabled: false
    provider: "sqlite"  # sqlite | redis | memcached
    # Cache startup behavior
    clear_cache_on_startup: true
    # Query burst cache — absorbs repeated identical queries (e.g. user clicking retry)
    query_cache:
      enabled: false
      ttl: 30                      # seconds to cache identical query results
      max_memory_entries: 100      # in-memory fallback when the cache provider is unavailable

  # SQLite cache — default provider. No external service required; a good fit for
  # single-instance self-hosted deployments. Uses its own database file, separate
  # from internal_services.backend.sqlite (the application database), so cache
  # write volume doesn't contend with application data.
  # Note: slower than Redis/Memcached under high write throughput (e.g. per-request
  # rate limiting) since every write is a disk-backed transaction.
  sqlite_cache:
    database_path: "orbit_cache.db"
    ttl: 3600  # 1 hour

  redis:
    enabled: false
    host: ${INTERNAL_SERVICES_REDIS_HOST}
    port: ${INTERNAL_SERVICES_REDIS_PORT}
    db: 0
    username: ${INTERNAL_SERVICES_REDIS_USERNAME}
    password: ${INTERNAL_SERVICES_REDIS_PASSWORD}
    use_ssl: false
    ttl: 3600  # 1 hour, matching temp_key_expiry
    # Connection pool settings
    max_connections: 20
    socket_connect_timeout: 5
    socket_timeout: 5
    retry_on_timeout: true
    # Resilience settings
    health_check_interval: 30
    max_consecutive_failures: 5
    circuit_recovery_timeout: 30

  # Memcached — lighter-weight alternative to Redis. Requires the 'memcached'
  # dependency profile: ./install/setup.sh --profile memcached
  # Note: no selective cache invalidation (no key pattern matching) and no TTL
  # introspection — inherent Memcached protocol limitations, not a bug.
  memcached:
    enabled: false
    host: ${INTERNAL_SERVICES_MEMCACHED_HOST}
    port: 11211
    pool_size: 20
    ttl: 3600  # 1 hour

# Broker-native async surface (MQ-style request/response). When enabled, ORBIT
# consumes request messages off a message broker, runs them through the same
# inference pipeline as the HTTP surfaces, and publishes response envelopes back
# to each message's reply_to. Intended for batch/decoupled workloads instead of
# synchronous HTTP calls. Disabled by default. Requires the 'messaging'
# dependency profile: ./install/setup.sh --profile messaging
#
# NOTE: this path bypasses the HTTP middleware stack (CORS, rate limiting, audit).
# Auth is enforced in the consumer: a valid ORBIT API key (in the message body or
# an AMQP header) is required whenever the API-key service is active.
messaging:
  enabled: false
  provider: "rabbitmq"          # rabbitmq
  # true  = run the consumer in-process as a server background task
  # false = run it only via the standalone `orbit worker` command
  run_in_server: false
  rabbitmq:
    url: "${MESSAGING_RABBITMQ_URL:-amqp://guest:guest@localhost:5672/}"  # amqp://user:pass@host:5672/vhost
    requests_queue: "orbit.requests"    # queue ORBIT consumes requests from
    results_queue: "orbit.results"      # default reply target when a message has no reply_to
    dead_letter_queue: "orbit.dlq"      # unparseable/failed deliveries land here
    prefetch: 8                         # max unacked messages in flight (backpressure)
    durable: true

# Persists conversation turns per session so multi-turn context survives across
# requests. Stored in the internal_services.backend database.
chat_history:
  enabled: true
  collection_name: "chat_history"   # Table/collection name in the backend database
  store_metadata: true              # Persist per-message metadata (tokens, detected language, ...)
  retention_days: 90                # Auto-expire history older than this many days
  max_tracked_sessions: 10000       # Cap on concurrently tracked active sessions (memory bound)
  session:
    auto_generate: false            # Server-generate a session id when the client omits one
    required: true                  # Require a session id to read/write history
    header_name: "X-Session-ID"
  user:
    header_name: "X-User-ID"        # Optional per-user attribution header
    required: false

# Sub-thread branching with dataset reuse: a follow-up can branch from any earlier
# turn and reuse that turn's cached retrieval results instead of re-querying the
# datasource, cutting DB load and latency on multi-turn analytical chats.
conversation_threading:
  enabled: false  # Opt-in: caches retrieval datasets for follow-up turns
  dataset_ttl_hours: 24  # Global default TTL for stored datasets
  # "cache" uses the configured cache provider (internal_services.cache.provider).
  # sqlite/mongodb/postgres store thread datasets directly in the application
  # database instead of the cache. Fallback order when using the cache: cache -> database.
  storage_backend: "sqlite"  # cache, sqlite, mongodb, postgres
  cache_key_prefix: "thread_dataset:"

# Autocomplete configuration for query suggestions based on intent template nl_examples
autocomplete:
  enabled: false  # Opt-in: query suggestions from intent-template nl_examples

  # Query matching settings
  min_query_length: 3  # Minimum characters before fetching suggestions
  max_suggestions: 10   # Server-side ceiling; endpoint and UI request smaller values within this cap

  # Caching configuration
  cache:
    # Use the configured cache provider (internal_services.cache.provider) for
    # distributed caching, recommended for multi-instance deployments.
    # Falls back to in-memory cache if the cache service is unavailable.
    use_cache: false
    ttl_seconds: 1800  # 30 minutes - templates rarely change
    cache_key_prefix: "autocomplete:"

  # Fuzzy matching configuration
  fuzzy_matching:
    enabled: true  # Enable fuzzy/approximate string matching
    # Algorithm options: "levenshtein", "jaro_winkler", "substring" (default)
    # - substring: Exact substring matching (fastest, no typo tolerance)
    # - levenshtein: Edit distance (handles typos, moderate speed)
    # - jaro_winkler: Optimized for short strings and prefixes (good for typos)
    algorithm: "jaro_winkler"
    # Minimum similarity score (0.0-1.0) to include a suggestion
    # Higher = stricter matching, fewer results
    # Recommended: 0.7 for levenshtein, 0.8 for jaro_winkler
    threshold: 0.75
    # Maximum candidates to fuzzy-rank after cheap relevance prefiltering
    max_candidates: 250

# Automatic skill intent detection (hybrid embedding pre-filter -> LLM confirm)
# Lets an adapter route plain natural-language turns to a skill (PDF, Image,
# Audio, web-search, ...) without the client sending skill=<name>. Requires BOTH
# this global gate AND capabilities.auto_skill_routing on the consumer adapter.
# See docs/adapters/auto-skill-intent-detection.md
skill_routing:
  auto_detect: false             # Global gate (default off = backward compatible)
  embedding_threshold: 0.35     # Permissive pre-filter cosine threshold (recall-oriented)
  max_candidates: 3             # Top-N skills passed from pre-filter to the confirm LLM
  history_turns: 4              # Recent conversation turns given to the confirm LLM
  confirm_max_tokens: 12        # The confirm LLM only emits a skill name or NONE
  # Small/fast LLM for the confirm step. Omit to reuse the adapter's own provider.
  router_provider: "openai"
  router_model: "gpt-5.4-mini"

# Composite Intent Retriever template selection configuration
# Improves template selection accuracy when routing queries across multiple intent adapters
# by using multi-stage scoring with reranking and string similarity
composite_retrieval:
  # Two-stage retrieval with reranking
  # Uses the configured reranker (from rerankers.yaml) to re-score top candidates
  reranking:
    enabled: false              # Enable reranker stage for better semantic understanding
    provider: "anthropic"      # Reranker provider from rerankers.yaml (anthropic, cohere, openai, etc.)
    top_candidates: 10         # Number of embedding candidates to pass to reranker
    weight: 0.4                # Weight for reranker score in final combined score

  # String similarity scoring
  # Adds lexical matching to complement semantic embeddings
  string_similarity:
    enabled: true              # Enable string similarity scoring
    # Algorithm options:
    # - "jaro_winkler": Best for short strings and typo tolerance (recommended)
    # - "levenshtein": Edit distance, good for detecting insertions/deletions
    # - "ratio": Simple ratio matching (fastest)
    algorithm: "jaro_winkler"
    weight: 0.2                # Weight for string similarity in final combined score
    # Template fields to compare against query for similarity
    compare_fields:
      - "description"          # Template description
      - "nl_examples"          # Natural language examples (primary matching target)
    # Minimum string similarity to consider (0.0-1.0)
    # Results below this are penalized
    min_threshold: 0.3
    # Aggregate multiple field scores: "max", "avg", "weighted_avg"
    aggregation: "max"

  # Combined scoring formula:
  # final_score = (embedding_weight * emb) + (rerank_weight * rerank) + (string_weight * str_sim)
  # Weights should sum to 1.0 for normalized scoring
  scoring:
    embedding_weight: 0.4      # Weight for embedding similarity (base retrieval)
    normalize_scores: true     # Normalize all scores to 0-1 before combining
    # Tie-breaker strategy when scores are very close (within 0.01)
    tie_breaker: "embedding"   # Options: "embedding", "reranker", "string_similarity"

  # Performance settings
  performance:
    parallel_rerank: true      # Rerank candidates in parallel batches
    cache_rerank_results: true # Cache reranking results for repeated queries
    cache_ttl_seconds: 300     # TTL for reranking cache (5 minutes)

files:
  # Global defaults for all file adapters
  # Individual adapters in adapters.yaml can override these settings

  # NOTE: File metadata (uploaded_files, file_chunks) is now stored in the main backend database
  # configured in internal_services.backend (SQLite or MongoDB), not in a separate files.db

  # Storage backend selection: filesystem | s3 | minio | azure | gcs
  # Default is local filesystem. Set to s3/minio/azure/gcs to store uploads in the cloud.
  # Requires the 'cloud-services' dependency profile for s3/minio/azure/gcs.
  storage_backend: "filesystem"
  storage_root: "./uploads"  # Root directory for storing uploaded files (filesystem backend)

  # AWS S3 / S3-compatible (MinIO) settings — used when storage_backend is s3 or minio.
  # The bucket must already exist. Always reference env vars; never inline secrets.
  s3:
    bucket: "${ORBIT_S3_BUCKET:-}"
    prefix: "${ORBIT_S3_PREFIX:-}"                # optional key prefix within the bucket
    region: "${AWS_REGION:-us-east-1}"
    endpoint_url: "${ORBIT_S3_ENDPOINT_URL:-}"    # set for MinIO / S3-compatible stores
    # Omit the credentials below to use the boto3 default chain (env / instance role / SSO):
    # access_key_id: "${AWS_ACCESS_KEY_ID:-}"
    # secret_access_key: "${AWS_SECRET_ACCESS_KEY:-}"

  # Azure Blob settings — used when storage_backend is azure. The container must already exist.
  azure:
    container: "${ORBIT_AZURE_CONTAINER:-}"
    prefix: "${ORBIT_AZURE_PREFIX:-}"             # optional blob-name prefix
    connection_string: "${AZURE_STORAGE_CONNECTION_STRING:-}"
    # Or identity-based auth (managed identity / Entra) instead of a connection string:
    # account_url: "${AZURE_STORAGE_ACCOUNT_URL:-}"
    # account_key: "${AZURE_STORAGE_ACCOUNT_KEY:-}"  # omit to use DefaultAzureCredential

  # Google Cloud Storage settings — used when storage_backend is gcs. The bucket must already exist.
  gcs:
    bucket: "${ORBIT_GCS_BUCKET:-}"
    prefix: "${ORBIT_GCS_PREFIX:-}"               # optional object-name prefix
    project: "${GOOGLE_CLOUD_PROJECT:-}"          # optional; inferred from credentials if omitted
    # Omit credentials_path to use Application Default Credentials (ADC):
    #   GOOGLE_APPLICATION_CREDENTIALS env, gcloud user creds, or Workload Identity on GCP.
    # credentials_path: "${GOOGLE_APPLICATION_CREDENTIALS:-}"  # service-account JSON key file

  # File encryption at rest (AES-256-GCM) — for sensitive/classified content.
  # Opt-in per adapter via capabilities.requires_encryption: true (see adapters.yaml).
  # Encrypts file bytes and the storage backend's metadata sidecar only — not
  # extracted text stored in the database or chunk text indexed in the vector store.
  encryption:
    enabled: false
    # Generate a key with:
    #   python -c "import secrets, base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
    # Reference the env var only — never inline the key here.
    # Key is read from ORBIT_FILE_ENCRYPTION_KEY (see env.example).

  # Default processing settings (can be overridden per adapter)
  default_chunking_strategy: "recursive"  # Options: "fixed", "semantic", "token", "recursive", "markdown_header"
  # Recommended: "recursive" - works best for all file types (PDF, DOCX, CSV, TXT, HTML, JSON, images, audio)
  # Respects document structure (paragraphs → sentences → words) while handling structured data
  default_chunk_size: 2048  # Default chunk size (characters for fixed/semantic, tokens for token/recursive)
  default_chunk_overlap: 200  # Default overlap (characters for fixed/semantic, tokens for token/recursive)
  
  # Processing configuration
  processing:
    # Docling processor configuration
    # Set to false to disable docling processor and prevent outbound connections to HuggingFace at startup
    # When disabled, docling will not be initialized until actually needed (lazy initialization)
    # PDF layout uses RT-DETR (PyTorch + torchvision). Intel macOS only gets PyPI torch up to 2.2.x; use files profile / setup.sh for matching pins.
    # Default: true (enabled)
    docling_enabled: false

    # MarkItDown processor configuration (Microsoft's document-to-markdown converter)
    # Set to true to enable MarkItDown as an alternative/fallback document processor
    # Supports: PDF, DOCX, PPTX, XLSX, XLS, HTML, CSV, JSON, XML, images, audio, ZIP, EPUB
    # Requires: pip install markitdown[all]
    # Default: false (opt-in)
    markitdown_enabled: true

    # AI/LLM-based OCR processor configuration
    # Third universal processor that offloads OCR for PDFs and images to an LLM
    # inference service (Mistral native OCR, or OpenAI/Gemini/Anthropic vision).
    # Provider/model are configured in ocr.yaml; see the ai_document block below.
    # Default: false (opt-in)
    ai_document_enabled: false

    # Processor priority when multiple universal processors are enabled
    # Determines which processor is tried first for overlapping MIME types
    # Options: "docling" (default), "markitdown", "ai_document", "native"
    # - docling: Try Docling first (advanced document understanding)
    # - markitdown: Try MarkItDown first (clean markdown conversion)
    # - ai_document: Try AI/LLM OCR first (requires ai_document_enabled + ocr.yaml)
    # - native: Only use native Python processors (no universal processors)
    processor_priority: "markitdown"

    # MarkItDown-specific options
    markitdown:
      # Enable third-party plugins (default: false for security)
      enable_plugins: false

    # AI/LLM OCR options (used when ai_document_enabled is true)
    ai_document:
      # OCR provider — must also be enabled in ocr.yaml
      # mistral | openai | gemini | anthropic | cohere | ollama | vllm | llama_cpp
      provider: "mistral"
      # Optional model override; if null, uses the provider's model from ocr.yaml
      model: null
      # Cap PDF pages sent to vision-backed providers (Mistral native OCR ignores this)
      max_pages: 50
      # Rasterization DPI for vision-backed PDF OCR (higher = sharper, slower)
      dpi: 150
      # Optional custom OCR prompt for vision-backed providers (null = default OCR prompt)
      prompt: null

    # Magika upload inspection (Google's ML-based content-type detector).
    # Sniffs the real content of each uploaded file and rejects it when the true
    # type doesn't match the declared MIME type — defends against disguised or
    # spoofed uploads. Requires the magika dependency; adds a little per-upload latency.
    magika:
      enabled: false                       # Master switch for content inspection
      enforcement: "block"                 # Action on a content/type mismatch (only "block" — reject — is implemented)
      # Magika confidence mode: HIGH_CONFIDENCE (strictest; classifies as generic
      # when unsure), MEDIUM_CONFIDENCE, or BEST_GUESS (always emit the top guess).
      prediction_mode: "HIGH_CONFIDENCE"
      allow_generic_text_fallback: false   # true = accept files Magika can only classify as generic text
      allow_generic_binary_fallback: false # true = accept files Magika can only classify as unknown binary
      log_detection_details: true          # Debug-log each detection (filename, claimed vs detected type, score)

    # CSV processor settings
    csv:
      # For small CSVs, include ALL rows to enable exact lookups (e.g., "find ID X")
      # Files with <= this many rows will have all data indexed, not just samples
      # Set to 0 to always use summary mode (token-efficient but no exact lookups)
      full_data_row_threshold: 200

      # Number of sample rows to show in summary mode (for large files)
      max_preview_rows: 5

      # Maximum characters per column value before truncation
      max_column_width: 50

      # Maximum columns to show in detail (remaining columns listed by name only)
      max_columns_full: 15

    # JSON processor settings
    json:
      # For small JSON arrays, include ALL items to enable exact lookups (e.g., "find ID X")
      # Arrays with <= this many items will have all data indexed, not just samples
      # Set to 0 to always use summary mode (token-efficient but no exact lookups)
      full_data_item_threshold: 200

      # Maximum array items to show in previews (for large arrays in summary mode)
      max_array_preview_items: 3

      # Maximum depth for schema extraction
      max_schema_depth: 4

      # Maximum string length before truncation
      max_string_length: 100

      # Maximum keys to show for large objects
      max_object_keys: 20

  # Tokenizer configuration (optional)
  # If not specified, uses character-based tokenization
  # Options: "character" (default), "gpt2", "tiktoken", or custom tokenizer identifier
  # Requires chonkie library for advanced tokenizers
  tokenizer: null  # e.g., "gpt2", "tiktoken", or null for character-based
  
  # Token-based chunking option for fixed strategy
  # If true, uses token-based chunking instead of character-based
  use_tokens: false
  
  # Strategy-specific chunking options
  chunking_options:
    # Semantic chunking options
    model_name: null  # Optional sentence-transformer model name (e.g., "all-MiniLM-L6-v2")
    use_advanced: false  # Enable advanced semantic chunking with similarity calculations (requires sentence-transformers)
    chunk_size_tokens: null  # Optional token-based chunk size limit for semantic chunks
    
    # Recursive chunking options
    min_characters_per_chunk: 24  # Minimum characters per chunk for recursive chunking
    
    # Advanced semantic chunking options (when use_advanced: true)
    threshold: 0.8  # Similarity threshold (0-1) for semantic boundary detection
    similarity_window: 3  # Number of sentences to consider for similarity calculation
    min_sentences_per_chunk: 1  # Minimum sentences per chunk
    min_characters_per_sentence: 24  # Minimum characters per sentence
    skip_window: 0  # Number of groups to skip when merging (0=disabled)
    filter_window: 5  # Window length for Savitzky-Golay filter (requires scipy)
    filter_polyorder: 3  # Polynomial order for Savitzky-Golay filter
    filter_tolerance: 0.2  # Tolerance for Savitzky-Golay filter
  
  # Default vector store settings (can be overridden per adapter)
  default_vector_store: "chroma"  # Default vector store to use
  default_collection_prefix: "files_"  # Default prefix for collection names

# System/health metrics powering the admin dashboard and the Prometheus
# /metrics endpoint (CPU, memory, latency, error rate, active sessions).
monitoring:
  enabled: true                    # Enable/disable monitoring
  metrics:
    collection_interval: 5         # Seconds between metric collections
    time_window: 300              # Seconds of historical data to keep (5 minutes)
    prometheus:
      enabled: true               # Enable Prometheus endpoint at /metrics
    websocket_update_interval: 5 # Seconds between WebSocket updates
  alerts:                         # Alert thresholds (future use)
    cpu_threshold: 90             # Alert when CPU > 90%
    memory_threshold: 85          # Alert when memory > 85%
    error_rate_threshold: 5       # Alert when error rate > 5%
    response_time_threshold: 5000 # Alert when avg response time > 5000ms

secrets_management:
  # Where ${VAR_NAME} placeholders throughout this config are resolved from.
  # Cloud providers are consulted FIRST for each name; if a name isn't found
  # there, resolution falls back to .env / process environment, then to any
  # ${VAR:-default}. This stops a stale local .env value from silently
  # shadowing a hardened secret.
  #   env   - .env / process environment only (default, no extra setup)
  #   aws   - AWS Secrets Manager
  #   azure - Azure Key Vault
  #   gcp   - GCP Secret Manager
  # Requires the 'secrets-management' dependency profile for aws/azure/gcp:
  #   ./install/setup.sh --profile secrets-management
  #
  # NOTE: the connection settings below always resolve from plain os.environ —
  # the backend doesn't exist yet while it's being constructed.
  provider: "${ORBIT_SECRETS_PROVIDER:-env}"

  aws:
    region: "${AWS_REGION:-us-east-1}"
    endpoint_url: "${ORBIT_SECRETS_AWS_ENDPOINT_URL:-}"   # optional, e.g. LocalStack

  azure:
    vault_url: "${AZURE_KEY_VAULT_URL:-}"                 # e.g. https://your-vault.vault.azure.net/

  gcp:
    project: "${GOOGLE_CLOUD_PROJECT:-}"

security:
  # CORS (Cross-Origin Resource Sharing) configuration
  cors:
    # Allowed origins - MUST be explicitly configured for production
    # Use specific origins like ["https://app.example.com", "https://admin.example.com"]
    # Use ["*"] ONLY for development (credentials will be automatically disabled)
    allowed_origins: ["*"]  # WARNING: Wildcard only for development

    # Allow credentials (cookies, authorization headers)
    # IMPORTANT: Cannot be true when allowed_origins contains "*"
    # Set to true only when using specific origin list
    allow_credentials: false

    # Allowed HTTP methods
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]

    # Allowed request headers
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-API-Key"
      - "X-Session-ID"
      - "X-User-ID"
      - "X-Request-ID"

    # Headers exposed to the browser
    expose_headers:
      - "X-Request-ID"
      - "X-RateLimit-Limit"
      - "X-RateLimit-Remaining"
      - "X-RateLimit-Reset"

    # Max age for preflight request caching (seconds)
    max_age: 600

  # Security headers configuration
  headers:
    enabled: true

    # Content Security Policy - restricts resource loading
    # Adjust based on your frontend requirements
    # Allows dashboard external resources: Chart.js CDN and Google Fonts
    content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

    # HTTP Strict Transport Security - enforce HTTPS
    # Only effective when served over HTTPS
    strict_transport_security: "max-age=31536000; includeSubDomains"

    # Prevent MIME type sniffing
    x_content_type_options: "nosniff"

    # Clickjacking protection
    x_frame_options: "SAMEORIGIN"

    # XSS protection (legacy, but still useful)
    x_xss_protection: "1; mode=block"

    # Referrer policy - control referrer information
    referrer_policy: "strict-origin-when-cross-origin"

    # Permissions policy - control browser features
    permissions_policy: "geolocation=(), microphone=(), camera=()"

  # Request size limits
  request_limits:
    max_body_size_mb: 10  # Maximum request body size in MB

  # Error handling security
  error_handling:
    # Never expose detailed errors in production
    # Set to true only for development/debugging
    expose_details: false

  # Rate limiting configuration
  # The configured cache provider (internal_services.cache.provider) enforces
  # limits atomically. If the cache service is disabled or an operation fails,
  # a per-worker in-memory fixed-window fallback is used.
  rate_limiting:
    enabled: false # Master switch

    # Proxy header trust configuration
    # SECURITY: Only enable trust_proxy_headers when behind a trusted reverse proxy
    # When false (default), X-Forwarded-For and X-Real-IP headers are ignored
    # to prevent IP spoofing attacks that bypass rate limiting
    trust_proxy_headers: false

    # Optional: List of trusted proxy IPs/CIDRs that are allowed to set proxy headers
    # Only used when trust_proxy_headers is true
    # If empty, all proxy headers are trusted (use only in controlled environments)
    trusted_proxies: []
    # Example trusted_proxies configuration:
    # trusted_proxies:
    #   - "10.0.0.0/8"        # Private network
    #   - "172.16.0.0/12"     # Private network
    #   - "192.168.0.0/16"    # Private network
    #   - "127.0.0.1"         # Localhost

    # IP-based limits (applies to all requests)
    ip_limits:
      requests_per_minute: 60        # Max requests per IP per minute
      requests_per_hour: 1000        # Max requests per IP per hour

    # API key limits (higher limits for authenticated requests)
    api_key_limits:
      requests_per_minute: 120       # Max requests per API key per minute
      requests_per_hour: 5000        # Max requests per API key per hour

    # Paths to exclude from rate limiting
    exclude_paths:
      - "/health"
      - "/favicon.ico"
      - "/metrics"
      - "/static"

    # Response configuration
    retry_after_seconds: 60          # Retry-After header value when limited

  # Throttling configuration (executes BEFORE rate limiting)
  # Delays requests progressively instead of rejecting them
  throttling:
    enabled: false # Master switch for throttling

    # Default quotas for API keys (can be overridden per-key)
    default_quotas:
      daily_limit: 10000             # Default daily request limit
      monthly_limit: 100000          # Default monthly request limit

    # Delay calculation parameters
    delay:
      min_ms: 100                    # Minimum delay when throttling starts
      max_ms: 5000                   # Maximum delay before quota rejection
      curve: "exponential"           # "linear" or "exponential"
      threshold_percent: 70          # Start throttling at 70% of quota

    # Priority-based delay multipliers (priority 1-10)
    # Higher multiplier = more delay for that priority level
    priority_multipliers:
      1: 0.5                         # Premium tier: half delay
      5: 1.0                         # Standard tier: normal delay
      10: 2.0                        # Low priority: double delay

    # Paths to exclude from throttling
    exclude_paths: []

    # Cache key configuration
    cache_key_prefix: "quota:"
    usage_sync_interval_seconds: 60  # Sync cache usage to database

    # Response headers
    headers:
      delay: "X-Throttle-Delay"
      daily_remaining: "X-Quota-Daily-Remaining"
      monthly_remaining: "X-Quota-Monthly-Remaining"
      daily_reset: "X-Quota-Daily-Reset"
      monthly_reset: "X-Quota-Monthly-Reset"
