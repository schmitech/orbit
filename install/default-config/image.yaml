# Global image generation configuration
image:
  provider: "ollama"  # Default image generation provider: openai, gemini, ollama, xai
  enabled: true        # Whether image generation is enabled globally

# Provider-specific configurations
image_generation:
  openai:
    enabled: false
    api_key: ${OPENAI_API_KEY}
    api_base: "https://api.openai.com/v1"
    model: "gpt-image-2"        # gpt-image-2, gpt-image-1.5, gpt-image-1, dall-e-3, dall-e-2
    size: "1024x1024"           # gpt-image-2 also supports other valid resolutions such as 1536x1024, 1024x1536
    quality: "auto"             # gpt-image: auto, low, medium, high; dall-e-3: standard, hd
    output_format: "png"        # gpt-image only: png, jpeg, webp
    output_compression: null    # gpt-image jpeg/webp only: 0-100
    background: null            # gpt-image only: opaque, auto
    moderation: null            # gpt-image only: auto, low
    style: "vivid"              # dall-e-3 only: vivid, natural
    # GPT Image returns b64_json by default; DALL-E requests b64_json explicitly.
    # Timeout configuration
    timeout:
      connect: 15000   # 15 seconds
      total: 120000    # 2 minutes (image generation can be slow)
    # Retry configuration
    retry:
      enabled: true
      max_retries: 2
      initial_wait_ms: 2000
      max_wait_ms: 30000
      exponential_base: 2

  gemini:
    enabled: false
    api_key: ${GOOGLE_API_KEY}
    model: "gemini-3.1-flash-image"
    number_of_images: 1
    aspect_ratio: "1:1"         # 1:1, 3:4, 4:3, 9:16, 16:9
    transport: "rest"           # Use REST to avoid gRPC/ALTS warnings
    # Timeout configuration
    timeout:
      connect: 15000   # 15 seconds
      total: 120000    # 2 minutes
    # Retry configuration
    retry:
      enabled: true
      max_retries: 2
      initial_wait_ms: 2000
      max_wait_ms: 30000
      exponential_base: 2

  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    model: "x/z-image-turbo"     # Example image models: x/z-image-turbo, x/flux2-klein
    size: "1024x1024"
    n: 1
    quality: "standard"
    style: null
    # Timeout configuration
    timeout:
      connect: 10000
      total: 180000
      warmup: 180000
    # Retry configuration
    retry:
      enabled: true
      max_retries: 5
      initial_wait_ms: 2000
      max_wait_ms: 30000
      exponential_base: 2

  xai:
    enabled: false
    api_key: ${XAI_API_KEY}
    api_base: "https://api.x.ai/v1"
    model: "grok-imagine-image-quality"
    n: 1
    aspect_ratio: "1:1"         # 1:1, 3:4, 4:3, 9:16, 16:9, 2:3, 3:2, 1:2, 2:1, 19.5:9, 9:19.5, 20:9, 9:20
    resolution: "1k"            # 1k, 2k
    # Timeout configuration
    timeout:
      connect: 15000
      total: 120000
    # Retry configuration
    retry:
      enabled: true
      max_retries: 2
      initial_wait_ms: 2000
      max_wait_ms: 30000
      exponential_base: 2
