# Global video generation configuration
video:
  provider: "gemini"  # Default video generation provider
  enabled: false       # No local ollama video provider exists; opt-in a cloud provider to enable

# Provider-specific configurations
video_generation:
  gemini:
    enabled: false
    api_key: ${GOOGLE_API_KEY}
    model: "veo-2.0-generate-001"
    aspect_ratio: "16:9"         # 16:9, 9:16, 1:1
    number_of_videos: 1
    person_generation: "allow_adult"  # allow_adult, disallow
    # Timeout configuration
    timeout:
      connect: 15000   # 15 seconds
      total: 300000    # 5 minutes (video generation is slow)
    # Retry configuration
    retry:
      enabled: true
      max_retries: 1
      initial_wait_ms: 5000
      max_wait_ms: 60000
      exponential_base: 2
  xai:
    enabled: false
    api_key: ${XAI_API_KEY}
    model: "grok-imagine-video"
    aspect_ratio: "16:9"         # 16:9, 9:16, 1:1, 4:3, 3:4, 3:2, 2:3
    resolution: "480p"           # 480p (default, faster) or 720p
    duration: 5                  # 1–15 seconds
    # Timeout configuration
    timeout:
      connect: 15000   # 15 seconds
      total: 300000    # 5 minutes (video generation is slow)
    # Retry configuration
    retry:
      enabled: true
      max_retries: 1
      initial_wait_ms: 5000
      max_wait_ms: 60000
      exponential_base: 2
