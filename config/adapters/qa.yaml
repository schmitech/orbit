adapters:
- name: "qa-sql"
  enabled: true
  type: "retriever"
  datasource: "sqlite"
  adapter: "qa"
  implementation: "retrievers.implementations.qa.QASSQLRetriever"
  inference_provider: "llama_cpp"
  model: "gemma4-e2b-direct-cpu"
  # reranker_provider: cohere
  # reranker_model: rerank-english-v3.0
  capabilities:
    retrieval_behavior: always
    formatting_style: standard
    supports_file_ids: false
    supports_session_tracking: false
    supports_threading: false
    requires_api_key_validation: false
    optional_parameters:
    - api_key
  config:
    confidence_threshold: 0.3
    max_results: 5
    return_results: 3
    # reranker_top_n: 5
    use_connection_pool: true
    pool_size: 10
    connection_timeout: 5
    enable_query_monitoring: true
    query_timeout: 5000
    table: city
    allowed_columns:
    - id
    - question
    - answer
    - question_tokens
    - source
    cache_ttl: 1800
  fault_tolerance:
    operation_timeout: 15.0
    failure_threshold: 10
    recovery_timeout: 30.0
    success_threshold: 5
    max_recovery_timeout: 120.0
    enable_exponential_backoff: true
    enable_thread_isolation: false
    enable_process_isolation: false
    max_retries: 3
    retry_delay: 0.5
    cleanup_interval: 3600.0
    retention_period: 86400.0
    event_handler:
      type: default

- name: "qa-realtime-voice"
  enabled: false
  type: "openai_realtime"
  datasource: "none"
  adapter: "conversational"
  implementation: "implementations.passthrough.conversational.ConversationalImplementation"
  capabilities:
    retrieval_behavior: "none"      # this adapter doesn't retrieve directly; grounding_adapter does
    supports_realtime_audio: true
    supports_interruption: true
  config:
    realtime_model: "gpt-realtime"
    realtime_voice: "marin"
    enable_input_transcription: true
    # Points at the qa-sql retriever adapter above; grounding_adapter can name
    # any retriever-type adapter (e.g. intent-sql-postgres, intent-duckdb-analytics)
    # to reuse this same live-lookup pattern for other domains.
    grounding_adapter: "qa-sql"
    grounding_tool_name: "lookup_answer"
    grounding_tool_description: "Look up factual answers (fees, hours, procedures) from the city knowledge base."

- name: "qa-gemini-realtime-voice"
  enabled: false
  type: "gemini_live"
  datasource: "none"
  adapter: "conversational"
  implementation: "implementations.passthrough.conversational.ConversationalImplementation"
  capabilities:
    retrieval_behavior: "none"      # this adapter doesn't retrieve directly; grounding_adapter does
    supports_realtime_audio: true
    supports_interruption: true
  config:
    realtime_model: "gemini-3.1-flash-live-preview"
    realtime_voice: "Leda"
    enable_input_transcription: true
    enable_output_transcription: true
    # Same grounding_adapter pattern as qa-realtime-voice (OpenAI) — provider-agnostic.
    grounding_adapter: "qa-sql"
    grounding_tool_name: "lookup_answer"
    grounding_tool_description: "Look up factual answers (fees, hours, procedures) from the city knowledge base."

- name: qa-vector-chroma
  enabled: true
  type: retriever
  datasource: chroma
  adapter: qa
  implementation: retrievers.implementations.qa.QAChromaRetriever
  inference_provider: "openrouter"
  model: "poolside/laguna-m.1:free"
  embedding_provider: openai
  embedding_model: text-embedding-3-small
  capabilities:
    retrieval_behavior: always
    formatting_style: standard
    supports_file_ids: false
    supports_session_tracking: false
    supports_threading: false
    requires_api_key_validation: false
    context_format: "toon"  # Options: markdown_table, toon, csv (default: pipe-separated)
    context_max_tokens: 8000
    numeric_precision:
      decimal_places: 2
  config:
    collection: city
    confidence_threshold: 0.3
    distance_scaling_factor: 2.0
    max_results: 50
    return_results: 3
    timezone: America/Toronto

- name: qa-vector-qdrant-demo
  enabled: false
  type: "retriever"
  datasource: "qdrant"
  adapter: "qa"
  implementation: "retrievers.implementations.qa.QAQdrantRetriever"
  inference_provider: "llama_cpp"
  embedding_provider: "gemma4-e2b-direct-cpu"
  capabilities:
    retrieval_behavior: always
    formatting_style: standard
    supports_file_ids: false
    supports_session_tracking: false
    supports_threading: false
    requires_api_key_validation: false
  config:
    collection: city
    confidence_threshold: 0.3
    score_scaling_factor: 1.0
    max_results: 5
    return_results: 3
    timezone: America/Toronto
