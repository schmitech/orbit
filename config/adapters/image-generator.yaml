# Dedicated image generation adapter — converts text prompts to images via DALL-E 3 or Imagen 3
  # Handled by ImageGenerationStep; LLMInferenceStep is skipped for this adapter type.
adapters:
  - name: "image-generator"
    enabled: true
    expose_as_skill: true
    skill_name: "image-generation"
    skill_description: "Generate images from text descriptions using AI (DALL-E 3, Imagen, or Ollama)"
    type: "image_generation"
    datasource: "none"
    adapter: "multimodal"
    implementation: "implementations.passthrough.multimodal.MultimodalImplementation"
    image_provider: "openai"            # Optional adapter override; omit to use config/image.yaml

    capabilities:
      retrieval_behavior: "none"
      formatting_style: "clean"
      supports_threading: false
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"

    config:
      storage_backend: "filesystem"
      storage_root: "./uploads"
