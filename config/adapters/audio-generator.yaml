# Dedicated audio generation adapter — converts text to speech via the configured TTS provider.
# Handled by AudioGenerationStep; LLMInferenceStep is skipped for this adapter type.
adapters:
  - name: "audio-generator"
    enabled: true
    type: "audio_generation"
    datasource: "none"
    adapter: "multimodal"
    implementation: "implementations.passthrough.multimodal.MultimodalImplementation"
    tts_provider: "gemini"    # Optional adapter override; omit to use config/tts.yaml's default provider
    rewrite_provider: "openai"  # Text LLM used to resolve "summarize this", "explain simply", etc.
                                 # against conversation history before speaking. Only used when
                                 # invoked mid-conversation with context; one-shot calls (e.g. curl)
                                 # with no history speak the input message verbatim.
    rewrite_model: "gpt-5.4-mini"  # Optional: specific model on rewrite_provider (defaults to
                                   # that provider's configured default model)
    capabilities:
      expose_as_skill: true
      skill_name: "Audio"
      skill_description: "Convert text into natural-sounding speech and get a downloadable audio file"
      # Phrases that boost the skill-intent embedding pre-filter (auto-routing).
      routing_examples:
        - "read this out loud"
        - "convert this to speech"
        - "say this out loud"
        - "generate audio of"
        - "text to speech"
        - "narrate this"
      retrieval_behavior: "none"
      formatting_style: "clean"
      supports_threading: false
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
        - "tts_voice"

    config:
      storage_backend: "filesystem"
      storage_root: "./uploads"
