  # =============================================================================
  # AGENT ADAPTER - Function Calling with Built-in Tools
  # =============================================================================
  # This adapter demonstrates function-calling capabilities inspired by
  # FunctionGemma patterns. Supports built-in tools (calculator, date_time,
  # json_transform) and HTTP-based tool calls defined in YAML templates.
  #
  # Key Features:
  # - YAML-defined tools with function_schema and execution config
  # - Configurable model for function calling (separate or same as inference)
  # - Built-in tools for common operations
  # - Response synthesis for natural language output
  - name: "intent-agent-example"
    enabled: false
    type: "retriever"
    datasource: "http"
    adapter: "intent"
    implementation: "retrievers.implementations.intent.IntentAgentRetriever"
    
    # Model configuration - supports both single-model and multi-model patterns
    inference_provider: "openai"
    model: "gpt-5.4-mini"              # Main inference model
    embedding_provider: "ollama"
    embedding_model: "nomic-embed-text:latest"
    
    capabilities:
      retrieval_behavior: "always"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: false
      supports_threading: false
      supports_autocomplete: true
      requires_api_key_validation: true
      context_format: "toon"  # Options: markdown_table, toon, csv (default: pipe-separated)
      context_max_tokens: 8000
      numeric_precision:
        decimal_places: 2    
    config:
      # Optional: Dedicated function-calling model (FunctionGemma-style)
      # If not set, uses main inference model for function calling
      function_model_provider: "ollama"
      function_model: "functiongemma"  # Uncomment to use separate function model
      
      # Tool/Template configuration
      domain_config_path: "examples/intent-templates/agent-template/domain.yaml"
      template_library_path:
        - "examples/intent-templates/agent-template/tools.yaml"
      
      # Vector store for template matching
      template_collection_name: "agent_tools"
      store_name: "chroma"
      confidence_threshold: 0.4
      max_templates: 5
      return_results: 10
      
      # Agent-specific settings
      enable_builtin_tools: true   # Enable calculator, date_time, json_transform
      function_output_format: "json"  # json or text
      synthesize_response: true    # Generate natural language response
      verbose: false               # Enable debug logging
      
      # Template loading settings
      reload_templates_on_start: false
      force_reload_templates: false
      
      # HTTP configuration (base_url required even for builtin tools)
      base_url: "http://localhost:8080"  # Placeholder for HTTP tools
      default_timeout: 30
    
    # Fault tolerance settings
    fault_tolerance:
      operation_timeout: 30.0
      failure_threshold: 5
      recovery_timeout: 60.0
      max_retries: 3
      retry_delay: 1.0