# Excel generation adapter — converts text/data into .xlsx files via openpyxl.
# Handled by DocumentGenerationStep; LLMInferenceStep is skipped for this adapter type.
adapters:
  - name: "excel-generator"
    enabled: true
    type: "document_generation"
    document_format: "xlsx"
    datasource: "none"
    adapter: "multimodal"
    implementation: "implementations.passthrough.multimodal.MultimodalImplementation"
    rewrite_provider: "openai"     # LLM used to produce the JSON document spec
    # rewrite_model: "gpt-5.4-mini" # Optional: override the model within rewrite_provider

    capabilities:
      expose_as_skill: true
      skill_name: "Excel"
      skill_description: "Generate Excel spreadsheets (.xlsx) from text descriptions or structured data"
      routing_examples:
        - "put this in a spreadsheet"
        - "make an excel file"
        - "create a spreadsheet"
        - "export this to excel"
        - "turn this into a table in excel"
      retrieval_behavior: "none"
      formatting_style: "clean"
      supports_threading: false
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"

    config:
      storage_backend: "filesystem"
      storage_root: "./uploads"
