# Passthrough/Conversational Adapters
# These adapters provide conversational capabilities without retrieval
# Includes voice chat, multilingual assistants, and local TTS options

adapters:
  - name: "simple-chat"
    enabled: true
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"
    # Provider overrides (optional - use when you want different providers than global defaults)
    inference_provider: "openai"  # Override default inference provider
    model: "gpt-5.4-mini"         # Specific model for this adapter (default / fallback)
    tts_provider: "openai"          # TTS provider for audio output (see tts.yaml)

    # Optional: clients may request any of these models at runtime via the "model" field.
    # If omitted, the adapter always uses the model defined above.
    allowed_models:
      - name: "minimax-m3"
        provider: "ollama_cloud"
        model: "minimax-m3"
      - name: "grok-4.3"
        provider: "xai"
        model: "grok-4.3"
      - name: "openai"
        provider: "openai"
        model: "gpt-5.4-mini"
      - name: "gpt-oss-120b"
        provider: "ollama_cloud"
        model: "gpt-oss:20b"
      - name: "claude"
        provider: "anthropic"
        model: "claude-sonnet-4-5-20250929"
      - name: "gemini"
        provider: "gemini"
        model: "gemini-3.1-pro-preview"
      - name: "fugu"
        provider: "fugu"
        model: "fugu"
      - name: "nemotron-3-ultra"
        provider: "openrouter"
        model: "nvidia/nemotron-3-ultra-550b-a55b"

    # Capabilities: Pure passthrough - no retrieval
    capabilities:
      available_skills:
        - "Image"
        - "Video"
        - "PDF"
        - "Word"
        - "Excel"
        - "PowerPoint"
        - "web-search"
        - "web-search-duckduckgo"
        - "mcp-agent"
        - "tender-notices"
        - "award-notices"
        - "contract-history"
        - "standing-offers"
        - "tender-notices"
        - "CSV"
        - "Markdown"
      retrieval_behavior: "none"         # No context retrieval (pure conversational)
      formatting_style: "standard"       # Standard formatting (not used since no retrieval)
      supports_file_ids: false           # Does not support file filtering
      supports_session_tracking: false   # Does not need session tracking
      requires_api_key_validation: false # No API key validation needed
      # Opportunistic MCP tool calling: the model may call these tools on any
      # turn without the client sending skill:"mcp-agent" — no adapter swap,
      # same thread throughout. Requires mcp_client.enabled: true AND
      # mcp_client.allow_opportunistic: true in config/mcp_client.yaml.
      # See docs/adapters/mcp-agent.md#opportunistic-mode.
      mcp_tools: false
      mcp_servers:
        - "business-sample"
