# Passthrough/Conversational Adapters
# These adapters provide conversational capabilities without retrieval
# Includes voice chat, multilingual assistants, and local TTS options

adapters:
  - name: "simple-chat"
    enabled: true
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"
    # Provider overrides (optional - use when you want different providers than global defaults)
    inference_provider: "openai"  # Override default inference provider
    model: "gpt-5.4-mini"         # Specific model for this adapter (default / fallback)
    tts_provider: "openai"          # TTS provider for audio output (see tts.yaml)

    # Optional: clients may request any of these models at runtime via the "model" field.
    # If omitted, the adapter always uses the model defined above.
    allowed_models:
      - name: "mistral"
        provider: "mistral"
        model: "mistral-small-2603"
      - name: "minimax-m3"
        provider: "ollama_cloud"
        model: "minimax-m3"
      - name: "grok-4.3"
        provider: "xai"
        model: "grok-4.3"
      - name: "openai"
        provider: "openai"
        model: "gpt-5.4-mini"
      - name: "gpt-oss-120b"
        provider: "ollama_cloud"
        model: "gpt-oss:20b"
      - name: "claude"
        provider: "anthropic"
        model: "claude-sonnet-4-5-20250929"
      - name: "gemini"
        provider: "gemini"
        model: "gemini-3.1-pro-preview"
      - name: "fugu"
        provider: "fugu"
        model: "fugu"
      - name: "nemotron-3-ultra"
        provider: "openrouter"
        model: "nvidia/nemotron-3-ultra-550b-a55b"

    # Capabilities: Pure passthrough - no retrieval
    capabilities:
      # ORBIT-only skills: auto-routed from natural language, NOT user-invokable.
      # They're intentionally kept out of available_skills, so the / picker won't
      # show them and an explicit skill=<name> for one of these is rejected.
      auto_routable_skills:
        - "Image"
        - "Video"
        - "PDF"
        - "Word"
        - "Excel"
        - "PowerPoint"
        - "CSV"
        - "Markdown"
        - "web-search"
        - "web-search-duckduckgo"
      # Explicitly-invokable skills (via / picker or skill=). These are NOT
      # auto-routable (retrieval/intent skills + the explicit mcp-agent skill),
      # so they stay here to remain reachable at all.
      available_skills:
        - "mcp-agent"
        - "HR"
        - "business-analytics"
        - "customer-orders"
      retrieval_behavior: "none"         # No context retrieval (pure conversational)
      formatting_style: "standard"       # Standard formatting (not used since no retrieval)
      supports_file_ids: false           # Does not support file filtering
      supports_session_tracking: false   # Does not need session tracking
      requires_api_key_validation: false # No API key validation needed
      # Automatic skill intent detection: infer a skill (PDF, Image, web-search, ...)
      # from plain natural language without the client sending skill=<name>.
      # Requires skill_routing.auto_detect: true in config.yaml to take effect.
      # NOTE: this adapter also has mcp_tools below — skill detection runs first,
      # so a matched skill preempts the MCP loop for that turn (retrieval skills
      # and mcp-agent are never auto-routed). See docs/adapters/auto-skill-intent-detection.md
      auto_skill_routing: true
      # Opportunistic MCP tool calling: the model may call these tools on any
      # turn without the client sending skill:"mcp-agent" — no adapter swap,
      # same thread throughout. Requires mcp_client.enabled: true AND
      # mcp_client.allow_opportunistic: true in config/mcp_client.yaml.
      # See docs/adapters/mcp-agent.md#opportunistic-mode.
      mcp_tools: false
      mcp_servers:
        - "business-sample"
