# Dedicated video generation adapter — converts text prompts to short videos via Veo 2.
  # Handled by VideoGenerationStep; LLMInferenceStep is skipped for this adapter type.
adapters:
  - name: "video-generator"
    enabled: true
    expose_as_skill: true
    skill_name: "video-generation"
    skill_description: "Generate short videos from text descriptions using AI (Veo 2)"
    type: "video_generation"
    datasource: "none"
    adapter: "multimodal"
    implementation: "implementations.passthrough.multimodal.MultimodalImplementation"
    video_provider: "gemini"            # Optional adapter override; omit to use config/video.yaml
    rewrite_provider: "deepseek"          # Text LLM used to enrich prompts before video generation

    capabilities:
      retrieval_behavior: "none"
      formatting_style: "clean"
      supports_threading: false
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
