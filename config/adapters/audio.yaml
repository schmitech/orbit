# Audio Adapters
# Audio file transcription, regular (request/response) voice chat with STT/TTS,
# and real-time speech-to-speech (STS) providers (OpenAI Realtime, Gemini Live).
#
# Real-time STS adapters (type: openai_realtime / openai_realtime_translation /
# gemini_live) are served over the WebSocket endpoint in server/routes/voice_routes.py
# and speak directly, with no discrete STT -> LLM -> TTS round trip. All other
# adapters here are regular request/response voice: submit audio_input to the
# normal chat completions endpoint and get an audio reply back.
#
# To load these adapters, include this file from config/adapters.yaml import list, e.g.:
#   - "adapters/audio.yaml"

adapters:
  # Audio transcription adapter - specialized for transcribing audio files
  - name: "audio-transcription"
    enabled: true
    type: "retriever"
    datasource: "none"
    adapter: "file"
    implementation: "retrievers.implementations.file.file_retriever.FileVectorRetriever"
    inference_provider: "openrouter"
    model: "nvidia/nemotron-3-ultra-550b-a55b"
    embedding_provider: "openai"
    embedding_model: "text-embedding-3-small"
    stt_provider: "cohere"
    
    # Capabilities: Audio file transcription
    capabilities:
      retrieval_behavior: "conditional"
      formatting_style: "clean"
      supports_file_ids: true
      supports_session_tracking: false
      requires_api_key_validation: true
      skip_when_no_files: true
      optional_parameters:
        - "file_ids"
        - "api_key"
        - "transcription_language"  # Optional: specify language

    config:
      # Storage configuration
      storage_backend: "filesystem"
      storage_root: "./uploads"
      max_file_size: 104857600  # 100MB for audio files

      # Audio-specific settings
      enable_audio_transcription: true
      transcription_language: null  # Auto-detect, or "en-US", "fr-FR", etc.
      transcription_format: "text"   # Return format: "text", "json", "srt", "vtt"

      # Supported audio formats
      supported_types:
        - "audio/wav"
        - "audio/mpeg"
        - "audio/mp3"
        - "audio/mp4"
        - "audio/ogg"
        - "audio/flac"
        - "audio/webm"

      # Vector store for transcribed text
      vector_store: "chroma"
      collection_prefix: "audio_transcriptions_"

      chunking_strategy: "recursive"
      chunk_size: 2000  # Larger chunks for transcriptions
      chunk_overlap: 200

      confidence_threshold: 0.3
      max_results: 10
      return_results: 5

# Voice chat adapter - accepts audio input and returns audio responses
  - name: "voice-chat"
    enabled: true
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    stt_provider: "openai"       # STT provider (see stt.yaml) - local, free!
    tts_provider: "openai"    # TTS provider (see tts.yaml) - premium quality

    # Capabilities: Voice-enabled chat
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "audio_input"      # Base64-encoded audio data
        - "audio_format"    # Input audio format (mp3, wav, etc.)
        - "language"        # Language code for STT
        - "session_id"
        - "return_audio"     # Whether to return audio response
        - "tts_voice"        # Voice for TTS (alloy, echo, fable, etc.)

    config:
      # Audio processing settings
      audio_input_enabled: true
      audio_output_enabled: true
      stt_language: "en-US"     # Default language for speech-to-text
      tts_format: "wav"         # Default output format
      return_text: true         # Also return text alongside audio
      return_audio: true        # Return audio response

  # Multilingual voice assistant - supports translation and voice I/O
  - name: "multilingual-voice-assistant"
    enabled: false
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    stt_provider: "gemini"    # STT provider (see stt.yaml)
    tts_provider: "gemini"    # TTS provider (see tts.yaml)

    # Capabilities: Multilingual voice assistant
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "audio_input"
        - "source_language"    # Language of input audio
        - "target_language"    # Language for output audio
        - "session_id"

    config:
      # Language settings
      default_source_language: "auto"  # Auto-detect input language
      default_target_language: "en-US" # Default output language

      # Google TTS settings (multilingual)
      tts_model: "neural2"
      tts_voice: "en-US-Neural2-A"
      tts_language_code: "en-US"
      tts_audio_encoding: "MP3"

      # Google STT settings
      stt_model: "latest_long"
      stt_language_code: "en-US"
      stt_sample_rate: 16000
      stt_encoding: "LINEAR16"

      # Audio I/O
      audio_input_enabled: true
      audio_output_enabled: true
      return_text: true
      return_audio: true

  # Premium voice chat with ElevenLabs (high-quality TTS)
  - name: "premium-voice-chat"
    enabled: false
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    stt_provider: "whisper"       # STT provider (see stt.yaml) - local, free!
    tts_provider: "elevenlabs"    # TTS provider (see tts.yaml) - premium quality

    # Capabilities: Premium voice output
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "voice_id"           # ElevenLabs voice ID
        - "session_id"
        - "return_audio"       # Return audio response

    config:
      # ElevenLabs TTS settings
      tts_model: "eleven_multilingual_v2"
      tts_voice: "5opxviIE64D8KxYYJKpx"
      tts_format: "mp3_44100_128"
      tts_stability: 0.5
      tts_similarity_boost: 0.75
      tts_style: 0.0
      tts_use_speaker_boost: true

      # Audio output
      audio_output_enabled: true
      return_text: true
      return_audio: true

  # Hybrid local voice chat - Whisper STT + vLLM TTS (fully local, no API costs!)
  - name: "vllm-voice-chat-hybrid"
    enabled: false
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    stt_provider: "whisper"   # STT provider (see stt.yaml) - local, free!
    tts_provider: "vllm"      # TTS provider (see tts.yaml) - local Orpheus model

    # Capabilities: Voice output with local TTS
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
        - "return_audio"
        - "tts_voice"

    config:
      # vLLM TTS settings (local, no API key needed)
      tts_model: "canopylabs/orpheus-3b-0.1-ft"
      tts_voice: "tara"  # Options: tara, leah, jess, leo, dan, mia, zac, zoe
      tts_format: "mp3"

      # Audio output
      audio_input_enabled: true   # STT via Whisper
      audio_output_enabled: true
      return_text: true
      return_audio: true

  # Coqui TTS voice chat - Local, open-source text-to-speech (no API costs!)
  # Text input → High-quality audio output using Coqui TTS models
  # Runs completely locally - perfect for privacy-focused applications
  - name: "coqui-voice-chat"
    enabled: false
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    tts_provider: "coqui"  # TTS provider (see tts.yaml) - local, free!

    # Capabilities: Voice output with local TTS
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
        - "return_audio"
        - "tts_voice"      # Speaker name for multi-speaker models
        - "tts_language"   # Language for multilingual models

    config:
      # Coqui TTS settings (local, no API key needed)
      tts_model: "tts_models/en/ljspeech/tacotron2-DDC"  # Default English model
      vocoder_model: "vocoder_models/en/ljspeech/hifigan_v2"  # High-quality vocoder
      tts_format: "wav"
      tts_speed: 1.0  # Speech speed multiplier

      # Popular model alternatives (uncomment to use):
      # Multi-speaker English: "tts_models/en/vctk/vits"
      # Multilingual with voice cloning: "tts_models/multilingual/multi-dataset/xtts_v2"
      # Fast synthesis: "tts_models/en/ljspeech/glow-tts"

      # Audio output
      audio_input_enabled: false  # Text input only
      audio_output_enabled: true
      return_text: true
      return_audio: true

  # Fully local voice chat - Whisper STT + Coqui TTS (100% free, no API costs!)
  # Complete voice-to-voice conversation using only open-source models
  # Perfect for: privacy, offline use, cost optimization, self-hosted deployments
  - name: "local-voice-chat-coqui-whisper"
    enabled: false
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides - ALL LOCAL
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    stt_provider: "whisper"   # STT provider (see stt.yaml) - local, free!
    tts_provider: "coqui"     # TTS provider (see tts.yaml) - local, free!

    # Capabilities: Fully local voice assistant
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
        - "return_audio"
        - "tts_voice"
        - "tts_language"

    config:
      # Coqui TTS configuration
      tts_model: "tts_models/en/vctk/vits"  # Multi-speaker model for variety
      tts_speaker: null  # Can specify speaker for multi-speaker models
      tts_language: "en"
      tts_format: "wav"
      tts_speed: 1.0

      # Device selection (auto uses GPU if available)
      device: "auto"  # Options: auto, cpu, cuda

      # Audio I/O
      audio_input_enabled: true   # STT via Whisper
      audio_output_enabled: true
      return_text: true
      return_audio: true

      # Performance notes:
      # - Tacotron2 + HiFiGAN: High quality, moderate speed
      # - VITS: Fast synthesis, built-in vocoder, multi-speaker support
      # - XTTS v2: Best for voice cloning and multilingual (99 languages)
      # - GlowTTS: Fastest synthesis, good for real-time applications
      #
      # GPU acceleration:
      # - CUDA-enabled GPU provides 5-10x faster synthesis
      # - CPU mode works on any machine but slower
      #
      # Zero cost operation:
      # - No API calls or subscriptions
      # - Models downloaded once, cached locally
      # - Perfect for high-volume applications

  # Hybrid local-cloud voice chat - Whisper STT (local) + Coqui TTS (local) + Cloud LLM
  # Best of both worlds: free audio processing + powerful cloud inference
  - name: "hybrid-voice-chat-local-audio"
    enabled: false  # Enable when you want local audio processing with cloud LLM
    type: "passthrough"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    # Provider overrides
    inference_provider: "openai"  # Use cloud LLM for best quality
    model: "gpt-5.4-mini"
    stt_provider: "whisper"   # STT provider (see stt.yaml) - local, free!
    tts_provider: "coqui"     # TTS provider (see tts.yaml) - local, free!

    # Capabilities
    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      optional_parameters:
        - "session_id"
        - "return_audio"

    config:
      # Coqui TTS - optimized for quality
      tts_model: "tts_models/multilingual/multi-dataset/xtts_v2"  # Best quality, multilingual
      tts_language: "en"
      tts_format: "wav"
      tts_speed: 1.0
      device: "cuda"  # Use GPU for best performance

      # Audio output
      audio_input_enabled: true   # STT via Whisper
      audio_output_enabled: true
      return_text: true
      return_audio: true

      # Cost optimization:
      # - STT: Free (local Whisper)
      # - TTS: Free (local Coqui)
      # - LLM: Pay only for cloud inference
      # - Typical savings: 70-90% vs full cloud pipeline

  # OpenAI Realtime API (GA WebSocket) — speech-to-speech via wss://api.openai.com/v1/realtime
  # Requires OPENAI_API_KEY. Test separately: ws://<host>:<port>/ws/voice/open-ai-real-time-voice-chat
  # Client: same protocol as real-time-voice-chat (PCM16 mono 24kHz base64 audio_chunk).
  # Docs: https://developers.openai.com/api/docs/guides/realtime
  - name: "open-ai-real-time-voice-chat"
    enabled: true
    type: "openai_realtime"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      supports_interruption: true
      supports_realtime_audio: true
      optional_parameters:
        - "session_id"
        - "user_id"

    config:
      # Realtime session (see OpenAI Realtime session.update)
      realtime_model: "gpt-realtime"
      realtime_voice: "marin"
      enable_input_transcription: true
      input_transcription_model: "whisper-1"
      # Server VAD (turn detection) — higher silence avoids cutting you off mid-thought
      vad_prefix_padding_ms: 300
      vad_silence_duration_ms: 1000
      vad_threshold: 0.65
      # When true, server VAD can cancel the model reply if it thinks you started speaking (can sound "cut off")
      realtime_interrupt_response: false
      openai_connection_timeout_seconds: 60
      # Set true only if you still use the Realtime beta interface (adds OpenAI-Beta: realtime=v1)
      use_realtime_beta_header: false

  # Gemini Live (WebSocket, via google-genai SDK) — speech-to-speech.
  # Requires GOOGLE_API_KEY (or GEMINI_API_KEY). Test separately: ws://<host>:<port>/ws/voice/gemini-live-voice-chat
  # Client: same protocol as real-time-voice-chat (PCM16 mono 24kHz base64 audio_chunk) —
  # the server resamples 24kHz client audio down to the 16kHz Gemini Live requires.
  # Docs: https://ai.google.dev/gemini-api/docs/live-api
  - name: "gemini-live-voice-chat"
    enabled: true
    type: "gemini_live"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      supports_interruption: true
      supports_realtime_audio: true
      optional_parameters:
        - "session_id"
        - "user_id"

    config:
      # Realtime session (see Gemini Live LiveConnectConfig)
      realtime_model: "gemini-3.1-flash-live-preview"
      realtime_voice: "Puck"
      enable_input_transcription: true
      enable_output_transcription: true
      # Automatic activity detection (VAD / turn detection)
      vad_prefix_padding_ms: 300
      vad_silence_duration_ms: 1000

  # OpenAI Realtime Translation (WebSocket) — speech-to-speech translation via
  #   wss://api.openai.com/v1/realtime/translations
  # Stateless interpreter: no VAD, no instructions, no response lifecycle. Streams
  # translated speech + text continuously. Requires OPENAI_API_KEY.
  # NOTE: This adapter does NOT use a system prompt — the translation endpoint does
  # not accept `instructions`. Behavior is fixed and controlled only by target_language.
  # (examples/prompts/audio/open-ai-real-time-translation-prompt.md is documentation-only.)
  # Test: ws://<host>:<port>/ws/voice/open-ai-real-time-translation?target_language=fr
  # Same client protocol as real-time-voice-chat (PCM16 mono 24kHz base64 audio_chunk).
  # Docs: https://developers.openai.com/api/docs/guides/realtime-translation
  - name: "open-ai-real-time-translation"
    enabled: true
    type: "openai_realtime_translation"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"

    capabilities:
      retrieval_behavior: "none"
      formatting_style: "standard"
      supports_file_ids: false
      supports_session_tracking: true
      requires_api_key_validation: false
      supports_interruption: false
      supports_realtime_audio: true
      optional_parameters:
        - "session_id"
        - "user_id"
        - "target_language"

    config:
      realtime_model: "gpt-realtime-translate"
      # Default target language (ISO code). Override per-connection via ?target_language=
      target_language: "es"
      openai_connection_timeout_seconds: 60
