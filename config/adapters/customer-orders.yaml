# Intent Retriever Adapters
# These adapters use intent classification to generate queries from natural language
# Supports SQL, DuckDB, PostgreSQL, Elasticsearch, MongoDB, HTTP APIs, and Firecrawl

adapters:
  - name: "intent-sql-postgres"
    enabled: true
    type: "retriever"
    datasource: "postgres"
    adapter: "intent"
    implementation: "retrievers.implementations.intent.IntentPostgreSQLRetriever"
    inference_provider: "openai"
    model: "gpt-5.4-mini"
    embedding_provider: "ollama"
    embedding_model: "nomic-embed-text:latest"
    reranker_provider: "cohere"

    # Capabilities: Standard intent retriever
    # Note: Intent adapters use the same capabilities as QA adapters (always retrieve, standard formatting)
    allowed_models:
      - name: "llama-cpp-gemma4"
        provider: "llama_cpp"
        model: "gemma4-e2b-direct-cpu"
      - name: "ollama-gemma4-e2b"
        provider: "ollama"
        model: "gemma4-e2b-cpu"
      - name: "deepseek"
        provider: "deepseek"
        model: "deepseek-chat"
      - name: "cohere"
        provider: "cohere"
        model: "command-a-03-2025"
      - name: "ollama-gpt-oss-120b"
        provider: "ollama_cloud"
        model: "gpt-oss:120b"
      - name: "claude-sonnet-4-5"
        provider: "anthropic"
        model: "claude-sonnet-4-5-20250929"
      - name: "gemini-3.1-pro-preview"
        provider: "gemini"
        model: "gemini-3.1-pro-preview"
      - name: "openai"
        provider: "openai"
        model: "gpt-4.5-mini"
    capabilities:
      expose_as_skill: true
      skill_name: "customer-orders"
      skill_description: "Customer Orders Skills"
      retrieval_behavior: "always"       # Always retrieves matching intents/templates
      formatting_style: "standard"       # Standard format with citations and confidence scores
      supports_file_ids: false           # Does not support file filtering
      supports_session_tracking: false   # Does not need session tracking
      requires_api_key_validation: false # API key used for access control only
      available_skills:
        - "Image"
        - "Video"
        - "PDF"
        - "Word"
        - "Excel"
        - "PowerPoint"
      supports_autocomplete: true
      supports_threading: true
      context_format: "toon"  # Options: markdown_table, toon, csv (default: pipe-separated)
      context_max_tokens: 8000
      numeric_precision:
        decimal_places: 2
      optional_parameters:
        - "api_key"

    config:
      # Path to the domain definition file
      domain_config_path: "examples/intent-templates/sql-intent-template/postgres/customer-orders/customer_order_domain.yaml"
      template_library_path:
        - "examples/intent-templates/sql-intent-template/postgres/customer-orders/customer_orders_templates.yaml"
        - "examples/intent-templates/sql-intent-template/postgres/customer-orders/business_intelligence_templates.yaml"
        - "examples/intent-templates/sql-intent-template/postgres/customer-orders/advanced_analytics_templates.yaml"
        - "examples/intent-templates/sql-intent-template/postgres/customer-orders/comparative_analysis_templates.yaml"
      # Name for the vector store collection for templates
      reranker_top_n: 100      # Optional: limit reranked results (overrides return_results)
      template_collection_name: "intent_query_templates"
      # Store configuration - references stores.yaml
      store_name: "chroma"
      confidence_threshold: 0.5
      # Maximum templates to consider
      max_templates: 5
      # Return top N results
      return_results: 100

      # Template loading settings
      reload_templates_on_start: false  # Whether to reload templates on startup
      force_reload_templates: false  # Force reload even if templates exist in storage

      # Unified retriever features
      use_connection_pool: true  # Enable connection pooling
      pool_size: 10  # Connection pool size (match DB worker count)
      connection_timeout: 5  # Fail fast under load (seconds)
      statement_timeout: 10000  # Kill runaway queries after 10s (ms)

      # Query monitoring (automatically provided by new base)
      enable_query_monitoring: true
      query_timeout: 5000  # 5 seconds

  # Reuses intent-sql-postgres for per-turn realtime voice grounding without
  # changing the retriever's result limit for existing text clients.
  - name: "customer-orders-realtime-voice"
    enabled: false
    type: "openai_realtime"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"
    capabilities:
      retrieval_behavior: "none"
      supports_realtime_audio: true
      supports_interruption: true
    config:
      realtime_model: "gpt-realtime"
      realtime_voice: "marin"
      enable_input_transcription: true
      grounding_adapter: "intent-sql-postgres"
      grounding_tool_name: "lookup_customer_orders"
      grounding_tool_description: "Look up customer order facts, statuses, and totals."
      grounding_max_rows: 3
      grounding_max_answer_chars: 600

  - name: "customer-orders-gemini-realtime-voice"
    enabled: false
    type: "gemini_live"
    datasource: "none"
    adapter: "conversational"
    implementation: "implementations.passthrough.conversational.ConversationalImplementation"
    capabilities:
      retrieval_behavior: "none"
      supports_realtime_audio: true
      supports_interruption: true
    config:
      realtime_model: "gemini-3.1-flash-live-preview"
      realtime_voice: "Leda"
      enable_input_transcription: true
      enable_output_transcription: true
      grounding_adapter: "intent-sql-postgres"
      grounding_tool_name: "lookup_customer_orders"
      grounding_tool_description: "Look up customer order facts, statuses, and totals."
      grounding_max_rows: 3
      grounding_max_answer_chars: 600
