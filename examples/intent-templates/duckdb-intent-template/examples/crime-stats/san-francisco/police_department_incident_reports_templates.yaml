  - Which months in San Francisco had abnormal crime levels compared to past years?
  - How does each month in 2023 compare to the long-term SF crime average?
  - Are there any outlier months for San Francisco police incidents this year?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
