- id: assault_analysis
  description: Detailed analysis of assault incidents in San Francisco
  sql: |
    SELECT
      incident_year,
      COUNT(*) AS assault_count,
      SUM(CASE WHEN incident_subcategory = 'Aggravated Assault' THEN 1 ELSE 0 END) AS aggravated,
      SUM(CASE WHEN incident_subcategory = 'Simple Assault' THEN 1 ELSE 0 END) AS simple,
      COUNT(DISTINCT analysis_neighborhood) AS affected_neighborhoods
    FROM sf_incident_reports
    WHERE incident_category = 'Assault'
    GROUP BY incident_year
    ORDER BY incident_year DESC
