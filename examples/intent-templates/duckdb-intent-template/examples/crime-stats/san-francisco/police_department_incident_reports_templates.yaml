- id: weekend_vs_weekday_by_category
  description: Compare weekend vs weekday incident rates per category for shift staffing decisions
  sql: |
    WITH daily AS (
      SELECT
        incident_category,
        incident_day_of_week,
        CASE WHEN incident_day_of_week IN ('Saturday', 'Sunday') THEN 'Weekend' ELSE 'Weekday' END AS day_type,
        COUNT(*) AS incidents
      FROM sf_incident_reports
      WHERE incident_year = :year AND incident_category IS NOT NULL
      GROUP BY incident_category, incident_day_of_week
    ),
    averages AS (
      SELECT
        incident_category,
        ROUND(SUM(CASE WHEN day_type = 'Weekend' THEN incidents ELSE 0 END) * 1.0 / 2, 1) AS avg_weekend_per_day,
        ROUND(SUM(CASE WHEN day_type = 'Weekday' THEN incidents ELSE 0 END) * 1.0 / 5, 1) AS avg_weekday_per_day,
        SUM(incidents) AS total
      FROM daily
      GROUP BY incident_category
    )
    SELECT
      incident_category,
      avg_weekend_per_day,
      avg_weekday_per_day,
      ROUND(avg_weekend_per_day / NULLIF(avg_weekday_per_day, 0), 2) AS weekend_to_weekday_ratio,
      total
    FROM averages
    WHERE total >= 50
    ORDER BY weekend_to_weekday_ratio DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which SF crimes are worse on weekends vs weekdays?
  - Weekend vs weekday incident comparison in San Francisco
  - Do more assaults happen on weekends in SF?
  - San Francisco weekend crime ratio by category
  - Should SFPD staff more officers on weekends based on incident data?
  - Which SF incident types spike on weekends in 2024?
  - Weekend-to-weekday crime ratio for San Francisco
  - Are robberies more of a weekend problem in SF?
  - SF shift staffing analysis based on weekend vs weekday incidents
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: sf_incident_reports
    qualifiers: [weekend, weekday, staffing]
  tags: [policy, staffing, operational, weekend]

- id: crime_type_seasonality
  description: Seasonal breakdown (winter/spring/summer/fall) by incident category for staffing
  sql: |
    SELECT
      incident_category,
      SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (12, 1, 2) THEN 1 ELSE 0 END) AS winter,
      SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (3, 4, 5) THEN 1 ELSE 0 END) AS spring,
      SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (6, 7, 8) THEN 1 ELSE 0 END) AS summer,
      SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (9, 10, 11) THEN 1 ELSE 0 END) AS fall,
      COUNT(*) AS total,
      CASE
        WHEN SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (6, 7, 8) THEN 1 ELSE 0 END) =
             GREATEST(
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (12, 1, 2) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (3, 4, 5) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (6, 7, 8) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (9, 10, 11) THEN 1 ELSE 0 END)
             ) THEN 'Summer'
        WHEN SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (9, 10, 11) THEN 1 ELSE 0 END) =
             GREATEST(
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (12, 1, 2) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (3, 4, 5) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (6, 7, 8) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (9, 10, 11) THEN 1 ELSE 0 END)
             ) THEN 'Fall'
        WHEN SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (3, 4, 5) THEN 1 ELSE 0 END) =
             GREATEST(
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (12, 1, 2) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (3, 4, 5) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (6, 7, 8) THEN 1 ELSE 0 END),
               SUM(CASE WHEN EXTRACT(MONTH FROM incident_date) IN (9, 10, 11) THEN 1 ELSE 0 END)
             ) THEN 'Spring'
        ELSE 'Winter'
      END AS peak_season
    FROM sf_incident_reports
    WHERE incident_year = :year AND incident_date IS NOT NULL AND incident_category IS NOT NULL
    GROUP BY incident_category
    HAVING COUNT(*) >= 50
    ORDER BY total DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which SF crimes peak in summer vs winter?
  - Seasonal crime patterns by category in San Francisco
