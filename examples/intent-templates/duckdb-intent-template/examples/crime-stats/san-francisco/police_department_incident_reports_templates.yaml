- id: crime_concentration
  description: How concentrated is crime across SF neighborhoods
  sql: |
    WITH ranked AS (
      SELECT
        analysis_neighborhood,
        COUNT(*) AS incidents,
        SUM(COUNT(*)) OVER () AS total,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM sf_incident_reports
      WHERE incident_year = :year AND analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood
    )
    SELECT
      CASE
        WHEN rank <= 5 THEN 'Top 5 neighborhoods'
        WHEN rank <= 10 THEN 'Top 6-10'
        WHEN rank <= 20 THEN 'Top 11-20'
        ELSE 'All others'
      END AS tier,
      SUM(incidents) AS incidents,
      ROUND(SUM(incidents) * 100.0 / MAX(total), 1) AS pct_of_total,
      COUNT(*) AS neighborhood_count
    FROM ranked
    GROUP BY CASE
      WHEN rank <= 5 THEN 'Top 5 neighborhoods'
      WHEN rank <= 10 THEN 'Top 6-10'
      WHEN rank <= 20 THEN 'Top 11-20'
      ELSE 'All others'
    END
    ORDER BY MIN(rank)
