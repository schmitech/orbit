- id: year_over_year_comparison
  description: Compare crime statistics between two years in San Francisco
  sql: |
    SELECT
      :current_year AS current_year,
      :previous_year AS previous_year,
      (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :current_year) AS current_incidents,
      (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :previous_year) AS previous_incidents,
      ROUND(((SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :current_year) -
             (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :previous_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :previous_year), 0), 1) AS change_pct
  parameters:
  - name: current_year
    type: integer
    description: Current year to compare
    required: false
    default: 2024
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2023
  nl_examples:
  - Compare 2024 to 2023 SF crime rates
  - Year over year change in San Francisco crime
  - How much has SF crime increased?
  - Compare this year to last year for San Francisco incidents
  - San Francisco crime trend comparison
  - What is the percentage change in SF crime from 2022 to 2023?
  - Did San Francisco crime go up or down between 2023 and 2024?
  - How does SF 2024 stack up against 2023 for total incidents?
  - Is San Francisco crime getting worse compared to last year?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: sf_incident_reports
    qualifiers: [yearly, change]
  tags: [comparison, yearly, trend]

