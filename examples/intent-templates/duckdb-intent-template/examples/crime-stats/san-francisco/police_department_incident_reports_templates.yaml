- id: multi_year_cagr_by_type
  description: Compound annual growth rate for each SF incident category over the full dataset
  sql: |
    WITH first_last AS (
      SELECT
        incident_category,
        MIN(incident_year) AS first_year,
        MAX(incident_year) AS last_year,
        SUM(CASE WHEN incident_year = (SELECT MIN(incident_year) FROM sf_incident_reports) THEN 1 ELSE 0 END) AS first_count,
        SUM(CASE WHEN incident_year = :year THEN 1 ELSE 0 END) AS last_count
      FROM sf_incident_reports
      WHERE incident_category IS NOT NULL
      GROUP BY incident_category
      HAVING SUM(CASE WHEN incident_year = (SELECT MIN(incident_year) FROM sf_incident_reports) THEN 1 ELSE 0 END) >= 20
         AND SUM(CASE WHEN incident_year = :year THEN 1 ELSE 0 END) >= 20
    )
    SELECT
      incident_category,
      first_count AS baseline_count,
      last_count AS current_count,
      :year - first_year AS years,
      ROUND((POWER(last_count * 1.0 / NULLIF(first_count, 0), 1.0 / NULLIF(:year - first_year, 0)) - 1) * 100, 1) AS cagr_pct,
      CASE
        WHEN POWER(last_count * 1.0 / NULLIF(first_count, 0), 1.0 / NULLIF(:year - first_year, 0)) - 1 > 0.05 THEN 'Growing fast'
        WHEN POWER(last_count * 1.0 / NULLIF(first_count, 0), 1.0 / NULLIF(:year - first_year, 0)) - 1 > 0 THEN 'Slowly growing'
        WHEN POWER(last_count * 1.0 / NULLIF(first_count, 0), 1.0 / NULLIF(:year - first_year, 0)) - 1 > -0.05 THEN 'Slowly declining'
        ELSE 'Declining fast'
      END AS trend_direction
    FROM first_last
    ORDER BY cagr_pct DESC
  parameters:
  - name: year
    type: integer
    description: End year for CAGR calculation
    required: false
    default: 2024
  nl_examples:
  - What is the long-term growth rate for each SF crime type?
  - San Francisco compound annual growth rate by incident category
  - Which SF crimes have been growing steadily over the years?
  - Long-term crime trend direction for each category in San Francisco
