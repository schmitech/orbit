- id: neighborhood_surge_by_range
  description: Which SF neighborhoods saw the biggest crime surge between two arbitrary years
  sql: |
    WITH start_counts AS (
      SELECT analysis_neighborhood, COUNT(*) AS start_incidents
      FROM sf_incident_reports
      WHERE incident_year = :start_year AND analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood
    ),
    end_counts AS (
      SELECT analysis_neighborhood, COUNT(*) AS end_incidents
      FROM sf_incident_reports
      WHERE incident_year = :end_year AND analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood
    )
    SELECT
      e.analysis_neighborhood,
      s.start_incidents,
      e.end_incidents,
      e.end_incidents - s.start_incidents AS absolute_change,
      ROUND((e.end_incidents - s.start_incidents) * 100.0 / NULLIF(s.start_incidents, 0), 1) AS pct_change
    FROM end_counts e
    JOIN start_counts s ON e.analysis_neighborhood = s.analysis_neighborhood
    WHERE s.start_incidents >= :min_baseline
    ORDER BY pct_change DESC
    LIMIT :limit
  parameters:
  - name: start_year
    type: integer
    description: Start year of the range
    required: false
    default: 2018
  - name: end_year
    type: integer
    description: End year of the range
    required: false
    default: 2024
  - name: min_baseline
    type: integer
    description: Minimum incidents in start year to filter noise
    required: false
    default: 50
  - name: limit
    type: integer
    description: Number of results
    required: false
    default: 15
  nl_examples:
  - Where was San Francisco crime surging between 2018 and 2022?
  - Which SF neighborhoods had the biggest crime increase from 2019 to 2024?
  - Compare neighborhood crime levels between two years in San Francisco
  - SF neighborhoods with the most growth in incidents from 2020 to 2023
