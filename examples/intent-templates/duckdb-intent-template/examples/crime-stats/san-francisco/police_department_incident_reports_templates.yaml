- id: location_disparity
  description: Compare each SF neighborhood's crime rate to the citywide average — equity analysis
  sql: |
    WITH neighborhood_counts AS (
      SELECT
        analysis_neighborhood,
        COUNT(*) AS incidents
      FROM sf_incident_reports
      WHERE incident_year = :year AND analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood
    ),
    city_avg AS (
      SELECT ROUND(AVG(incidents), 1) AS avg_incidents FROM neighborhood_counts
    )
    SELECT
      n.analysis_neighborhood,
      n.incidents,
      c.avg_incidents AS city_average,
      n.incidents - c.avg_incidents AS difference,
      ROUND((n.incidents - c.avg_incidents) * 100.0 / NULLIF(c.avg_incidents, 0), 1) AS pct_above_below_avg,
      CASE
        WHEN n.incidents > c.avg_incidents * 2 THEN 'Far above average'
        WHEN n.incidents > c.avg_incidents * 1.25 THEN 'Above average'
        WHEN n.incidents > c.avg_incidents * 0.75 THEN 'Near average'
        WHEN n.incidents > c.avg_incidents * 0.5 THEN 'Below average'
        ELSE 'Far below average'
      END AS disparity_tier
    FROM neighborhood_counts n
    CROSS JOIN city_avg c
    ORDER BY n.incidents DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which SF neighborhoods have crime far above the city average?
  - San Francisco neighborhood crime disparity analysis
  - How does each SF neighborhood compare to the citywide average for incidents?
  - Crime equity analysis across San Francisco neighborhoods
  - Which SF neighborhoods are above or below average for crime in 2024?
