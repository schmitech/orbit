- id: yearly_incident_trends
  description: Track year-over-year changes in police incidents across San Francisco
  sql: |
    SELECT
      incident_year,
      COUNT(*) AS total_incidents,
      COUNT(DISTINCT incident_category) AS unique_categories,
      COUNT(DISTINCT analysis_neighborhood) AS affected_neighborhoods
    FROM sf_incident_reports
    GROUP BY incident_year
    ORDER BY incident_year DESC
  parameters: []
  nl_examples:
  - How has crime changed over the years in San Francisco?
  - Show me yearly SF police incident trends
  - What is the year-over-year San Francisco crime rate?
  - Is crime increasing or decreasing in San Francisco?
  - Track San Francisco police incidents over time
  - Year-over-year comparison of total SF incidents
  - How bad was San Francisco crime in 2023 compared to previous years?
  - Are things getting worse in SF crime-wise?
  - What does the long-term San Francisco crime trend look like?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: sf_incident_reports
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, crime-stats]

- id: incidents_by_month
  description: Analyze monthly crime patterns to identify seasonal trends in SF
  sql: |
    SELECT
      EXTRACT(MONTH FROM incident_date) AS month,
      CASE EXTRACT(MONTH FROM incident_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS incident_count
    FROM sf_incident_reports
    WHERE incident_year = :year AND incident_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM incident_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most crime in San Francisco?
  - Show me seasonal crime patterns in SF
  - When do most incidents happen in San Francisco?
  - Monthly crime breakdown for San Francisco
  - Peak months for crime in SF
  - What month had the highest crime in San Francisco in 2024?
  - Crime by month in SF in 2023
  - Is summer or winter worse for crime in San Francisco?
  - Monthly incident count for San Francisco
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: sf_incident_reports
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns, trends]

- id: incidents_by_hour
  description: Analyze when incidents occur throughout the day in San Francisco
  sql: |
    SELECT
      CAST(LEFT(incident_time, 2) AS INTEGER) AS hour,
      CASE
        WHEN CAST(LEFT(incident_time, 2) AS INTEGER) BETWEEN 6 AND 11 THEN 'Morning'
        WHEN CAST(LEFT(incident_time, 2) AS INTEGER) BETWEEN 12 AND 17 THEN 'Afternoon'
        WHEN CAST(LEFT(incident_time, 2) AS INTEGER) BETWEEN 18 AND 23 THEN 'Evening'
        ELSE 'Night'
      END AS time_of_day,
      COUNT(*) AS incident_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM sf_incident_reports
    WHERE incident_year = :year AND incident_time IS NOT NULL
    GROUP BY hour
    ORDER BY hour
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - When do most crimes happen during the day in San Francisco?
  - Show me SF incidents by hour of day
  - Are San Francisco crimes more common at night or during the day?
  - What time are crimes most likely to occur in SF?
  - Time of day analysis for San Francisco police incidents
  - Do more SF incidents happen in the morning or at night in 2024?
  - What hour has the most crime in San Francisco?
  - Is nighttime crime a big problem in SF?
  - Hourly breakdown of San Francisco police incidents
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: sf_incident_reports
    qualifiers: [time, patterns]
  tags: [time-of-day, patterns, prevention]

