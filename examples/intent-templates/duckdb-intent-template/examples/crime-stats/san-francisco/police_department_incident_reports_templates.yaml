- id: neighborhood_safety_snapshot
  description: Safety overview for a specific SF neighborhood
  sql: |
    WITH neighborhood_stats AS (
      SELECT
        analysis_neighborhood,
        COUNT(*) AS total_incidents,
        RANK() OVER (ORDER BY COUNT(*) DESC) AS city_rank
      FROM sf_incident_reports
      WHERE incident_year = :year AND analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood
    ),
    previous AS (
      SELECT COUNT(*) AS prev_incidents
      FROM sf_incident_reports
      WHERE analysis_neighborhood LIKE '%' || :neighborhood || '%'
        AND incident_year = :year - 1
    ),
    top_crimes AS (
      SELECT incident_category, COUNT(*) AS cnt
      FROM sf_incident_reports
      WHERE analysis_neighborhood LIKE '%' || :neighborhood || '%'
        AND incident_year = :year AND incident_category IS NOT NULL
      GROUP BY incident_category
      ORDER BY cnt DESC
      LIMIT 5
    )
    SELECT
      ns.analysis_neighborhood,
      ns.total_incidents,
      ns.city_rank || ' of ' || (SELECT COUNT(*) FROM neighborhood_stats) AS rank_among_neighborhoods,
      p.prev_incidents AS previous_year_incidents,
      ns.total_incidents - p.prev_incidents AS change,
      ROUND((ns.total_incidents - p.prev_incidents) * 100.0 / NULLIF(p.prev_incidents, 0), 1) AS change_pct,
      (SELECT STRING_AGG(incident_category || ' (' || cnt || ')', ', ' ORDER BY cnt DESC) FROM top_crimes) AS top_incident_types
    FROM neighborhood_stats ns
    CROSS JOIN previous p
    WHERE ns.analysis_neighborhood LIKE '%' || :neighborhood || '%'
  parameters:
  - name: neighborhood
    type: string
    description: Neighborhood name (partial match)
    required: false
    default: Mission
  - name: year
    type: integer
    description: Year to analyze
    required: false
