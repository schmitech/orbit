- id: category_growth_by_range
  description: Which SF crime types grew or shrank the most between two arbitrary years
  sql: |
    WITH start_counts AS (
      SELECT incident_category, COUNT(*) AS start_incidents
      FROM sf_incident_reports
      WHERE incident_year = :start_year AND incident_category IS NOT NULL
      GROUP BY incident_category
    ),
    end_counts AS (
      SELECT incident_category, COUNT(*) AS end_incidents
      FROM sf_incident_reports
      WHERE incident_year = :end_year AND incident_category IS NOT NULL
      GROUP BY incident_category
    )
    SELECT
      COALESCE(e.incident_category, s.incident_category) AS incident_category,
      COALESCE(s.start_incidents, 0) AS start_incidents,
      COALESCE(e.end_incidents, 0) AS end_incidents,
      COALESCE(e.end_incidents, 0) - COALESCE(s.start_incidents, 0) AS absolute_change,
      ROUND((COALESCE(e.end_incidents, 0) - COALESCE(s.start_incidents, 0)) * 100.0 / NULLIF(s.start_incidents, 0), 1) AS pct_change
    FROM start_counts s
    FULL OUTER JOIN end_counts e ON s.incident_category = e.incident_category
    WHERE COALESCE(s.start_incidents, 0) >= :min_baseline OR COALESCE(e.end_incidents, 0) >= :min_baseline
    ORDER BY pct_change DESC
  parameters:
  - name: start_year
    type: integer
    description: Start year of the range
    required: false
    default: 2018
  - name: end_year
    type: integer
    description: End year of the range
    required: false
    default: 2024
  - name: min_baseline
    type: integer
    description: Minimum incidents to include
    required: false
    default: 50
  nl_examples:
