- id: seasonal_deviation
  description: Compare recent months to historical average in San Francisco
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(cnt), 1) AS historical_avg
      FROM (
        SELECT EXTRACT(MONTH FROM incident_date) AS month, incident_year, COUNT(*) AS cnt
        FROM sf_incident_reports
        WHERE incident_date IS NOT NULL AND incident_year < :year
        GROUP BY month, incident_year
      )
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM incident_date) AS month,
        COUNT(*) AS current_count
      FROM sf_incident_reports
      WHERE incident_year = :year AND incident_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM incident_date)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.current_count,
      a.historical_avg,
      c.current_count - a.historical_avg AS deviation,
      ROUND((c.current_count - a.historical_avg) * 100.0 / NULLIF(a.historical_avg, 0), 1) AS deviation_pct
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY ABS(c.current_count - a.historical_avg) DESC
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2024
  nl_examples:
  - Which months were unusual for crime this year in San Francisco?
  - Is this month above or below average for SF police incidents?
  - San Francisco seasonal anomalies in crime
  - Months that deviate from the historical SF crime pattern
  - Unusual crime patterns in SF this year
