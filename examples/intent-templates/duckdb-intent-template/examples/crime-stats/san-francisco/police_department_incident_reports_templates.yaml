    primary_entity: sf_incident_reports
    qualifiers: [seasonal, anomaly]
  tags: [seasonal, anomaly, researcher, insight]

- id: crime_composition_shift
  description: How the mix of crime types has changed over time in San Francisco
  sql: |
    WITH totals AS (
      SELECT incident_year, COUNT(*) AS year_total
      FROM sf_incident_reports
      GROUP BY incident_year
    ),
    by_type AS (
      SELECT
        c.incident_year,
        c.incident_category,
        COUNT(*) AS incidents,
        ROUND(COUNT(*) * 100.0 / t.year_total, 1) AS pct_of_total
      FROM sf_incident_reports c
      JOIN totals t ON c.incident_year = t.incident_year
      WHERE c.incident_category IS NOT NULL
      GROUP BY c.incident_year, c.incident_category, t.year_total
    )
    SELECT incident_year, incident_category, incidents, pct_of_total
    FROM by_type
    WHERE incidents >= 100
    ORDER BY incident_category, incident_year DESC
