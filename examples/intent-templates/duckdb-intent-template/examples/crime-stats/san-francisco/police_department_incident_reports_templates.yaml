- id: month_over_month_momentum
  description: Detect acceleration or deceleration of SF crime within the current year
  sql: |
    WITH monthly AS (
      SELECT
        EXTRACT(MONTH FROM incident_date) AS month,
        COUNT(*) AS incidents
      FROM sf_incident_reports
      WHERE incident_year = :year AND incident_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM incident_date)
    )
    SELECT
      month,
      CASE month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      incidents,
      LAG(incidents) OVER (ORDER BY month) AS previous_month,
      incidents - LAG(incidents) OVER (ORDER BY month) AS change,
      ROUND((incidents - LAG(incidents) OVER (ORDER BY month)) * 100.0 /
        NULLIF(LAG(incidents) OVER (ORDER BY month), 0), 1) AS pct_change
    FROM monthly
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Is SF crime accelerating or decelerating this year?
  - Month-over-month crime momentum in San Francisco
  - San Francisco monthly incident trend within 2024
  - Which months saw the biggest jump in SF incidents?
  - Is crime picking up or slowing down in San Francisco this year?
  - Month-to-month change in SF police incidents
  - San Francisco in-year crime acceleration analysis
  - Are SF incidents increasing month by month in 2024?
  - Monthly momentum of San Francisco police incidents
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: sf_incident_reports
    qualifiers: [momentum, monthly]
  tags: [policy, momentum, trends, early-warning]

- id: persistent_hotspots
  description: SF neighborhoods consistently in top 10 across multiple years — chronic problem areas
  sql: |
    WITH yearly_ranked AS (
      SELECT
        analysis_neighborhood,
        incident_year,
        COUNT(*) AS incidents,
        RANK() OVER (PARTITION BY incident_year ORDER BY COUNT(*) DESC) AS year_rank
      FROM sf_incident_reports
      WHERE analysis_neighborhood IS NOT NULL AND incident_year >= :year - 4
      GROUP BY analysis_neighborhood, incident_year
    )
    SELECT
      analysis_neighborhood,
      COUNT(DISTINCT incident_year) AS years_in_top_10,
      ROUND(AVG(incidents), 0) AS avg_yearly_incidents,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank,
      STRING_AGG(incident_year || ': #' || year_rank, ', ' ORDER BY incident_year) AS rank_history
    FROM yearly_ranked
    WHERE year_rank <= 10
    GROUP BY analysis_neighborhood
    HAVING COUNT(DISTINCT incident_year) >= 3
    ORDER BY years_in_top_10 DESC, avg_yearly_incidents DESC
  parameters:
  - name: year
    type: integer
    description: End year of the 5-year window
    required: false
    default: 2024
  nl_examples:
