- id: emerging_hotspots
  description: SF neighborhoods with the biggest year-over-year increase in incidents
  sql: |
    WITH yearly AS (
      SELECT analysis_neighborhood, incident_year, COUNT(*) AS incidents
      FROM sf_incident_reports
      WHERE analysis_neighborhood IS NOT NULL
      GROUP BY analysis_neighborhood, incident_year
    ),
    yoy AS (
      SELECT
        c.analysis_neighborhood,
        c.incident_year,
        c.incidents AS current_incidents,
        p.incidents AS previous_incidents,
        c.incidents - p.incidents AS absolute_change,
        ROUND((c.incidents - p.incidents) * 100.0 / NULLIF(p.incidents, 0), 1) AS pct_change
      FROM yearly c
      JOIN yearly p ON c.analysis_neighborhood = p.analysis_neighborhood AND c.incident_year = p.incident_year + 1
    )
    SELECT analysis_neighborhood, current_incidents, previous_incidents, absolute_change, pct_change
    FROM yoy
    WHERE incident_year = :year AND previous_incidents >= :min_baseline
    ORDER BY pct_change DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: min_baseline
    type: integer
    description: Minimum incidents in previous year to filter noise
    required: false
    default: 50
  - name: limit
    type: integer
    description: Number of results
    required: false
    default: 10
