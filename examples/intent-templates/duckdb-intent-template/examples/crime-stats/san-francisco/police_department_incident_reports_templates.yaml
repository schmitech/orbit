- id: fastest_declining_types
  description: Which SF incident categories are declining fastest — where interventions may be working
  sql: |
    WITH yearly AS (
      SELECT incident_category, incident_year, COUNT(*) AS incidents
      FROM sf_incident_reports
      WHERE incident_category IS NOT NULL
      GROUP BY incident_category, incident_year
    ),
    yoy AS (
      SELECT
        c.incident_category,
        c.incidents AS current_incidents,
        p.incidents AS previous_incidents,
        c.incidents - p.incidents AS absolute_change,
        ROUND((c.incidents - p.incidents) * 100.0 / NULLIF(p.incidents, 0), 1) AS pct_change
      FROM yearly c
      JOIN yearly p ON c.incident_category = p.incident_category AND c.incident_year = p.incident_year + 1
      WHERE c.incident_year = :year
    )
    SELECT incident_category, current_incidents, previous_incidents, absolute_change, pct_change
    FROM yoy
    WHERE previous_incidents >= :min_baseline AND pct_change < 0
    ORDER BY pct_change ASC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
