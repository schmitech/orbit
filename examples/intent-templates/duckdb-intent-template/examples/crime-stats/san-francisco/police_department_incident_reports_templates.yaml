- id: year_range_comparison
  description: Compare overall SF crime totals between two arbitrary years with breakdown
  sql: |
    SELECT
      :start_year AS start_year,
      :end_year AS end_year,
      (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :start_year) AS start_incidents,
      (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :end_year) AS end_incidents,
      (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :end_year) -
        (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :start_year) AS absolute_change,
      ROUND(((SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :end_year) -
             (SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :start_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM sf_incident_reports WHERE incident_year = :start_year), 0), 1) AS pct_change,
      (SELECT incident_category FROM sf_incident_reports WHERE incident_year = :end_year AND incident_category IS NOT NULL
       GROUP BY incident_category ORDER BY COUNT(*) DESC LIMIT 1) AS top_category_end_year,
      (SELECT analysis_neighborhood FROM sf_incident_reports WHERE incident_year = :end_year AND analysis_neighborhood IS NOT NULL
       GROUP BY analysis_neighborhood ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighborhood_end_year
  parameters:
  - name: start_year
    type: integer
    description: Start year to compare
    required: false
    default: 2018
  - name: end_year
    type: integer
    description: End year to compare
    required: false
    default: 2024
  nl_examples:
  - How does SF crime in 2024 compare to 2018?
  - Compare San Francisco crime between 2019 and 2023
  - Total crime change in SF from 2018 to 2024
  - How much has San Francisco crime changed between 2020 and 2024?
  - San Francisco crime comparison across a multi-year span
  - Did overall SF crime go up or down from 2018 to 2022?
  - Compare total incidents in San Francisco between two specific years
  - What is the percentage change in SF crime from 2019 to 2024?
  - Multi-year overall crime change in San Francisco
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: sf_incident_reports
    qualifiers: [year_range, overview]
  tags: [comparison, year-range, overview, insight]
