  - San Francisco neighborhood crime inequality
  - Which SF areas get a disproportionate share of crime?
  - Neighborhood-level disparity in San Francisco incident rates
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: sf_incident_reports
    qualifiers: [disparity, equity]
  tags: [policy, equity, disparity, location, insight]

- id: type_distribution_by_neighborhood
  description: What crime types dominate each SF neighborhood — reveals neighborhood character
  sql: |
    WITH ranked AS (
      SELECT
        analysis_neighborhood,
        incident_category,
        COUNT(*) AS incidents,
        ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (PARTITION BY analysis_neighborhood), 1) AS pct_of_neighborhood,
        ROW_NUMBER() OVER (PARTITION BY analysis_neighborhood ORDER BY COUNT(*) DESC) AS rank
      FROM sf_incident_reports
      WHERE incident_year = :year
        AND analysis_neighborhood IS NOT NULL
        AND incident_category IS NOT NULL
      GROUP BY analysis_neighborhood, incident_category
    )
    SELECT
      analysis_neighborhood,
      MAX(CASE WHEN rank = 1 THEN incident_category || ' (' || pct_of_neighborhood || '%)' END) AS top_1_crime,
      MAX(CASE WHEN rank = 2 THEN incident_category || ' (' || pct_of_neighborhood || '%)' END) AS top_2_crime,
      MAX(CASE WHEN rank = 3 THEN incident_category || ' (' || pct_of_neighborhood || '%)' END) AS top_3_crime,
      SUM(incidents) AS total_incidents
    FROM ranked
    WHERE rank <= 3
    GROUP BY analysis_neighborhood
    ORDER BY total_incidents DESC
  parameters:
