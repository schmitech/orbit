  - Multi-year trend analysis for San Francisco crime categories
  - Are burglaries in a long-term upward or downward trend in SF?
  - What is the structural trend direction of each SF crime type?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: sf_incident_reports
    qualifiers: [cagr, long_term]
  tags: [policy, cagr, long-term, strategic, insight]

- id: district_crime_character
  description: Compare crime mix across SFPD police districts — what makes each district unique
  sql: |
    WITH district_totals AS (
      SELECT police_district, COUNT(*) AS total
      FROM sf_incident_reports
      WHERE incident_year = :year AND police_district IS NOT NULL
      GROUP BY police_district
    ),
    district_categories AS (
      SELECT
        r.police_district,
        r.incident_category,
        COUNT(*) AS incidents,
        ROUND(COUNT(*) * 100.0 / dt.total, 1) AS pct_of_district
      FROM sf_incident_reports r
      JOIN district_totals dt ON r.police_district = dt.police_district
      WHERE r.incident_year = :year AND r.incident_category IS NOT NULL
      GROUP BY r.police_district, r.incident_category, dt.total
    )
    SELECT
      police_district,
      incident_category,
      incidents,
      pct_of_district,
      RANK() OVER (PARTITION BY police_district ORDER BY incidents DESC) AS rank_in_district
    FROM district_categories
    QUALIFY rank_in_district <= 5
    ORDER BY police_district, incidents DESC
  parameters:
