- id: crime_concentration
  description: "Pareto analysis: what percentage of intersections account for the majority of crime (hot-spots policing metric)"
  sql: |
    WITH ranked AS (
      SELECT
        intersection,
        COUNT(*) AS occurrences,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM occurrences
      WHERE year = :year
      GROUP BY intersection
    ),
    totals AS (
      SELECT
        COUNT(DISTINCT intersection) AS total_locations,
        SUM(occurrences) AS total_occurrences
      FROM ranked
    )
    SELECT
      CASE
        WHEN r.rank <= CEIL(t.total_locations * 0.01) THEN 'Top 1%'
        WHEN r.rank <= CEIL(t.total_locations * 0.05) THEN 'Top 5%'
        WHEN r.rank <= CEIL(t.total_locations * 0.10) THEN 'Top 10%'
        WHEN r.rank <= CEIL(t.total_locations * 0.20) THEN 'Top 20%'
        ELSE 'Remaining 80%'
      END AS location_tier,
      COUNT(*) AS num_intersections,
      SUM(r.occurrences) AS total_occurrences,
      ROUND(SUM(r.occurrences) * 100.0 / MAX(t.total_occurrences), 1) AS pct_of_all_crime
    FROM ranked r
    CROSS JOIN totals t
    GROUP BY
      CASE
        WHEN r.rank <= CEIL(t.total_locations * 0.01) THEN 'Top 1%'
        WHEN r.rank <= CEIL(t.total_locations * 0.05) THEN 'Top 5%'
        WHEN r.rank <= CEIL(t.total_locations * 0.10) THEN 'Top 10%'
        WHEN r.rank <= CEIL(t.total_locations * 0.20) THEN 'Top 20%'
        ELSE 'Remaining 80%'
      END
    ORDER BY MIN(r.rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - How concentrated is crime in Edmonton?
  - Do a few Edmonton locations account for most crime?
  - Edmonton crime concentration analysis
  - Pareto analysis of Edmonton crime hotspots
  - What percentage of Edmonton locations have the most crime?
  - Does the 80/20 rule apply to Edmonton crime locations?
  - How much Edmonton crime comes from the top 5% of intersections?
  - Is Edmonton crime spread out or concentrated in a few spots?
  - Crime distribution analysis across Edmonton intersections
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: occurrences
    qualifiers: [concentration, pareto, hotspots]
  tags: [policy, concentration, pareto, resource-allocation]

- id: category_composition_shift
  description: How the mix of crime categories has shifted over the years (share % per category per year)
  sql: |
    WITH yearly_totals AS (
      SELECT year, COUNT(*) AS total
      FROM occurrences
      GROUP BY year
    )
    SELECT
      o.year,
      o.occurrence_category,
      COUNT(*) AS occurrences,
      ROUND(COUNT(*) * 100.0 / yt.total, 1) AS share_pct
    FROM occurrences o
    JOIN yearly_totals yt ON o.year = yt.year
    GROUP BY o.year, o.occurrence_category, yt.total
    ORDER BY o.year DESC, share_pct DESC
  parameters: []
  nl_examples:
