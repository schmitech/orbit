  - Are there more incidents reported on Mondays in Edmonton?
  - How bad are Edmonton weekends compared to weekdays for crime?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: occurrences
    qualifiers: [weekday, patterns]
  tags: [weekday, patterns, timing]

