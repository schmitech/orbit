- id: weekend_vs_weekday_by_category
  description: Compare weekend vs weekday occurrence rates by category for shift planning
  sql: |
    WITH day_counts AS (
      SELECT
        COUNT(DISTINCT CASE WHEN DAYOFWEEK(date_reported) IN (1, 7) THEN date_reported END) AS weekend_days,
        COUNT(DISTINCT CASE WHEN DAYOFWEEK(date_reported) NOT IN (1, 7) THEN date_reported END) AS weekday_days
      FROM occurrences
      WHERE year = :year AND date_reported IS NOT NULL
    )
    SELECT
      o.occurrence_category,
      SUM(CASE WHEN DAYOFWEEK(o.date_reported) IN (1, 7) THEN 1 ELSE 0 END) AS weekend_total,
      SUM(CASE WHEN DAYOFWEEK(o.date_reported) NOT IN (1, 7) THEN 1 ELSE 0 END) AS weekday_total,
      ROUND(SUM(CASE WHEN DAYOFWEEK(o.date_reported) IN (1, 7) THEN 1 ELSE 0 END) * 1.0 /
            d.weekend_days, 1) AS avg_per_weekend_day,
      ROUND(SUM(CASE WHEN DAYOFWEEK(o.date_reported) NOT IN (1, 7) THEN 1 ELSE 0 END) * 1.0 /
            d.weekday_days, 1) AS avg_per_weekday,
      ROUND(
        (SUM(CASE WHEN DAYOFWEEK(o.date_reported) IN (1, 7) THEN 1 ELSE 0 END) * 1.0 / d.weekend_days) /
        NULLIF(SUM(CASE WHEN DAYOFWEEK(o.date_reported) NOT IN (1, 7) THEN 1 ELSE 0 END) * 1.0 / d.weekday_days, 0)
      , 2) AS weekend_to_weekday_ratio
    FROM occurrences o
    CROSS JOIN day_counts d
    WHERE o.year = :year AND o.date_reported IS NOT NULL
    GROUP BY o.occurrence_category, d.weekend_days, d.weekday_days
    ORDER BY weekend_to_weekday_ratio DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Is there more crime on weekends in Edmonton?
  - Edmonton weekend vs weekday crime comparison by category
  - When should Edmonton police have more staff?
  - Edmonton shift planning analysis
  - Are Edmonton violent crimes more common on weekends?
  - What is the Edmonton weekend-to-weekday ratio for disorder incidents?
  - Do property crimes happen more on weekdays or weekends in Edmonton?
  - Average daily Edmonton occurrence rate for weekends vs weekdays in 2025
  - How should Edmonton police allocate weekend versus weekday resources?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [weekend, weekday, staffing]
  tags: [policy, staffing, shift-planning, resource-allocation]

- id: persistent_hotspots
  description: Intersections that consistently rank in the top 20 across every year — chronic problem locations requiring sustained intervention
  sql: |
    WITH yearly_ranked AS (
      SELECT
        intersection,
        year,
        COUNT(*) AS occurrences,
        RANK() OVER (PARTITION BY year ORDER BY COUNT(*) DESC) AS year_rank
      FROM occurrences
      GROUP BY intersection, year
    )
    SELECT
      intersection,
      COUNT(DISTINCT year) AS years_in_top_20,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank,
      SUM(occurrences) AS total_occurrences,
      ROUND(AVG(occurrences), 0) AS avg_per_year
    FROM yearly_ranked
    WHERE year_rank <= 20
    GROUP BY intersection
    HAVING COUNT(DISTINCT year) >= 2
    ORDER BY years_in_top_20 DESC, total_occurrences DESC
  parameters: []
  nl_examples:
  - Which Edmonton locations are persistently high-crime across all years?
  - Chronic Edmonton crime hotspots
  - Where does crime never go away in Edmonton?
  - Edmonton locations that need sustained police attention
  - Repeat problem locations across years in Edmonton
  - What Edmonton intersections have been in the top 20 every single year?
