    primary_entity: occurrences
    qualifiers: [correlation, disorder, intervention]
  tags: [policy, broken-windows, intervention, strategic]

- id: crime_type_seasonality
  description: "Seasonal heatmap: which crime types peak in which months (for staffing and resource planning)"
  sql: |
    SELECT
      occurrence_type,
      SUM(CASE WHEN EXTRACT(MONTH FROM date_reported) IN (12, 1, 2) THEN 1 ELSE 0 END) AS winter,
      SUM(CASE WHEN EXTRACT(MONTH FROM date_reported) IN (3, 4, 5) THEN 1 ELSE 0 END) AS spring,
      SUM(CASE WHEN EXTRACT(MONTH FROM date_reported) IN (6, 7, 8) THEN 1 ELSE 0 END) AS summer,
      SUM(CASE WHEN EXTRACT(MONTH FROM date_reported) IN (9, 10, 11) THEN 1 ELSE 0 END) AS fall,
      COUNT(*) AS total
    FROM occurrences
    WHERE year = :year AND date_reported IS NOT NULL
    GROUP BY occurrence_type
    HAVING COUNT(*) >= 20
    ORDER BY total DESC
  parameters:
