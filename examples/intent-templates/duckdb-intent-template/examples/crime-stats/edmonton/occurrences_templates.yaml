- id: intersection_detail
  description: Show occurrence breakdown for a specific intersection
  sql: |
    SELECT
      occurrence_type,
      occurrence_category,
      COUNT(*) AS occurrence_count
    FROM occurrences
    WHERE intersection LIKE '%' ||
      REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(
        TRIM(UPPER(:intersection)),
        'ROAD', 'RD'), 'AVENUE', 'AV'), 'STREET', 'ST'),
        'DRIVE', 'DR'), 'BOULEVARD', 'BLVD'), 'CRESCENT', 'CRES'),
        'TRAIL', 'TR'), 'HIGHWAY', 'HWY')
      || '%'
      AND year = :year
    GROUP BY occurrence_type, occurrence_category
    ORDER BY occurrence_count DESC
  parameters:
  - name: intersection
    type: string
    description: "Intersection or street name to search (e.g., 107 AV, WHYTE AV)"
    required: true
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
