- id: disorder_crime_correlation
  description: "Broken windows analysis: intersections with high disorder AND high violent/property crime, suggesting targeted intervention opportunities"
  sql: |
    WITH location_stats AS (
      SELECT
        intersection,
        SUM(CASE WHEN occurrence_category = 'Disorder' THEN 1 ELSE 0 END) AS disorder_count,
        SUM(CASE WHEN occurrence_category = 'Violent' THEN 1 ELSE 0 END) AS violent_count,
        SUM(CASE WHEN occurrence_category = 'Non-Violent' THEN 1 ELSE 0 END) AS property_count,
        COUNT(*) AS total_count
      FROM occurrences
      WHERE year = :year
      GROUP BY intersection
      HAVING SUM(CASE WHEN occurrence_category = 'Disorder' THEN 1 ELSE 0 END) >= 5
    )
    SELECT
      intersection,
      disorder_count,
      violent_count,
      property_count,
      total_count,
      ROUND(violent_count * 100.0 / total_count, 1) AS violent_share_pct
    FROM location_stats
    WHERE violent_count + property_count > 0
    ORDER BY disorder_count + violent_count DESC
    LIMIT 20
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Where do disorder and violent crime overlap in Edmonton?
  - Broken windows analysis for Edmonton
  - Which Edmonton locations have both disorder and serious crime?
  - Where should targeted Edmonton interventions focus?
  - Edmonton disorder and crime correlation by location
  - Which Edmonton intersections have high disturbance calls and also violent incidents?
  - Do Edmonton areas with lots of disorder also have property crime?
