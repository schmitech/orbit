    qualifiers: [composition, shift, trends]
  tags: [policy, composition, share, strategic]

- id: fastest_growing_types
  description: Rank occurrence types by year-over-year growth rate to identify emerging threats
  sql: |
    WITH counts AS (
      SELECT
        occurrence_type,
        SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current,
        SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous
      FROM occurrences
      WHERE year IN (:year, :previous_year)
      GROUP BY occurrence_type
      HAVING SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      occurrence_type,
      previous AS previous_year,
      current AS current_year,
      current - previous AS change,
      ROUND((current - previous) * 100.0 / previous, 1) AS growth_pct
    FROM counts
    WHERE current > previous
    ORDER BY growth_pct DESC
    LIMIT 15
  parameters:
  - name: year
    type: integer
    description: Current year
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year
    required: false
    default: 2024
  nl_examples:
  - What Edmonton crime types are growing fastest?
  - Which Edmonton crimes are on the rise?
  - Emerging crime threats in Edmonton
  - Fastest increasing Edmonton crime types
  - What should Edmonton police be concerned about?
  - Which Edmonton offences had the highest growth rate from 2024 to 2025?
  - What incident types are surging in Edmonton?
  - Top 15 fastest-growing Edmonton crime types year over year
  - Are Edmonton drug offences or weapons violations growing faster?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [growth, emerging, ranking]
  tags: [policy, growth, emerging-threats, strategic]

- id: fastest_declining_types
  description: Rank occurrence types by year-over-year decline to identify what interventions may be working
  sql: |
    WITH counts AS (
      SELECT
        occurrence_type,
        SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current,
        SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous
      FROM occurrences
      WHERE year IN (:year, :previous_year)
      GROUP BY occurrence_type
      HAVING SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      occurrence_type,
      previous AS previous_year,
      current AS current_year,
      current - previous AS change,
      ROUND((current - previous) * 100.0 / previous, 1) AS decline_pct
    FROM counts
    WHERE current < previous
    ORDER BY decline_pct ASC
    LIMIT 15
  parameters:
