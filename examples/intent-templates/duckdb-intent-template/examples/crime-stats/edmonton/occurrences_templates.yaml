- id: yearly_occurrence_trends
  description: Track year-over-year changes in police occurrences
  sql: |
    SELECT
      year,
      COUNT(*) AS total_occurrences,
      COUNT(DISTINCT occurrence_type) AS unique_types,
      COUNT(DISTINCT occurrence_category) AS unique_categories
    FROM occurrences
    GROUP BY year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - How has crime changed over the years in Edmonton?
  - Show me yearly occurrence trends for Edmonton
  - Is crime increasing or decreasing in Edmonton?
  - Total Edmonton incidents per year
  - Year-over-year crime stats Edmonton
  - How many offences were reported each year in Edmonton?
  - What did Edmonton's annual occurrence totals look like in 2024 versus earlier years?
  - Is it getting worse in Edmonton year after year?
  - Give me a historical overview of police occurrences in Edmonton
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: occurrences
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic]

- id: occurrences_by_month
  description: Analyze monthly occurrence patterns to identify seasonal trends
  sql: |
    SELECT
      EXTRACT(MONTH FROM date_reported) AS month,
      CASE EXTRACT(MONTH FROM date_reported)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS occurrence_count
    FROM occurrences
    WHERE year = :year AND date_reported IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM date_reported)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which months have the most crime in Edmonton?
  - Show me seasonal crime patterns in Edmonton
  - When do most incidents happen in Edmonton?
  - Monthly crime breakdown Edmonton
  - Peak months for crime in Edmonton
  - What month had the highest number of occurrences in 2024 in Edmonton?
  - Does crime spike during summer in Edmonton?
  - How bad is January compared to July for incidents in Edmonton?
  - Edmonton monthly occurrence counts for 2025
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: occurrences
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns]

- id: occurrences_by_weekday
  description: Analyze which days of the week have the most occurrences
  sql: |
    SELECT
      DAYNAME(date_reported) AS day_of_week,
      COUNT(*) AS occurrence_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM occurrences
    WHERE year = :year AND date_reported IS NOT NULL
    GROUP BY DAYNAME(date_reported)
    ORDER BY occurrence_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which days of the week have the most crime in Edmonton?
  - Are weekends more dangerous in Edmonton?
  - Edmonton weekday vs weekend crime comparison
  - What day has the most incidents in Edmonton?
  - Do more offences happen on Fridays or Saturdays in Edmonton?
  - Which day of the week is safest in Edmonton?
