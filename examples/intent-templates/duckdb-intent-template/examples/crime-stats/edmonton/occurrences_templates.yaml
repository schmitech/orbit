  - Edmonton crime dashboard
  - What does the big picture look like for Edmonton crime in 2025?
  - Quick summary of Edmonton incidents this year
  - How bad is crime overall in Edmonton right now?
  - Top-level crime stats for Edmonton
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: occurrences
    qualifiers: [snapshot, dashboard]
  tags: [snapshot, dashboard, overview]

- id: seasonal_deviation
  description: Compare current year monthly counts to historical averages to find unusual months
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(occurrences), 1) AS avg_occurrences
      FROM (
        SELECT
          EXTRACT(MONTH FROM date_reported) AS month,
          year,
          COUNT(*) AS occurrences
        FROM occurrences
        WHERE date_reported IS NOT NULL
        GROUP BY EXTRACT(MONTH FROM date_reported), year
      ) sub
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM date_reported) AS month,
        COUNT(*) AS occurrences
      FROM occurrences
      WHERE year = :year AND date_reported IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM date_reported)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.occurrences AS current_count,
      a.avg_occurrences AS historical_avg,
      ROUND(c.occurrences - a.avg_occurrences, 1) AS deviation
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY c.month
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2025
  nl_examples:
  - Are there unusual months for crime in Edmonton this year?
  - Edmonton seasonal deviation analysis
  - Which Edmonton months are above or below average for crime?
  - Compare this Edmonton year to historical averages
  - Was any month in 2025 abnormally high for crime in Edmonton?
  - How does this year's monthly pattern in Edmonton compare to the historical norm?
  - Which Edmonton months deviated the most from average occurrence counts?
  - Are there any anomalies in the 2024 Edmonton monthly crime data?
  - Monthly deviation from the long-term average in Edmonton
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [seasonal, deviation]
  tags: [seasonal, deviation, insight]

