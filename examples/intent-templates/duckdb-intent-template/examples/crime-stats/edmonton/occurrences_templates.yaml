- id: emerging_hotspots
  description: Intersections with the largest year-over-year increase in occurrences
  sql: |
    WITH yearly AS (
      SELECT
        intersection,
        year,
        COUNT(*) AS occurrences
      FROM occurrences
      WHERE year IN (:year, :previous_year)
      GROUP BY intersection, year
    ),
    yoy AS (
      SELECT
        c.intersection,
        c.occurrences AS current_count,
        COALESCE(p.occurrences, 0) AS previous_count,
        c.occurrences - COALESCE(p.occurrences, 0) AS change
      FROM yearly c
      LEFT JOIN yearly p ON c.intersection = p.intersection AND p.year = :previous_year
      WHERE c.year = :year
    )
    SELECT
      intersection,
      current_count,
      previous_count,
      change,
      CASE WHEN previous_count = 0 THEN NULL
           ELSE ROUND(change * 100.0 / previous_count, 1)
      END AS change_pct
    FROM yoy
    WHERE change > 0
    ORDER BY change DESC
    LIMIT 15
  parameters:
  - name: year
    type: integer
    description: Current year
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2024
  nl_examples:
  - Which areas are getting worse in Edmonton?
  - Emerging Edmonton crime hotspots
  - Where is crime increasing the most in Edmonton?
  - New problem areas in Edmonton
  - What Edmonton intersections saw the biggest jump in incidents from 2024 to 2025?
  - Which Edmonton locations are trending upward in crime?
  - Are any new hotspots appearing in Edmonton?
  - Where has crime spiked the most year over year in Edmonton?
  - Edmonton locations with the largest increase in police occurrences
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [hotspots, emerging, yoy]
  tags: [hotspots, emerging, yoy, insight]

- id: city_snapshot
  description: Dashboard-style overview of Edmonton crime for a given year
  sql: |
    SELECT
      (SELECT COUNT(*) FROM occurrences WHERE year = :year) AS total_occurrences,
      (SELECT COUNT(*) FROM occurrences WHERE year = :previous_year) AS previous_year_total,
      ROUND(((SELECT COUNT(*) FROM occurrences WHERE year = :year) -
             (SELECT COUNT(*) FROM occurrences WHERE year = :previous_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM occurrences WHERE year = :previous_year), 0), 1) AS yoy_change_pct,
      (SELECT occurrence_type FROM occurrences WHERE year = :year GROUP BY occurrence_type ORDER BY COUNT(*) DESC LIMIT 1) AS top_type,
      (SELECT occurrence_category FROM occurrences WHERE year = :year GROUP BY occurrence_category ORDER BY COUNT(*) DESC LIMIT 1) AS top_category,
      (SELECT intersection FROM occurrences WHERE year = :year GROUP BY intersection ORDER BY COUNT(*) DESC LIMIT 1) AS top_intersection
  parameters:
  - name: year
    type: integer
    description: Year to summarize
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year for comparison
    required: false
    default: 2024
  nl_examples:
