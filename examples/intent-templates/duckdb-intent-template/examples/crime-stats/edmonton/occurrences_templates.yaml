# =============================================================================
# YEAR-OVER-YEAR COMPARISON
# =============================================================================

- id: yoy_comparison
  description: Compare total occurrences between two years
  sql: |
    SELECT
      occurrence_category,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current_year,
      SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous_year,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS change,
      CASE
        WHEN SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) = 0 THEN NULL
        ELSE ROUND((SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END)) * 100.0 / SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END), 1)
      END AS change_pct
    FROM occurrences
    WHERE year IN (:year, :previous_year)
    GROUP BY occurrence_category
    ORDER BY current_year DESC
  parameters:
  - name: year
    type: integer
    description: Current year to compare
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare against
    required: false
    default: 2024
  nl_examples:
  - Compare 2025 to 2024 crime in Edmonton
  - Year-over-year Edmonton crime comparison
  - Did crime go up or down this year in Edmonton?
  - How does this year compare to last year in Edmonton?
  - Edmonton crime change between years
  - Is it getting worse in Edmonton compared to last year?
  - Percentage change in Edmonton occurrences from 2024 to 2025
  - How do Edmonton's this year's numbers stack up against the previous year?
  - Year-over-year analysis of Edmonton occurrence categories
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [yoy, comparison]
  tags: [yoy, comparison, change]

- id: yoy_type_comparison
  description: Compare specific occurrence types between two years
  sql: |
    SELECT
      occurrence_type,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current_year,
      SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous_year,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS change,
      CASE
        WHEN SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) = 0 THEN NULL
        ELSE ROUND((SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END)) * 100.0 / SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END), 1)
      END AS change_pct
    FROM occurrences
    WHERE year IN (:year, :previous_year)
    GROUP BY occurrence_type
    HAVING SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) + SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) > 0
    ORDER BY current_year DESC
  parameters:
  - name: year
    type: integer
    description: Current year to compare
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare against
    required: false
    default: 2024
  nl_examples:
  - Which Edmonton crime types increased the most?
  - Compare Edmonton crime types 2025 vs 2024
  - What types of crime are rising in Edmonton?
  - Biggest changes in Edmonton crime types year over year
  - What specific Edmonton offences went up or down between 2024 and 2025?
  - Which Edmonton incident types saw the largest percentage change?
  - Year-over-year comparison of individual Edmonton crime types
  - Did Edmonton assaults or thefts change more between years?
  - Detailed type-level comparison of this year versus last year in Edmonton
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: occurrences
    qualifiers: [yoy, type, comparison]
  tags: [yoy, type, comparison]

