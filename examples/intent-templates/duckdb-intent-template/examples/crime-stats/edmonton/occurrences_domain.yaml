entities:
  primary:
    name: occurrences
    table: occurrences
    primary_key: id
    searchable_fields:
    - occurrence_category
    - occurrence_group
    - occurrence_type
    - intersection
    filterable_fields:
    - year
    - occurrence_category
    - occurrence_group
    - occurrence_type
    - intersection
    - date_reported
fields:
  id:
    data_type: integer
    description: Auto-generated unique identifier for each occurrence
    searchable: false
    filterable: false
    sortable: true
    summary_priority: 0
  occurrence_category:
    data_type: varchar
    description: "High-level category: Disorder, Drugs, Non-Violent, Other, Traffic, Violent, Weapons"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 1
  occurrence_group:
    data_type: varchar
    description: "Mid-level grouping within category (e.g., Personal Violence, Property, Disputes/Disturbances)"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 2
  occurrence_type:
    data_type: varchar
    description: "Specific occurrence type (e.g., Assault, Theft Under $5000, Break and Enter Residential)"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 1
  intersection:
    data_type: varchar
    description: "Street intersection where the occurrence was reported (e.g., 93 ST/122 AV)"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 3
  date_reported:
    data_type: date
    description: Date the occurrence was reported to police
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 2
  year:
    data_type: integer
    description: Year the occurrence was reported (extracted from date_reported)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 1
