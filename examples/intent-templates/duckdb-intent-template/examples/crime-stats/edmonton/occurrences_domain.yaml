domain_name: Edmonton Police Service Occurrences Database
description: Edmonton Police Service occurrence database for DuckDB - tracks police-reported incidents across Edmonton from 2023-present
domain_type: analytical
semantic_types:
  date_value:
    description: Date values in various formats
    patterns:
    - date
    - day
    - time
    - when
    - from
    - to
    - between
    regex_patterns:
    - \b\d{4}-\d{2}-\d{2}\b
    - \b\d{2}/\d{2}/\d{4}\b
  identifier:
    description: Unique identifier
    patterns:
    - id
    - identifier
    - key
    regex_patterns:
    - \b(\d+)\b
  integer_value:
    description: Integer/count values
    patterns:
    - count
    - number
    - year
    regex_patterns:
    - \b\d+\b
