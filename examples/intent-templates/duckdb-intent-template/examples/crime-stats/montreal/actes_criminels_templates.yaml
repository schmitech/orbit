- id: par_quart
  description: Répartition des crimes par quart de travail (jour/soir/nuit) pour une année donnée
  sql: |
    SELECT quart, COUNT(*) AS total_incidents,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (), 1) AS pct
    FROM actes_criminels
    WHERE EXTRACT(YEAR FROM date_evenement) = :annee
    GROUP BY quart
    ORDER BY
      CASE quart
        WHEN 'jour' THEN 1
        WHEN 'soir' THEN 2
        WHEN 'nuit' THEN 3
      END
