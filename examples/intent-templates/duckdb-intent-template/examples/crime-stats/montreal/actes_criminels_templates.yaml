- id: points_chauds_arrondissements
  description: Arrondissements avec la plus forte augmentation de criminalité
  sql: |
    WITH courant AS (
      SELECT arrondissement, COUNT(*) AS cnt
      FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee
        AND arrondissement != 'Inconnu'
      GROUP BY arrondissement
    ),
    precedent AS (
      SELECT arrondissement, COUNT(*) AS cnt
      FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee - 1
        AND arrondissement != 'Inconnu'
      GROUP BY arrondissement
    )
    SELECT
      c.arrondissement,
      c.cnt AS annee_courante,
      COALESCE(p.cnt, 0) AS annee_precedente,
      c.cnt - COALESCE(p.cnt, 0) AS variation,
      ROUND((c.cnt - COALESCE(p.cnt, 0)) * 100.0 / NULLIF(COALESCE(p.cnt, 0), 0), 1) AS variation_pct
    FROM courant c
    LEFT JOIN precedent p ON c.arrondissement = p.arrondissement
    ORDER BY c.cnt DESC
    LIMIT 10
  parameters:
  - name: annee
    type: integer
    description: Année à analyser
    required: false
    default: 2025
  nl_examples:
  - Points chauds de criminalité à Montréal
  - Arrondissements avec hausse de criminalité à Montréal
  - Où la criminalité augmente à Montréal?
  - Quels arrondissements ont vu la plus forte hausse en 2024 à Montréal?
  - C'est où que ça empire le plus à Montréal?
