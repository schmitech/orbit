- id: securite_arrondissement
  description: Portrait de sécurité pour un arrondissement spécifique
  sql: |
    WITH stats_arrondissement AS (
      SELECT arrondissement, COUNT(*) AS total_incidents,
        RANK() OVER (ORDER BY COUNT(*) DESC) AS rang_ville
      FROM actes_criminels
      WHERE EXTRACT(YEAR FROM date_evenement) = :annee
        AND arrondissement != 'Inconnu'
      GROUP BY arrondissement
    ),
    precedent AS (
      SELECT COUNT(*) AS incidents_precedents
      FROM actes_criminels
      WHERE arrondissement ILIKE '%' || :arrondissement || '%'
        AND EXTRACT(YEAR FROM date_evenement) = :annee - 1
    ),
    top_crimes AS (
      SELECT categorie, COUNT(*) AS cnt
      FROM actes_criminels
      WHERE arrondissement ILIKE '%' || :arrondissement || '%'
        AND EXTRACT(YEAR FROM date_evenement) = :annee
      GROUP BY categorie
      ORDER BY cnt DESC
      LIMIT 5
    )
    SELECT
      s.arrondissement,
      s.total_incidents,
      s.rang_ville || ' sur ' || (SELECT COUNT(*) FROM stats_arrondissement) AS rang_parmi_arrondissements,
      p.incidents_precedents,
      s.total_incidents - p.incidents_precedents AS variation,
      ROUND((s.total_incidents - p.incidents_precedents) * 100.0 / NULLIF(p.incidents_precedents, 0), 1) AS variation_pct,
      (SELECT STRING_AGG(categorie || ' (' || cnt || ')', ', ' ORDER BY cnt DESC) FROM top_crimes) AS principaux_crimes
    FROM stats_arrondissement s
    CROSS JOIN precedent p
    WHERE s.arrondissement ILIKE '%' || :arrondissement || '%'
  parameters:
  - name: arrondissement
    type: string
    description: Nom de l'arrondissement (correspondance partielle)
    required: true
  - name: annee
    type: integer
    description: Année à analyser
    required: false
    default: 2025
  nl_examples:
  - Est-ce que Ville-Marie est sécuritaire à Montréal?
  - Sécurité du Plateau-Mont-Royal à Montréal
  - Portrait de sécurité de Rosemont à Montréal
  - Comment est la criminalité à Côte-des-Neiges à Montréal?
