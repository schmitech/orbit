  - Est-ce qu'un mois en particulier sort de l'ordinaire à Montréal?
  - C'est quoi les mois les plus anormaux pour la criminalité à Montréal?
  - Analyse des écarts saisonniers par rapport à la moyenne à Montréal
  - Unusual months for crime in Montreal
  - Seasonal anomalies in Montreal crime
  - Which months have abnormally high crime in Montreal?
  - Are there unusual Montreal crime spikes in 2024?
  - Which months in Montreal deviate from the historical average?
  - Anomaly detection in Montreal monthly trends for 2023
  - Does any particular month stand out in Montreal?
  - What are the most abnormal months for crime in Montreal?
  - Analysis of seasonal deviations from the average in Montreal
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: actes_criminels
    qualifiers: [saisonnier, anomalie]
  tags: [saisonnier, anomalie, aperçu]

- id: portrait_ville
  description: Portrait global de la criminalité pour une année donnée
  sql: |
    SELECT
      :annee AS annee,
      (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee) AS total_incidents,
      (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee - 1) AS incidents_annee_precedente,
      ROUND(((SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee) -
             (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee - 1)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee - 1), 0), 1) AS variation_pct,
      (SELECT categorie FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee GROUP BY categorie ORDER BY COUNT(*) DESC LIMIT 1) AS categorie_principale,
      (SELECT arrondissement FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee AND arrondissement != 'Inconnu' GROUP BY arrondissement ORDER BY COUNT(*) DESC LIMIT 1) AS arrondissement_principal,
      (SELECT quart FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee GROUP BY quart ORDER BY COUNT(*) DESC LIMIT 1) AS quart_principal
  parameters:
  - name: annee
    type: integer
    description: Année à analyser
    required: false
    default: 2025
  nl_examples:
