# =============================================================================
# COMPARAISON ANNÉE SUR ANNÉE
# =============================================================================

- id: comparaison_annuelle
  description: Comparer le total des crimes entre deux années
  sql: |
    SELECT
      :annee_courante AS annee_courante,
      :annee_precedente AS annee_precedente,
      (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_courante) AS incidents_courants,
      (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_precedente) AS incidents_precedents,
      ROUND(((SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_courante) -
             (SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_precedente)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_precedente), 0), 1) AS variation_pct
  parameters:
  - name: annee_courante
    type: integer
    description: Année courante à comparer
    required: false
    default: 2025
  - name: annee_precedente
    type: integer
    description: Année précédente à comparer
    required: false
    default: 2024
  nl_examples:
  - Comparer 2024 à 2023 à Montréal
  - Variation annuelle des crimes à Montréal
  - La criminalité a-t-elle augmenté à Montréal?
  - Comparaison année sur année à Montréal
  - Est-ce que ça empire entre 2023 et 2024 à Montréal?
  - Quelle est la variation du nombre de crimes entre 2022 et 2023 à Montréal?
  - Y a-t-il eu plus ou moins de crimes cette année à Montréal par rapport à l'an dernier?
  - Analyse comparative interannuelle de la criminalité à Montréal
  - C'est mieux ou pire qu'avant à Montréal?
  - Compare 2024 to 2023 crime in Montreal
  - Year-over-year Montreal crime variation
  - Has crime increased in Montreal?
  - Montreal year-on-year comparison
  - Is it getting worse between 2023 and 2024 in Montreal?
  - What is the change in Montreal crime numbers between 2022 and 2023?
  - Were there more or fewer crimes in Montreal this year compared to last year?
  - Is crime in Montreal better or worse than before?
  - How does this year compare to last year for crime in Montreal?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: actes_criminels
    qualifiers: [annuel, variation]
  tags: [comparaison, annuel, tendance]

- id: comparaison_par_categorie
  description: Comparaison année sur année par catégorie de crime
  sql: |
    WITH courant AS (
      SELECT categorie, COUNT(*) AS cnt
      FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_courante
      GROUP BY categorie
    ),
    precedent AS (
      SELECT categorie, COUNT(*) AS cnt
      FROM actes_criminels WHERE EXTRACT(YEAR FROM date_evenement) = :annee_precedente
      GROUP BY categorie
    )
    SELECT
      COALESCE(c.categorie, p.categorie) AS categorie,
      COALESCE(c.cnt, 0) AS incidents_courants,
      COALESCE(p.cnt, 0) AS incidents_precedents,
      COALESCE(c.cnt, 0) - COALESCE(p.cnt, 0) AS variation,
      ROUND((COALESCE(c.cnt, 0) - COALESCE(p.cnt, 0)) * 100.0 / NULLIF(COALESCE(p.cnt, 0), 0), 1) AS variation_pct
    FROM courant c
    FULL OUTER JOIN precedent p ON c.categorie = p.categorie
    ORDER BY incidents_courants DESC
  parameters:
  - name: annee_courante
    type: integer
    description: Année courante
    required: false
    default: 2025
  - name: annee_precedente
    type: integer
    description: Année précédente
    required: false
    default: 2024
  nl_examples:
  - Quelles catégories de crimes ont augmenté à Montréal?
  - Comparaison par type de crime à Montréal
  - Évolution des catégories 2024 vs 2023 à Montréal
  - Quels types de crimes sont en hausse entre 2022 et 2023 à Montréal?
