  - Identification des zones à Montréal à risque croissant en 2023
  - Quels quartiers de Montréal sont en train de devenir plus dangereux?
  - Arrondissements de Montréal avec la plus grande variation de criminalité
  - Crime hotspots in Montreal
  - Montreal boroughs with rising crime
  - Where is crime increasing in Montreal?
  - Which Montreal boroughs saw the biggest increase in 2024?
  - Where is it getting worse the most in Montreal?
  - Which areas in Montreal are experiencing a sharp increase in crime?
  - Identifying growing risk zones in 2023 in Montreal
  - Which Montreal neighbourhoods are becoming more dangerous?
  - Montreal boroughs with the greatest crime variation
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: actes_criminels
    qualifiers: [points_chauds, arrondissement]
  tags: [points_chauds, arrondissement, aperçu]

- id: deviation_saisonniere
  description: Identifie les mois avec un nombre de crimes significativement au-dessus de la moyenne historique
  sql: |
    WITH mensuel AS (
      SELECT EXTRACT(MONTH FROM date_evenement) AS mois,
        EXTRACT(YEAR FROM date_evenement) AS annee,
        COUNT(*) AS cnt
      FROM actes_criminels
      GROUP BY mois, annee
    ),
    moyenne_mensuelle AS (
      SELECT mois,
        ROUND(AVG(cnt), 1) AS moyenne_incidents,
        ROUND(STDDEV(cnt), 1) AS ecart_type
      FROM mensuel
      GROUP BY mois
    ),
    derniere AS (
      SELECT mois, cnt
      FROM mensuel
      WHERE annee = :annee
    )
    SELECT
      d.mois,
      d.cnt AS incidents_cette_annee,
      m.moyenne_incidents AS moyenne_historique,
      ROUND((d.cnt - m.moyenne_incidents) / NULLIF(m.ecart_type, 0), 1) AS score_z
    FROM derniere d
    JOIN moyenne_mensuelle m ON d.mois = m.mois
    ORDER BY score_z DESC
  parameters:
  - name: annee
    type: integer
    description: Année à analyser
    required: false
    default: 2025
  nl_examples:
  - Mois inhabituels pour les crimes à Montréal
  - Anomalies saisonnières à Montréal
  - Quels mois ont des crimes anormalement élevés à Montréal?
  - Y a-t-il des pics de criminalité inhabituels en 2024 à Montréal?
