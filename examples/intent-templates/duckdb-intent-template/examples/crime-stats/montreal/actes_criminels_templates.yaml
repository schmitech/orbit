    SELECT categorie, EXTRACT(YEAR FROM date_evenement) AS annee, COUNT(*) AS total_incidents
    FROM actes_criminels
    WHERE categorie = 'Infractions entrainant la mort'
      AND EXTRACT(YEAR FROM date_evenement) >= EXTRACT(YEAR FROM CURRENT_DATE) - 10
