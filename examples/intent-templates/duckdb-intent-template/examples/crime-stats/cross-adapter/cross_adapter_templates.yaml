# Cross-adapter templates for multi-city comparison queries.
# These templates are owned by the composite retriever and trigger
# parallel execution across multiple child adapters.

templates:
  # ============================================================
  # Auto Theft Cross-City Comparisons
  # ============================================================
  - id: compare_auto_theft_ottawa_toronto
    description: Compare auto theft statistics between Ottawa and Toronto
    cross_adapter: true
    target_adapters:
      - adapter: "intent-duckdb-ottawa-police-auto-theft"
        label: "Ottawa"
      - adapter: "intent-duckdb-toronto-police-auto-theft"
        label: "Toronto"
    merge_strategy: side_by_side
    partial_results: true
    nl_examples:
      - "compare Ottawa and Toronto auto theft"
      - "Ottawa vs Toronto auto theft"
      - "how does auto theft compare between Ottawa and Toronto"
      - "show me auto theft in Ottawa and Toronto"
      - "Ottawa Toronto vehicle theft comparison"
      - "which city has more auto theft Ottawa or Toronto"
    tags:
      - comparison
      - cross-city
      - auto-theft

  - id: compare_auto_theft_ottawa_montreal
    description: Compare auto theft statistics between Ottawa and Montreal
    cross_adapter: true
    target_adapters:
