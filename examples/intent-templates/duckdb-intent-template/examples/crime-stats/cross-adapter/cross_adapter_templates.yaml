        label: "Ottawa"
      - adapter: "intent-duckdb-montreal-police-actes-criminels"
        label: "Montreal"
    merge_strategy: side_by_side
    partial_results: true
    nl_examples:
      - "compare Ottawa and Montreal auto theft"
      - "Ottawa vs Montreal auto theft"
      - "how does auto theft compare between Ottawa and Montreal"
      - "show me auto theft in Ottawa and Montreal"
      - "Ottawa Montreal vehicle theft comparison"
      - "which city has more auto theft Ottawa or Montreal"
    tags:
      - comparison
      - cross-city
      - auto-theft

