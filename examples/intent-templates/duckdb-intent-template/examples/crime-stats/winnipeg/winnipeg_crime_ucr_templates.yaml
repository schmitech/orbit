  # === YEAR-OVER-YEAR COMPARISON ===
  - id: crime_yoy_comparison
    description: Year-over-year change in crime by category
    sql: |
      WITH current_year AS (
        SELECT crime_type, SUM(count_stats) as current_count
        FROM winnipeg_crime_ucr
        WHERE year = :year
        GROUP BY crime_type
      ),
      previous_year AS (
        SELECT crime_type, SUM(count_stats) as prev_count
        FROM winnipeg_crime_ucr
        WHERE year = :year - 1
        GROUP BY crime_type
      )
      SELECT 
        c.crime_type,
        p.prev_count as "Count (Previous)",
        c.current_count as "Count (Current)",
        c.current_count - p.prev_count as net_change,
        ROUND((c.current_count - p.prev_count) * 100.0 / NULLIF(p.prev_count, 0), 2) as pct_change
      FROM current_year c
      LEFT JOIN previous_year p ON c.crime_type = p.crime_type
      ORDER BY pct_change DESC
    parameters:
      - name: year
        type: integer
        description: Current year for comparison
        required: false
        default: 2024
    nl_examples:
    - How does 2024 Winnipeg crime compare to 2023?
    - YoY crime change in Winnipeg by category
    - Is violent crime increasing in Winnipeg in 2024 compared to last year?
    - Percentage change in Winnipeg crime types between 2023 and 2024
    - Winnipeg crime growth rates 2024
    - Compare Winnipeg this year's incidents to last year
    - Which Winnipeg crime types increased the most in 2024?
    - Growth or decline of crime in Winnipeg
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: compare
      primary_entity: winnipeg_crime_ucr
      qualifiers: [yoy, change]
    tags: [comparison, statistics]

