        (SELECT offence FROM (SELECT offence, SUM(count_stats) as c FROM winnipeg_crime_ucr WHERE year = :year GROUP BY offence ORDER BY c DESC LIMIT 1)) as top_offence,
        (SELECT neighbourhood FROM (SELECT neighbourhood, SUM(count_stats) as c FROM winnipeg_crime_ucr WHERE year = :year GROUP BY neighbourhood ORDER BY c DESC LIMIT 1)) as top_neighbourhood,
        ROUND(((SELECT SUM(count_stats) FROM winnipeg_crime_ucr WHERE year = :year) - (SELECT SUM(count_stats) FROM winnipeg_crime_ucr WHERE year = :year - 1)) * 100.0 / (SELECT SUM(count_stats) FROM winnipeg_crime_ucr WHERE year = :year - 1), 2) as yoy_change_pct
