  # === CATEGORY ANALYSIS ===
  - id: crime_type_breakdown
    description: Breakdown of incidents by high-level crime type
    sql: |
      SELECT 
        crime_type,
        SUM(count_stats) as total_incidents,
        ROUND(SUM(count_stats) * 100.0 / (SELECT SUM(count_stats) FROM winnipeg_crime_ucr WHERE year = :year), 2) as percentage
      FROM winnipeg_crime_ucr
      WHERE year = :year
      GROUP BY crime_type
      ORDER BY total_incidents DESC
    parameters:
      - name: year
        type: integer
        description: Year to analyze
        required: false
        default: 2024
    nl_examples:
