  # === POLICY & STRATEGIC ANALYTICS ===
  - id: fastest_growing_crimes
    description: Crimes with the highest percentage growth (min 10 incidents)
    sql: |
      WITH yearly_offences AS (
        SELECT 
          offence,
          SUM(CASE WHEN year = :year - 1 THEN count_stats ELSE 0 END) as prev_count,
          SUM(CASE WHEN year = :year THEN count_stats ELSE 0 END) as current_count
        FROM winnipeg_crime_ucr
        WHERE year IN (:year, :year - 1)
        GROUP BY offence
      )
      SELECT 
        offence,
        prev_count,
        current_count,
        current_count - prev_count as net_change,
        ROUND((current_count - prev_count) * 100.0 / NULLIF(prev_count, 0), 2) as growth_pct
      FROM yearly_offences
      WHERE prev_count >= 10
      ORDER BY growth_pct DESC
      LIMIT 10
    parameters:
      - name: year
        type: integer
        description: Year to analyze
        required: false
        default: 2024
    nl_examples:
    - Which Winnipeg crimes are surging in 2024?
    - Fastest growing offences in Winnipeg
    - What Winnipeg crime types saw the biggest increase last year?
    - Emerging Winnipeg crime threats in 2024
    - Identify surging incident types in Winnipeg
    - Winnipeg crimes with highest growth rate 2024
    - Top increasing offences in Winnipeg
    - Most significant YoY Winnipeg growth by crime type
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: calculate
      primary_entity: winnipeg_crime_ucr
      qualifiers: [policy, growth]
    tags: [policy, statistics]

  - id: crime_concentration
    description: Concentration of crime among top neighbourhoods (Pareto Principle)
    sql: |
      WITH total AS (
        SELECT SUM(count_stats) as city_total FROM winnipeg_crime_ucr WHERE year = :year
      ),
      neighbourhood_ranks AS (
        SELECT 
          neighbourhood,
          SUM(count_stats) as total_incidents,
          SUM(SUM(count_stats)) OVER (ORDER BY SUM(count_stats) DESC) as cumulative_incidents,
          ROW_NUMBER() OVER (ORDER BY SUM(count_stats) DESC) as n_rank,
          (SELECT COUNT(DISTINCT neighbourhood) FROM winnipeg_crime_ucr WHERE year = :year) as total_neighbourhoods
        FROM winnipeg_crime_ucr
        WHERE year = :year
        GROUP BY neighbourhood
      )
      SELECT 
        neighbourhood,
        total_incidents,
        ROUND(total_incidents * 100.0 / t.city_total, 2) as pct_of_city,
        ROUND(cumulative_incidents * 100.0 / t.city_total, 2) as cumulative_pct,
        CASE 
          WHEN n_rank <= total_neighbourhoods * 0.05 THEN 'Top 5%'
          WHEN n_rank <= total_neighbourhoods * 0.10 THEN 'Top 10%'
          WHEN n_rank <= total_neighbourhoods * 0.20 THEN 'Top 20%'
          ELSE 'Rest'
        END as concentration_tier
      FROM neighbourhood_ranks, total t
      ORDER BY total_incidents DESC
      LIMIT 20
    parameters:
      - name: year
        type: integer
        description: Year to analyze
        required: false
        default: 2024
    nl_examples:
    - How concentrated is crime in Winnipeg neighbourhoods?
    - Does a small number of Winnipeg areas account for most crime?
    - Pareto analysis of Winnipeg crime by location
    - Winnipeg crime concentration in top neighbourhoods 2024
    - Strategic hot-spot concentration in Winnipeg
    - Distribution of crime volume across Winnipeg city locations
    - Which Winnipeg areas account for the top 50% of crime?
    - Crime inequality across Winnipeg neighbourhoods
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: calculate
      primary_entity: winnipeg_crime_ucr
      qualifiers: [policy, concentration]
    tags: [policy, hot-spots]

  - id: city_snapshot
