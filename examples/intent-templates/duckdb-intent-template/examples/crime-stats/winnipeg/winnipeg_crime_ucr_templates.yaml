  - id: seasonal_deviation
    description: Monthly crime deviation from annual average
    sql: |
      WITH monthly_counts AS (
        SELECT 
          month,
          SUM(count_stats) as monthly_total
        FROM winnipeg_crime_ucr
        WHERE year = :year
        GROUP BY month
      ),
      avg_stats AS (
        SELECT AVG(monthly_total) as avg_monthly FROM monthly_counts
      )
      SELECT 
        m.month,
        m.monthly_total,
        ROUND(m.monthly_total - a.avg_monthly, 0) as deviation,
        ROUND((m.monthly_total - a.avg_monthly) * 100.0 / a.avg_monthly, 2) as pct_deviation
      FROM monthly_counts m, avg_stats a
      ORDER BY m.month ASC
    parameters:
      - name: year
        type: integer
        description: Year to analyze
        required: false
        default: 2024
    nl_examples:
    - Which months are above or below average for crime in Winnipeg in 2024?
    - Seasonal deviation of crime in Winnipeg
    - When is Winnipeg crime significantly higher than usual?
    - Monthly Winnipeg crime variance from the mean in 2024
    - Seasonal anomalies in Winnipeg crime 2024
    - How does each month differ from the yearly Winnipeg average?
    - Peak and trough months for Winnipeg crime 2024
    - Winnipeg crime seasonality analysis 2024
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: calculate
      primary_entity: winnipeg_crime_ucr
      qualifiers: [policy, seasonality]
    tags: [policy, trends]

  - id: persistent_hotspots
    description: Neighbourhoods consistently in the top 20 for crime
    sql: |
      WITH neighbourhood_yearly_ranks AS (
        SELECT 
          year,
          neighbourhood,
          RANK() OVER (PARTITION BY year ORDER BY SUM(count_stats) DESC) as city_rank
        FROM winnipeg_crime_ucr
        GROUP BY year, neighbourhood
      )
      SELECT 
        neighbourhood,
        COUNT(DISTINCT year) as years_in_top_20,
        GROUP_CONCAT(year ORDER BY year DESC) as years_active
      FROM neighbourhood_yearly_ranks
      WHERE city_rank <= 20
      GROUP BY neighbourhood
      HAVING COUNT(DISTINCT year) >= 3
      ORDER BY years_in_top_20 DESC, neighbourhood ASC
    nl_examples:
    - Which Winnipeg neighbourhoods are chronic crime hot-spots?
    - Persistent high-crime areas in Winnipeg
    - Winnipeg locations consistently in the top 20 for crime
    - Chronic Winnipeg hot-spots across multiple years
    - Which areas are always high-crime in Winnipeg?
    - Winnipeg neighbourhoods with persistent crime issues
    - List chronic Winnipeg hot-spots from 2017 to 2025
    - Long-term high-crime locations in Winnipeg
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: calculate
      primary_entity: winnipeg_crime_ucr
      qualifiers: [policy, persistence]
    tags: [policy, hot-spots]

  - id: category_composition_shift #FIXME
    description: Change in the share of each crime type over time
    sql: |
      WITH yearly_totals AS (
        SELECT year, SUM(count_stats) as total_count
        FROM winnipeg_crime_ucr
        GROUP BY year
      ),
      category_yearly AS (
        SELECT 
          year,
          crime_type,
          SUM(count_stats) as category_count
        FROM winnipeg_crime_ucr
        GROUP BY year, crime_type
      )
      SELECT 
        cy.year,
        cy.crime_type,
        cy.category_count,
        ROUND(cy.category_count * 100.0 / yt.total_count, 2) as share_pct
      FROM category_yearly cy
      JOIN yearly_totals yt ON cy.year = yt.year
      WHERE cy.crime_type = :crime_type
      ORDER BY cy.year DESC
    parameters:
      - name: crime_type
        type: string
        description: Crime type to analyze (Violent, Property, etc.)
        required: true
    nl_examples:
    - Is violent crime taking up a larger share of total Winnipeg crime?
    - Shift in Winnipeg crime composition for Property crime
    - How has the proportion of Winnipeg Drug offences changed over time?
    - Share of Winnipeg violent incidents since 2017
    - Winnipeg crime composition shift analysis
    - Is Winnipeg's crime profile changing?
    - Percentage of total Winnipeg crime that is Violent over the years
    - Tracking the share of property crime in Winnipeg
    result_format: table
    version: 1.0.0
    approved: true
    semantic_tags:
      action: calculate
      primary_entity: winnipeg_crime_ucr
      qualifiers: [policy, composition]
    tags: [policy, trends]
