domain_name: Vancouver Police Department Crime Database
description: Vancouver Police Department crime database for DuckDB - tracks founded criminal incidents across Vancouver from 2003-present using the All Offence reporting method
domain_type: analytical
semantic_types:
  date_value:
    description: Date values in various formats
    patterns:
    - date
    - day
    - time
    - when
    - from
    - to
    - between
    regex_patterns:
    - \b\d{4}-\d{2}-\d{2}\b
    - \b\d{2}/\d{2}/\d{4}\b
  identifier:
    description: Unique identifier
    patterns:
    - id
    - identifier
    - key
    regex_patterns:
    - \b(\d+)\b
  integer_value:
    description: Integer/count values
    patterns:
    - count
    - number
    - year
    regex_patterns:
    - \b\d+\b
