entities:
  primary:
    name: crime_data
    table: crime_data
    primary_key: id
    searchable_fields:
    - crime_type
    - neighbourhood
    - hundred_block
    filterable_fields:
    - year
    - crime_type
    - neighbourhood
    - hundred_block
    - hour
    - reported_date
fields:
  id:
    data_type: integer
    description: Auto-generated unique identifier for each crime record
    searchable: false
    filterable: false
    sortable: true
    summary_priority: 0
  crime_type:
    data_type: varchar
    description: "Type of crime: Break and Enter Commercial, Break and Enter Residential/Other, Homicide, Mischief, Offence Against a Person, Other Theft, Theft from Vehicle, Theft of Bicycle, Theft of Vehicle, Vehicle Collision or Pedestrian Struck (with Fatality/Injury)"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 1
  year:
    data_type: integer
    description: Four-digit year of the reported activity (2003-present)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 1
  month:
    data_type: integer
    description: Numeric month (1-12)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 2
  day:
    data_type: integer
    description: Day of month (1-31)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 3
  hour:
    data_type: integer
    description: "Hour in 24-hour format (0-23). Note: no time data for Offence Against a Person"
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 2
  minute:
    data_type: integer
    description: Minute (0-59)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 3
  hundred_block:
    data_type: varchar
    description: "Generalized location at hundred-block level (e.g., 10XX ALBERNI ST). Offences Against a Person locations are randomized for privacy."
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 2
  neighbourhood:
    data_type: varchar
    description: "Vancouver neighbourhood based on Statistics Canada census tract definitions (e.g., West End, Strathcona, Central Business District)"
    searchable: true
    filterable: true
    sortable: true
    summary_priority: 1
  reported_date:
    data_type: date
    description: Date of the reported activity (constructed from year/month/day)
    searchable: false
    filterable: true
    sortable: true
    summary_priority: 2
