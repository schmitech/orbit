  - Vancouver neighbourhood-level year-over-year comparison
  - Where did crime increase the most by area in Vancouver?
  - Compare Vancouver neighbourhoods between two years
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [yoy, neighbourhood, comparison]
  tags: [yoy, neighbourhood, comparison]

