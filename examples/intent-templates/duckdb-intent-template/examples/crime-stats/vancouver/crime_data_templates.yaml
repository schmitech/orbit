- id: weekend_vs_weekday_by_type
  description: Compare weekend vs weekday crime rates by type for shift planning
  sql: |
    WITH day_counts AS (
      SELECT
        COUNT(DISTINCT CASE WHEN DAYOFWEEK(reported_date) IN (1, 7) THEN reported_date END) AS weekend_days,
        COUNT(DISTINCT CASE WHEN DAYOFWEEK(reported_date) NOT IN (1, 7) THEN reported_date END) AS weekday_days
      FROM crime_data
      WHERE year = :year AND reported_date IS NOT NULL
    )
    SELECT
      c.crime_type,
      SUM(CASE WHEN DAYOFWEEK(c.reported_date) IN (1, 7) THEN 1 ELSE 0 END) AS weekend_total,
      SUM(CASE WHEN DAYOFWEEK(c.reported_date) NOT IN (1, 7) THEN 1 ELSE 0 END) AS weekday_total,
      ROUND(SUM(CASE WHEN DAYOFWEEK(c.reported_date) IN (1, 7) THEN 1 ELSE 0 END) * 1.0 /
            d.weekend_days, 1) AS avg_per_weekend_day,
      ROUND(SUM(CASE WHEN DAYOFWEEK(c.reported_date) NOT IN (1, 7) THEN 1 ELSE 0 END) * 1.0 /
            d.weekday_days, 1) AS avg_per_weekday,
      ROUND(
        (SUM(CASE WHEN DAYOFWEEK(c.reported_date) IN (1, 7) THEN 1 ELSE 0 END) * 1.0 / d.weekend_days) /
        NULLIF(SUM(CASE WHEN DAYOFWEEK(c.reported_date) NOT IN (1, 7) THEN 1 ELSE 0 END) * 1.0 / d.weekday_days, 0)
      , 2) AS weekend_to_weekday_ratio
    FROM crime_data c
    CROSS JOIN day_counts d
    WHERE c.year = :year AND c.reported_date IS NOT NULL
    GROUP BY c.crime_type, d.weekend_days, d.weekday_days
    ORDER BY weekend_to_weekday_ratio DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Is there more crime on weekends in Vancouver?
  - Vancouver weekend vs weekday crime comparison by type
  - When should Vancouver police have more staff?
  - Vancouver shift planning analysis
  - Are vehicle thefts more common on weekends in Vancouver?
  - Do more break-ins happen on weekdays or weekends in Vancouver?
  - Vancouver weekend crime rates vs weekday in 2024
  - Which Vancouver crimes spike on weekends?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [weekend, weekday, staffing]
  tags: [policy, staffing, shift-planning, resource-allocation]

- id: persistent_hotspot_neighbourhoods
  description: Neighbourhoods that consistently rank in the top 10 across every year — chronic problem locations
  sql: |
    WITH yearly_ranked AS (
      SELECT
        neighbourhood,
        year,
        COUNT(*) AS crimes,
        RANK() OVER (PARTITION BY year ORDER BY COUNT(*) DESC) AS year_rank
      FROM crime_data
      WHERE neighbourhood != ''
      GROUP BY neighbourhood, year
    )
    SELECT
      neighbourhood,
      COUNT(DISTINCT year) AS years_in_top_10,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank,
      SUM(crimes) AS total_crimes,
      ROUND(AVG(crimes), 0) AS avg_per_year
    FROM yearly_ranked
    WHERE year_rank <= 10
    GROUP BY neighbourhood
    HAVING COUNT(DISTINCT year) >= 5
    ORDER BY years_in_top_10 DESC, total_crimes DESC
  parameters: []
  nl_examples:
  - Which neighbourhoods are persistently high-crime in Vancouver?
  - Chronic crime hotspot neighbourhoods in Vancouver
  - Where does crime never go away in Vancouver?
  - Vancouver neighbourhoods that need sustained police attention
  - Repeat problem neighbourhoods across years in Vancouver
  - Which areas have been in the top 10 for crime every year in Vancouver?
  - Long-term problem areas in Vancouver
  - Vancouver neighbourhoods that are always high-crime
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: crime_data
    qualifiers: [persistent, chronic, hotspots]
  tags: [policy, persistent, chronic, intervention, strategic]

- id: mischief_property_correlation
  description: "Broken windows analysis: neighbourhoods with high mischief AND high property/violent crime, suggesting targeted intervention"
  sql: |
    WITH neighbourhood_stats AS (
      SELECT
        neighbourhood,
        SUM(CASE WHEN crime_type = 'Mischief' THEN 1 ELSE 0 END) AS mischief_count,
        SUM(CASE WHEN crime_type IN ('Offence Against a Person', 'Homicide') THEN 1 ELSE 0 END) AS violent_count,
        SUM(CASE WHEN crime_type IN ('Other Theft', 'Theft from Vehicle', 'Theft of Vehicle', 'Theft of Bicycle', 'Break and Enter Commercial', 'Break and Enter Residential/Other') THEN 1 ELSE 0 END) AS property_count,
        COUNT(*) AS total_count
      FROM crime_data
      WHERE year = :year AND neighbourhood != ''
      GROUP BY neighbourhood
      HAVING SUM(CASE WHEN crime_type = 'Mischief' THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      neighbourhood,
      mischief_count,
      violent_count,
      property_count,
      total_count,
      ROUND(mischief_count * 100.0 / total_count, 1) AS mischief_share_pct,
      ROUND(violent_count * 100.0 / total_count, 1) AS violent_share_pct
    FROM neighbourhood_stats
    ORDER BY mischief_count + violent_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Where do mischief and violent crime overlap in Vancouver?
  - Broken windows analysis for Vancouver
  - Which Vancouver neighbourhoods have both mischief and serious crime?
  - Where should targeted Vancouver interventions focus?
  - Vancouver disorder and crime correlation by neighbourhood
  - Does vandalism correlate with violent crime in Vancouver?
  - Vancouver neighbourhoods with high mischief and assault
  - Where does Vancouver property damage lead to worse crime?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: crime_data
    qualifiers: [correlation, mischief, intervention]
  tags: [policy, broken-windows, intervention, strategic]
