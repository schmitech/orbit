- id: seasonal_deviation
  description: Compare current year monthly counts to historical averages to find unusual months
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(crimes), 1) AS avg_crimes
      FROM (
        SELECT
          EXTRACT(MONTH FROM reported_date) AS month,
          year,
          COUNT(*) AS crimes
        FROM crime_data
        WHERE reported_date IS NOT NULL
        GROUP BY EXTRACT(MONTH FROM reported_date), year
      ) sub
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM reported_date) AS month,
        COUNT(*) AS crimes
      FROM crime_data
      WHERE year = :year AND reported_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM reported_date)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.crimes AS current_count,
      a.avg_crimes AS historical_avg,
      ROUND(c.crimes - a.avg_crimes, 1) AS deviation
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY c.month
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2025
  nl_examples:
  - Are there unusual months for crime this year in Vancouver?
  - Vancouver seasonal deviation analysis
  - Which Vancouver months are above or below average?
  - Compare this Vancouver year to historical averages
  - Was any month unusually high for crime in 2024 in Vancouver?
  - How does 2025 compare to the historical average by month in Vancouver?
  - Which Vancouver months were abnormal for crime?
  - Monthly anomalies in Vancouver crime
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [seasonal, deviation]
  tags: [seasonal, deviation, insight]

- id: neighbourhood_safety_trend
  description: Track how a neighbourhood's crime count has changed year over year using LAG
  sql: |
    SELECT
      year,
      COUNT(*) AS crime_count,
      LAG(COUNT(*)) OVER (ORDER BY year) AS previous_year_count,
      COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year) AS change,
      ROUND((COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year)) * 100.0 /
            NULLIF(LAG(COUNT(*)) OVER (ORDER BY year), 0), 1) AS change_pct
    FROM crime_data
    WHERE LOWER(neighbourhood) = LOWER(:neighbourhood)
    GROUP BY year
    ORDER BY year DESC
  parameters:
  - name: neighbourhood
    type: string
    description: "Neighbourhood name (e.g., West End, Strathcona)"
    required: true
  nl_examples:
