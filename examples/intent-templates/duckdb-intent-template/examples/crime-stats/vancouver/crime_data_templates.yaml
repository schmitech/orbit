- id: yearly_crime_trends
  description: Track year-over-year changes in crime across Vancouver
  sql: |
    SELECT
      year,
      COUNT(*) AS total_crimes,
      COUNT(DISTINCT crime_type) AS unique_types,
      COUNT(DISTINCT neighbourhood) AS neighbourhoods_affected
    FROM crime_data
    GROUP BY year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - How has crime changed over the years in Vancouver?
  - Show me Vancouver yearly crime trends
  - Is crime increasing or decreasing in Vancouver?
  - Total incidents per year in Vancouver
  - Year-over-year crime stats Vancouver
  - Give me the Vancouver crime totals for every year
  - How many crimes were reported each year in Vancouver?
  - Vancouver crime numbers by year
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: crime_data
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic]

- id: crimes_by_month
  description: Analyze monthly crime patterns to identify seasonal trends
  sql: |
    SELECT
      EXTRACT(MONTH FROM reported_date) AS month,
      CASE EXTRACT(MONTH FROM reported_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS crime_count
    FROM crime_data
    WHERE year = :year AND reported_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM reported_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which months have the most crime in Vancouver?
  - Show me seasonal crime patterns in Vancouver
  - When do most incidents happen in Vancouver?
  - Monthly crime breakdown Vancouver
  - Peak months for crime in Vancouver
  - What month had the highest crime in 2024 in Vancouver?
  - Crime by month in Vancouver in 2023
  - Is summer or winter worse for crime in Vancouver?
  - Monthly incident count for Vancouver
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: crime_data
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns]

- id: crimes_by_weekday
  description: Analyze which days of the week have the most crime
  sql: |
    SELECT
      DAYNAME(reported_date) AS day_of_week,
      COUNT(*) AS crime_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM crime_data
    WHERE year = :year AND reported_date IS NOT NULL
    GROUP BY DAYNAME(reported_date)
    ORDER BY crime_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which days of the week have the most crime in Vancouver?
  - Are weekends more dangerous in Vancouver?
  - Vancouver weekday vs weekend crime comparison
  - What day has the most incidents in Vancouver?
  - Is Friday the busiest day for crime in Vancouver?
  - Vancouver crime distribution by day of week in 2024
  - Which day of the week is safest in Vancouver?
  - Do more crimes happen on weekends or weekdays in Vancouver?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: crime_data
    qualifiers: [weekday, patterns]
  tags: [weekday, patterns, timing]

- id: crimes_by_hour
  description: Analyze crime by time of day (hour) to identify peak hours
  sql: |
    SELECT
      hour,
      CASE
        WHEN hour BETWEEN 6 AND 11 THEN 'Morning'
        WHEN hour BETWEEN 12 AND 17 THEN 'Afternoon'
        WHEN hour BETWEEN 18 AND 23 THEN 'Evening'
        ELSE 'Night'
      END AS time_period,
      COUNT(*) AS crime_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM crime_data
    WHERE year = :year
    GROUP BY hour
    ORDER BY hour
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - What time of day does crime happen most in Vancouver?
  - Peak hours for crime in Vancouver
  - Is crime worse at night in Vancouver?
  - Hourly crime distribution in Vancouver
  - When is Vancouver most dangerous?
  - What hour has the most break-ins in Vancouver?
  - Vancouver crime by time of day in 2024
  - Is it safer during the day or at night in Vancouver?
  - Late night crime in Vancouver
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: crime_data
    qualifiers: [hourly, timing]
  tags: [hourly, timing, patterns]

