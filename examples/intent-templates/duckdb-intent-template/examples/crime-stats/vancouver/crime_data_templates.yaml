- id: fastest_growing_types
  description: Rank crime types by year-over-year growth rate to identify emerging threats
  sql: |
    WITH counts AS (
      SELECT
        crime_type,
        SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current,
        SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous
      FROM crime_data
      WHERE year IN (:year, :previous_year)
      GROUP BY crime_type
      HAVING SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      crime_type,
      previous AS previous_year,
      current AS current_year,
      current - previous AS change,
      ROUND((current - previous) * 100.0 / previous, 1) AS growth_pct
    FROM counts
    WHERE current > previous
    ORDER BY growth_pct DESC
    LIMIT 15
  parameters:
  - name: year
    type: integer
    description: Current year
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2024
  nl_examples:
  - What crime types are growing fastest in Vancouver?
  - Which Vancouver crimes are on the rise?
  - Emerging crime threats in Vancouver
  - Fastest increasing Vancouver crime types
  - What should Vancouver police be concerned about?
  - What Vancouver crimes surged the most in 2024?
  - Which Vancouver crime types had the biggest increase?
  - Rising crime threats in Vancouver
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [growth, emerging, ranking]
  tags: [policy, growth, emerging-threats, strategic]

- id: fastest_declining_types
  description: Rank crime types by year-over-year decline to identify where interventions may be working
  sql: |
    WITH counts AS (
      SELECT
        crime_type,
        SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current,
        SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous
      FROM crime_data
      WHERE year IN (:year, :previous_year)
      GROUP BY crime_type
      HAVING SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      crime_type,
      previous AS previous_year,
      current AS current_year,
      current - previous AS change,
      ROUND((current - previous) * 100.0 / previous, 1) AS decline_pct
    FROM counts
    WHERE current < previous
    ORDER BY decline_pct ASC
    LIMIT 15
  parameters:
