- id: crimes_on_block
  description: Crimes reported on a specific hundred block or street
  sql: |
    SELECT year, crime_type, COUNT(*) AS crime_count
    FROM crime_data
    WHERE UPPER(hundred_block) LIKE '%' || REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(UPPER(:block),
      'STREET', 'ST'), 'AVENUE', 'AVE'), 'DRIVE', 'DR'), 'BOULEVARD', 'BLVD'),
      'HIGHWAY', 'HWY'), 'CRESCENT', 'CRES'), 'ROAD', 'RD'), 'PLACE', 'PL') || '%'
    GROUP BY year, crime_type
    ORDER BY year DESC, crime_count DESC
  parameters:
