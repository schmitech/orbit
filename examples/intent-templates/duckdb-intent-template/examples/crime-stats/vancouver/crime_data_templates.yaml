- id: crime_concentration
  description: "Pareto analysis: what percentage of neighbourhoods account for the majority of crime (hot-spots policing metric)"
  sql: |
    WITH ranked AS (
      SELECT
        neighbourhood,
        COUNT(*) AS crimes,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM crime_data
      WHERE year = :year AND neighbourhood != ''
      GROUP BY neighbourhood
    ),
    totals AS (
      SELECT
        COUNT(DISTINCT neighbourhood) AS total_neighbourhoods,
        SUM(crimes) AS total_crimes
      FROM ranked
    )
    SELECT
      CASE
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.10) THEN 'Top 10%'
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.20) THEN 'Top 20%'
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.50) THEN 'Top 50%'
        ELSE 'Bottom 50%'
      END AS neighbourhood_tier,
      COUNT(*) AS num_neighbourhoods,
      SUM(r.crimes) AS total_crimes,
      ROUND(SUM(r.crimes) * 100.0 / MAX(t.total_crimes), 1) AS pct_of_all_crime
    FROM ranked r
    CROSS JOIN totals t
    GROUP BY
      CASE
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.10) THEN 'Top 10%'
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.20) THEN 'Top 20%'
        WHEN r.rank <= CEIL(t.total_neighbourhoods * 0.50) THEN 'Top 50%'
        ELSE 'Bottom 50%'
      END
    ORDER BY MIN(r.rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - How concentrated is crime in Vancouver?
  - Do a few Vancouver neighbourhoods account for most crime?
  - Vancouver crime concentration analysis
  - Pareto analysis of Vancouver crime hotspots
  - What percentage of Vancouver neighbourhoods have the most crime?
  - Is crime spread evenly or concentrated in a few Vancouver areas?
  - How many neighbourhoods make up most of the Vancouver crime?
  - Crime distribution inequality in Vancouver
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: crime_data
    qualifiers: [concentration, pareto, hotspots]
  tags: [policy, concentration, pareto, resource-allocation]

- id: type_composition_shift
  description: How the mix of crime types has shifted over the years (share % per type per year)
  sql: |
    WITH yearly_totals AS (
      SELECT year, COUNT(*) AS total
      FROM crime_data
      GROUP BY year
    )
    SELECT
      c.year,
      c.crime_type,
      COUNT(*) AS crimes,
      ROUND(COUNT(*) * 100.0 / yt.total, 1) AS share_pct
    FROM crime_data c
    JOIN yearly_totals yt ON c.year = yt.year
    GROUP BY c.year, c.crime_type, yt.total
    ORDER BY c.year DESC, share_pct DESC
  parameters: []
