      ROUND(((SELECT COUNT(*) FROM crime_data WHERE year = :year) -
             (SELECT COUNT(*) FROM crime_data WHERE year = :previous_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM crime_data WHERE year = :previous_year), 0), 1) AS yoy_change_pct,
      (SELECT crime_type FROM crime_data WHERE year = :year GROUP BY crime_type ORDER BY COUNT(*) DESC LIMIT 1) AS top_type,
