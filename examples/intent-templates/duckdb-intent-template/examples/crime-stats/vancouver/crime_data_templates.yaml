# =============================================================================
# INSIGHT GENERATORS - Advanced analytics
# =============================================================================

- id: emerging_hotspots
  description: Neighbourhoods with the largest year-over-year increase in crime
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood,
        year,
        COUNT(*) AS crimes
      FROM crime_data
      WHERE year IN (:year, :previous_year) AND neighbourhood != ''
      GROUP BY neighbourhood, year
    ),
    yoy AS (
      SELECT
        c.neighbourhood,
        c.crimes AS current_count,
        COALESCE(p.crimes, 0) AS previous_count,
        c.crimes - COALESCE(p.crimes, 0) AS change
      FROM yearly c
      LEFT JOIN yearly p ON c.neighbourhood = p.neighbourhood AND p.year = :previous_year
      WHERE c.year = :year
    )
    SELECT
      neighbourhood,
      current_count,
      previous_count,
      change,
      CASE WHEN previous_count = 0 THEN NULL
           ELSE ROUND(change * 100.0 / previous_count, 1)
      END AS change_pct
    FROM yoy
    WHERE change > 0
    ORDER BY change DESC
    LIMIT 15
  parameters:
  - name: year
    type: integer
    description: Current year
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2024
  nl_examples:
  - Which neighbourhoods are getting worse in Vancouver?
  - Emerging crime hotspots in Vancouver
  - Where is crime increasing the most in Vancouver?
  - New problem areas in Vancouver
  - What Vancouver areas saw the biggest jump in crime?
  - Where did crime spike in 2024 in Vancouver?
  - Rising crime neighbourhoods in Vancouver
  - Which Vancouver areas are trending in the wrong direction?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [hotspots, emerging, yoy]
  tags: [hotspots, emerging, yoy, insight]

- id: city_snapshot
