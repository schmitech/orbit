- id: crime_type_seasonality
  description: "Seasonal heatmap: which crime types peak in which season (for staffing and resource planning)"
  sql: |
    SELECT
      crime_type,
      SUM(CASE WHEN EXTRACT(MONTH FROM reported_date) IN (12, 1, 2) THEN 1 ELSE 0 END) AS winter,
      SUM(CASE WHEN EXTRACT(MONTH FROM reported_date) IN (3, 4, 5) THEN 1 ELSE 0 END) AS spring,
      SUM(CASE WHEN EXTRACT(MONTH FROM reported_date) IN (6, 7, 8) THEN 1 ELSE 0 END) AS summer,
      SUM(CASE WHEN EXTRACT(MONTH FROM reported_date) IN (9, 10, 11) THEN 1 ELSE 0 END) AS fall,
      COUNT(*) AS total
    FROM crime_data
    WHERE year = :year AND reported_date IS NOT NULL
    GROUP BY crime_type
    HAVING COUNT(*) >= 20
    ORDER BY total DESC
