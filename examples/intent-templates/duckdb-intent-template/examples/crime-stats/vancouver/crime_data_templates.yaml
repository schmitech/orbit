# =============================================================================
# YEAR-OVER-YEAR COMPARISON
# =============================================================================

- id: yoy_comparison
  description: Compare total crimes between two years by type
  sql: |
    SELECT
      crime_type,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current_year,
      SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous_year,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS change,
      CASE
        WHEN SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) = 0 THEN NULL
        ELSE ROUND((SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END)) * 100.0 / SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END), 1)
      END AS change_pct
    FROM crime_data
    WHERE year IN (:year, :previous_year)
    GROUP BY crime_type
    ORDER BY current_year DESC
  parameters:
  - name: year
    type: integer
    description: Current year to compare
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare against
    required: false
    default: 2024
  nl_examples:
  - Compare 2025 to 2024 crime in Vancouver
  - Year-over-year Vancouver crime comparison
  - Did crime go up or down this year in Vancouver?
  - How does this year compare to last year in Vancouver?
  - Vancouver crime change between years
  - Compare Vancouver crime in 2019 vs 2020
  - Has Vancouver crime gotten better or worse since last year?
  - What changed between 2023 and 2024 in Vancouver?
  - Vancouver crime comparison year over year
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: crime_data
    qualifiers: [yoy, comparison]
  tags: [yoy, comparison, change]

- id: yoy_neighbourhood_comparison
  description: Compare crime by neighbourhood between two years
  sql: |
    SELECT
      neighbourhood,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current_year,
      SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS previous_year,
      SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) AS change,
      CASE
        WHEN SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END) = 0 THEN NULL
        ELSE ROUND((SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) - SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END)) * 100.0 / SUM(CASE WHEN year = :previous_year THEN 1 ELSE 0 END), 1)
      END AS change_pct
    FROM crime_data
    WHERE year IN (:year, :previous_year) AND neighbourhood != ''
    GROUP BY neighbourhood
    ORDER BY change DESC
  parameters:
  - name: year
    type: integer
    description: Current year to compare
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare against
    required: false
