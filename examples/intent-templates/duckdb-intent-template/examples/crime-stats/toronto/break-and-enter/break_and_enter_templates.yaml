# POLICY & STRATEGIC ANALYTICS
# =============================================================================

- id: break_and_enter_concentration
  description: Analyze crime concentration - do a few neighbourhoods account for most break and enters in Toronto?
  sql: |
    WITH ranked AS (
      SELECT
        neighbourhood_158 AS neighbourhood,
        COUNT(*) AS incidents,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank_num
      FROM break_and_enter
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
      GROUP BY neighbourhood_158
    ),
    totals AS (
      SELECT COUNT(*) AS total_count, COUNT(DISTINCT neighbourhood_158) AS total_hoods
      FROM break_and_enter
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
    )
    SELECT
      CASE
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.05) THEN 'Top 5%'
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.10) THEN 'Top 6-10%'
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.20) THEN 'Top 11-20%'
        ELSE 'Remaining 80%'
      END AS tier,
      COUNT(*) AS neighbourhood_count,
      SUM(r.incidents) AS total_incidents,
      ROUND(SUM(r.incidents) * 100.0 / MAX(t.total_count), 1) AS pct_of_all_incidents
    FROM ranked r
    CROSS JOIN totals t
    GROUP BY
      CASE
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.05) THEN 'Top 5%'
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.10) THEN 'Top 6-10%'
        WHEN r.rank_num <= CEIL(t.total_hoods * 0.20) THEN 'Top 11-20%'
        ELSE 'Remaining 80%'
      END
    ORDER BY MIN(r.rank_num)
  parameters:
