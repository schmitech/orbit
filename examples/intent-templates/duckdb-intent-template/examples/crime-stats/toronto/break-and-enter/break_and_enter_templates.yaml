- id: break_and_enter_neighbourhood_safety_trend
  description: Safety trend for a specific neighbourhood using LAG window
  sql: |
    WITH yearly_counts AS (
      SELECT
        occ_year,
        COUNT(*) AS incident_count
      FROM break_and_enter
      WHERE neighbourhood_158 ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Toronto', ''), 'toronto', '')) || '%'
        AND occ_year >= 2014
      GROUP BY occ_year
    )
    SELECT
      occ_year,
      incident_count,
      LAG(incident_count) OVER (ORDER BY occ_year) AS previous_year_count,
      incident_count - LAG(incident_count) OVER (ORDER BY occ_year) AS change,
      ROUND((incident_count - LAG(incident_count) OVER (ORDER BY occ_year)) * 100.0 /
            NULLIF(LAG(incident_count) OVER (ORDER BY occ_year), 0), 1) AS change_pct
    FROM yearly_counts
    ORDER BY occ_year DESC
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood name to search
    required: true
  nl_examples:
