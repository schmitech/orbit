- id: break_and_enter_by_time_of_day
  description: Analyze break and enter patterns by hour of the day in Toronto
  sql: |
    SELECT
      occ_hour AS hour,
      CASE
        WHEN occ_hour BETWEEN 0 AND 5 THEN 'Late Night (12am-5am)'
        WHEN occ_hour BETWEEN 6 AND 11 THEN 'Morning (6am-11am)'
        WHEN occ_hour BETWEEN 12 AND 17 THEN 'Afternoon (12pm-5pm)'
        ELSE 'Evening (6pm-11pm)'
      END AS time_period,
      COUNT(*) AS incident_count
    FROM break_and_enter
    WHERE occ_year = :year
    GROUP BY occ_hour
    ORDER BY occ_hour
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
