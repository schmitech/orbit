- id: yearly_break_and_enter_trends
  description: Track year-over-year changes in break and enter incidents in Toronto
  sql: |
    SELECT
      occ_year,
      COUNT(*) AS total_incidents,
      COUNT(DISTINCT neighbourhood_158) AS neighbourhoods_affected,
      COUNT(DISTINCT division) AS divisions_affected
    FROM break_and_enter
    WHERE occ_year >= 2014
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters: []
  nl_examples:
  - How has break and enter changed over the years in Toronto?
  - Show me yearly B&E trends in Toronto
  - Is break and enter increasing or decreasing in Toronto?
  - Year-over-year comparison of Toronto break-ins
  - How many break and enters were there each year in Toronto?
  - Are Toronto burglaries getting worse?
  - Toronto break and enter rate over time
  - Annual B&E statistics Toronto
  - Track break and enter trends across years in Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: break_and_enter
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, break-and-enter]

- id: break_and_enter_by_month
  description: Analyze monthly break and enter patterns in Toronto
  sql: |
    SELECT
      EXTRACT(MONTH FROM occ_date) AS month_num,
      CASE EXTRACT(MONTH FROM occ_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS incident_count
    FROM break_and_enter
    WHERE occ_year = :year AND occ_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occ_date)
    ORDER BY month_num
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most break and enters in Toronto?
  - Show me seasonal patterns in Toronto B&E
  - When do most break-ins happen in Toronto?
  - Monthly break and enter breakdown Toronto
  - Peak months for burglary in Toronto
  - Is break and enter more common in summer or winter in Toronto?
  - Monthly B&E counts for Toronto 2024
  - Are there seasonal spikes in Toronto break and enters?
  - Which month had the most break-ins in Toronto 2023?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: break_and_enter
    qualifiers: [monthly, seasonal]
  tags: [trends, monthly, seasonal, break-and-enter]

