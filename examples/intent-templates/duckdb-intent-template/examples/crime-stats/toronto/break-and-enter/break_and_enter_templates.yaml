- id: break_and_enter_fastest_growing_neighbourhoods
  description: Neighbourhoods with the fastest growing break and enter rates in Toronto
  sql: |
    WITH neighbourhood_yoy AS (
      SELECT
        neighbourhood_158 AS neighbourhood,
        SUM(CASE WHEN occ_year = :year THEN 1 ELSE 0 END) AS current_year,
        SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) AS previous_year
      FROM break_and_enter
      WHERE occ_year IN (:year, :year - 1) AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
      GROUP BY neighbourhood_158
      HAVING SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      neighbourhood,
      previous_year,
      current_year,
      current_year - previous_year AS change,
      ROUND((current_year - previous_year) * 100.0 / NULLIF(previous_year, 0), 1) AS growth_pct
    FROM neighbourhood_yoy
    WHERE current_year > previous_year
    ORDER BY growth_pct DESC
