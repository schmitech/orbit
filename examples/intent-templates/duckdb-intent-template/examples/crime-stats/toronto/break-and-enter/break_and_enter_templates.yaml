- id: break_and_enter_city_snapshot
  description: Dashboard-style snapshot of Toronto break and enter
  sql: |
    SELECT
      (SELECT COUNT(*) FROM break_and_enter WHERE occ_year = :year) AS total_current_year,
      (SELECT COUNT(*) FROM break_and_enter WHERE occ_year = :year - 1) AS total_previous_year,
      ROUND(((SELECT COUNT(*) FROM break_and_enter WHERE occ_year = :year) -
             (SELECT COUNT(*) FROM break_and_enter WHERE occ_year = :year - 1)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM break_and_enter WHERE occ_year = :year - 1), 0), 1) AS yoy_change_pct,
      (SELECT offence FROM break_and_enter WHERE occ_year = :year GROUP BY offence ORDER BY COUNT(*) DESC LIMIT 1) AS top_offence,
      (SELECT premises_type FROM break_and_enter WHERE occ_year = :year GROUP BY premises_type ORDER BY COUNT(*) DESC LIMIT 1) AS top_premises,
      (SELECT neighbourhood_158 FROM break_and_enter WHERE occ_year = :year AND neighbourhood_158 != 'NSA' GROUP BY neighbourhood_158 ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood,
      (SELECT division FROM break_and_enter WHERE occ_year = :year AND division != 'NSA' GROUP BY division ORDER BY COUNT(*) DESC LIMIT 1) AS top_division
