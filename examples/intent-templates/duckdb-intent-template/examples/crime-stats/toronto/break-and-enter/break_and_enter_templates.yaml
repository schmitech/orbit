- id: break_and_enter_month_over_month_momentum
  description: Month-over-month momentum within a year — detect acceleration or deceleration of Toronto B&E
  sql: |
    WITH monthly AS (
      SELECT
        EXTRACT(MONTH FROM occ_date) AS month_num,
        CASE EXTRACT(MONTH FROM occ_date)
          WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
          WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
          WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
          WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
        END AS month_name,
        COUNT(*) AS incidents
      FROM break_and_enter
      WHERE occ_year = :year AND occ_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM occ_date)
    )
    SELECT
      month_num,
      month_name,
      incidents,
      LAG(incidents) OVER (ORDER BY month_num) AS prev_month,
      incidents - LAG(incidents) OVER (ORDER BY month_num) AS change,
      ROUND((incidents - LAG(incidents) OVER (ORDER BY month_num)) * 100.0 /
            NULLIF(LAG(incidents) OVER (ORDER BY month_num), 0), 1) AS mom_change_pct
    FROM monthly
    ORDER BY month_num
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Is break and enter accelerating or decelerating month by month in Toronto?
