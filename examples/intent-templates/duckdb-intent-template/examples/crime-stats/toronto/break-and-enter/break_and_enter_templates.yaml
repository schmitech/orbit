# =============================================================================

- id: break_and_enter_yoy_comparison
  description: Compare break and enter between two years in Toronto
  sql: |
    WITH yearly AS (
      SELECT
        occ_year,
        COUNT(*) AS total_incidents
      FROM break_and_enter
      WHERE occ_year IN (:year, :year - 1)
      GROUP BY occ_year
    )
    SELECT
      curr.occ_year AS current_year,
      curr.total_incidents AS current_count,
      prev.occ_year AS previous_year,
      prev.total_incidents AS previous_count,
      curr.total_incidents - prev.total_incidents AS change,
      ROUND((curr.total_incidents - prev.total_incidents) * 100.0 / NULLIF(prev.total_incidents, 0), 1) AS change_pct
    FROM yearly curr
    JOIN yearly prev ON curr.occ_year = prev.occ_year + 1
  parameters:
  - name: year
    type: integer
    description: Year to compare (will compare against previous year)
    required: false
    default: 2024
  nl_examples:
  - Compare Toronto break and enter this year to last year
  - Is break and enter up or down in Toronto compared to last year?
  - Year-over-year change in Toronto B&E
  - How do Toronto break-ins compare between 2024 and 2023?
  - Toronto break and enter year-over-year comparison
  - Are burglaries increasing in Toronto compared to last year?
  - Toronto B&E change from previous year
  - How much did break and enter change in Toronto?
  - Compare 2023 vs 2024 break and enter in Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: break_and_enter
    qualifiers: [yoy, comparison]
  tags: [comparison, yoy, trends, break-and-enter]

- id: break_and_enter_yoy_by_neighbourhood
  description: Year-over-year break and enter change by neighbourhood in Toronto
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood_158 AS neighbourhood,
        SUM(CASE WHEN occ_year = :year THEN 1 ELSE 0 END) AS current_year,
        SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) AS previous_year
      FROM break_and_enter
      WHERE occ_year IN (:year, :year - 1) AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
      GROUP BY neighbourhood_158
      HAVING SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) >= 5
    )
    SELECT
      neighbourhood,
      current_year,
      previous_year,
      current_year - previous_year AS change,
      ROUND((current_year - previous_year) * 100.0 / NULLIF(previous_year, 0), 1) AS change_pct
    FROM yearly
    ORDER BY change DESC
    LIMIT 20
  parameters:
  - name: year
    type: integer
    description: Year to compare (will compare against previous year)
    required: false
    default: 2024
  nl_examples:
  - Which Toronto neighbourhoods saw the biggest increase in break and enter?
  - Toronto B&E emerging hotspots by neighbourhood
