- id: break_and_enter_neighbourhood_disparity
  description: Neighbourhood disparity analysis — above or below city average for Toronto B&E
  sql: |
    WITH neighbourhood_counts AS (
      SELECT
        neighbourhood_158 AS neighbourhood,
        COUNT(*) AS incidents
      FROM break_and_enter
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
      GROUP BY neighbourhood_158
    ),
    city_avg AS (
      SELECT ROUND(AVG(incidents), 1) AS avg_incidents FROM neighbourhood_counts
    )
    SELECT
      n.neighbourhood,
      n.incidents,
      c.avg_incidents AS city_average,
      n.incidents - c.avg_incidents AS difference,
      ROUND((n.incidents - c.avg_incidents) * 100.0 / NULLIF(c.avg_incidents, 0), 1) AS pct_above_below_avg,
      CASE
        WHEN n.incidents > c.avg_incidents * 2 THEN 'Far Above Average'
        WHEN n.incidents > c.avg_incidents * 1.5 THEN 'Above Average'
        WHEN n.incidents > c.avg_incidents THEN 'Slightly Above Average'
        WHEN n.incidents > c.avg_incidents * 0.5 THEN 'Below Average'
        ELSE 'Far Below Average'
      END AS disparity_tier
    FROM neighbourhood_counts n
    CROSS JOIN city_avg c
    ORDER BY n.incidents DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which Toronto neighbourhoods are above or below average for break and enter?
  - Toronto B&E neighbourhood disparity analysis
  - How do Toronto neighbourhoods compare on break-ins relative to the city average?
  - Toronto break and enter equity analysis by neighbourhood
