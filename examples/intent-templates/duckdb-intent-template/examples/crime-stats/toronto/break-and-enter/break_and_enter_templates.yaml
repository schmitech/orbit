- id: break_and_enter_fastest_growing_offence_types
  description: Which B&E offence subtypes are surging or declining year over year in Toronto?
  sql: |
    WITH offence_yoy AS (
      SELECT
        offence,
        SUM(CASE WHEN occ_year = :year THEN 1 ELSE 0 END) AS current_year,
        SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) AS previous_year
      FROM break_and_enter
      WHERE occ_year IN (:year, :year - 1)
      GROUP BY offence
      HAVING SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      offence,
      previous_year,
      current_year,
      current_year - previous_year AS change,
      ROUND((current_year - previous_year) * 100.0 / NULLIF(previous_year, 0), 1) AS change_pct,
      CASE
        WHEN current_year > previous_year THEN 'Growing'
        WHEN current_year < previous_year THEN 'Declining'
        ELSE 'Stable'
      END AS trend
    FROM offence_yoy
    ORDER BY change_pct DESC
