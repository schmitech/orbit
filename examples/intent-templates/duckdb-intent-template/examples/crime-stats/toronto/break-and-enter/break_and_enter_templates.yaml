- id: break_and_enter_persistent_hotspots
  description: Neighbourhoods consistently in top 20 for break and enter across years in Toronto
  sql: |
    WITH yearly_ranked AS (
      SELECT
        occ_year,
        neighbourhood_158 AS neighbourhood,
        COUNT(*) AS incidents,
        RANK() OVER (PARTITION BY occ_year ORDER BY COUNT(*) DESC) AS year_rank
      FROM break_and_enter
      WHERE occ_year >= 2020 AND neighbourhood_158 IS NOT NULL AND neighbourhood_158 != 'NSA'
      GROUP BY occ_year, neighbourhood_158
    )
    SELECT
      neighbourhood,
      COUNT(DISTINCT occ_year) AS years_in_top_20,
      ROUND(AVG(incidents), 0) AS avg_annual_incidents,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank,
      SUM(incidents) AS total_incidents
    FROM yearly_ranked
    WHERE year_rank <= 20
    GROUP BY neighbourhood
    HAVING COUNT(DISTINCT occ_year) >= 2
    ORDER BY years_in_top_20 DESC, avg_annual_incidents DESC
