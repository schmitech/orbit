  - Emerging break and enter hotspots in Toronto
  - Where is break and enter surging in Toronto?
  - Toronto neighbourhoods with rising B&E rates
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: break_and_enter
    qualifiers: [yoy, neighbourhood, emerging]
  tags: [comparison, neighbourhood, emerging, break-and-enter]

