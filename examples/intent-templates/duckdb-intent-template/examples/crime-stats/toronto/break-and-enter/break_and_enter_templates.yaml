- id: neighbourhood_break_and_enter_detail
  description: Detailed break and enter analysis for a specific Toronto neighbourhood
  sql: |
    SELECT
      occ_year,
      COUNT(*) AS total_incidents,
      COUNT(CASE WHEN offence = 'B&E' THEN 1 END) AS be_count,
      COUNT(CASE WHEN offence = 'B&E W''Intent' THEN 1 END) AS be_with_intent,
      COUNT(CASE WHEN offence = 'B&E Out' THEN 1 END) AS be_out,
      COUNT(CASE WHEN premises_type = 'House' THEN 1 END) AS house_targets,
      COUNT(CASE WHEN premises_type = 'Apartment' THEN 1 END) AS apartment_targets,
      COUNT(CASE WHEN premises_type = 'Commercial' THEN 1 END) AS commercial_targets
    FROM break_and_enter
    WHERE neighbourhood_158 ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Toronto', ''), 'toronto', '')) || '%'
      AND occ_year >= 2014
    GROUP BY occ_year
    ORDER BY occ_year DESC
