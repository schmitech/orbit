- id: break_and_enter_cagr_by_offence
  description: Compound annual growth rate by offence type — long-term trend direction for Toronto B&E
  sql: |
    WITH bounds AS (
      SELECT
        offence,
        MIN(occ_year) AS first_year,
        MAX(occ_year) AS last_year,
        SUM(CASE WHEN occ_year = (SELECT MIN(occ_year) FROM break_and_enter WHERE occ_year >= 2014) THEN 1 ELSE 0 END) AS first_count,
        SUM(CASE WHEN occ_year = (SELECT MAX(occ_year) FROM break_and_enter WHERE occ_year <= 2024) THEN 1 ELSE 0 END) AS last_count,
        (SELECT MAX(occ_year) FROM break_and_enter WHERE occ_year <= 2024) -
        (SELECT MIN(occ_year) FROM break_and_enter WHERE occ_year >= 2014) AS years_span
      FROM break_and_enter
      WHERE occ_year >= 2014 AND occ_year <= 2024
      GROUP BY offence
      HAVING SUM(CASE WHEN occ_year = (SELECT MIN(occ_year) FROM break_and_enter WHERE occ_year >= 2014) THEN 1 ELSE 0 END) >= 10
    )
    SELECT
      offence,
      first_count AS count_first_year,
      last_count AS count_last_year,
      years_span,
      ROUND((POWER(last_count * 1.0 / NULLIF(first_count, 0), 1.0 / NULLIF(years_span, 0)) - 1) * 100, 1) AS cagr_pct,
      CASE
        WHEN last_count > first_count THEN 'Growing'
        WHEN last_count < first_count THEN 'Declining'
        ELSE 'Stable'
      END AS trend_direction
    FROM bounds
    ORDER BY cagr_pct DESC
  parameters: []
  nl_examples:
  - What is the long-term growth rate of each break and enter type in Toronto?
  - Toronto B&E compound annual growth rate by offence
  - Which B&E offence types have grown the most over the past decade in Toronto?
  - Long-term break and enter trend by offence type in Toronto
  - Toronto B&E CAGR analysis
  - Are any break-in types shrinking over the long term in Toronto?
  - Multi-year growth trend for Toronto B&E by offence
  - Toronto break and enter long-term trajectory by type
  - Compound growth rate of burglary types in Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: break_and_enter
    qualifiers: [cagr, offence, long-term]
  tags: [policy, cagr, long-term, strategic, break-and-enter]

- id: break_and_enter_data_freshness
  description: Data pipeline health check — most recent records and monthly counts for Toronto B&E
  sql: |
    WITH latest AS (
      SELECT MAX(occ_year) AS latest_year FROM break_and_enter
    )
    SELECT
      (SELECT MAX(occ_date) FROM break_and_enter) AS most_recent_occurrence,
      (SELECT MAX(report_date) FROM break_and_enter) AS most_recent_report,
      l.latest_year,
      (SELECT COUNT(*) FROM break_and_enter WHERE occ_year = l.latest_year) AS latest_year_records,
      monthly.month_name,
      monthly.record_count
    FROM latest l
    JOIN (
      SELECT
        EXTRACT(MONTH FROM occ_date) AS month_num,
        CASE EXTRACT(MONTH FROM occ_date)
          WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
          WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
          WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
          WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
        END AS month_name,
        COUNT(*) AS record_count
      FROM break_and_enter
      WHERE occ_year = (SELECT MAX(occ_year) FROM break_and_enter) AND occ_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM occ_date)
      ORDER BY month_num
    ) monthly ON TRUE
  parameters: []
  nl_examples:
  - How fresh is the Toronto break and enter data?
  - Toronto B&E data freshness check
  - When was the most recent break and enter record in Toronto?
  - Is the Toronto break and enter data up to date?
  - Toronto B&E data pipeline health
  - How many break and enter records this year in Toronto?
  - Monthly record counts for current year Toronto B&E
  - Toronto break and enter data quality check
  - Is the Toronto B&E dataset current?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: break_and_enter
    qualifiers: [freshness, data-quality]
  tags: [reference, freshness, data-quality, break-and-enter]

- id: break_and_enter_division_workload
  description: Division workload comparison — ranked B&E volume with cumulative share for Toronto
  sql: |
    WITH division_counts AS (
      SELECT
        division,
        COUNT(*) AS incidents,
        COUNT(DISTINCT neighbourhood_158) AS neighbourhoods
      FROM break_and_enter
      WHERE occ_year = :year AND division != 'NSA'
      GROUP BY division
    ),
    totals AS (
      SELECT SUM(incidents) AS total FROM division_counts
    )
    SELECT
      d.division,
      d.incidents,
      d.neighbourhoods,
      ROUND(d.incidents * 100.0 / t.total, 1) AS pct_of_total,
      ROUND(SUM(d.incidents) OVER (ORDER BY d.incidents DESC ROWS UNBOUNDED PRECEDING) * 100.0 / t.total, 1) AS cumulative_pct,
      RANK() OVER (ORDER BY d.incidents DESC) AS workload_rank
    FROM division_counts d
    CROSS JOIN totals t
    ORDER BY d.incidents DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which Toronto police divisions handle the most break and enter workload?
  - Toronto B&E division workload ranking
  - Are some Toronto divisions overloaded with break-ins?
  - Division workload comparison for break and enter in Toronto
  - How is B&E workload distributed across Toronto police divisions?
  - Toronto break and enter cumulative share by division
  - Which divisions carry the heaviest break-in load in Toronto?
  - Toronto police division B&E resource allocation analysis
  - Break and enter workload equity across Toronto divisions
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: break_and_enter
    qualifiers: [division, workload, ranking]
  tags: [policy, division, workload, operational, break-and-enter]
