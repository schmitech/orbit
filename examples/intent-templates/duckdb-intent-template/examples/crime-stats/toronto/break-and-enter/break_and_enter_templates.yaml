  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: break_and_enter
    qualifiers: [disparity, neighbourhood, equity]
  tags: [policy, disparity, equity, neighbourhood, break-and-enter]

- id: break_and_enter_premises_hour_heatmap
  description: Premises type vulnerability by hour — when is each property type most at risk for Toronto B&E
  sql: |
    SELECT
      premises_type,
      SUM(CASE WHEN occ_hour BETWEEN 0 AND 5 THEN 1 ELSE 0 END) AS late_night_12am_5am,
      SUM(CASE WHEN occ_hour BETWEEN 6 AND 11 THEN 1 ELSE 0 END) AS morning_6am_11am,
      SUM(CASE WHEN occ_hour BETWEEN 12 AND 17 THEN 1 ELSE 0 END) AS afternoon_12pm_5pm,
      SUM(CASE WHEN occ_hour BETWEEN 18 AND 23 THEN 1 ELSE 0 END) AS evening_6pm_11pm,
      COUNT(*) AS total,
      CASE
        WHEN SUM(CASE WHEN occ_hour BETWEEN 0 AND 5 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 6 AND 11 THEN 1 ELSE 0 END)
         AND SUM(CASE WHEN occ_hour BETWEEN 0 AND 5 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 12 AND 17 THEN 1 ELSE 0 END)
         AND SUM(CASE WHEN occ_hour BETWEEN 0 AND 5 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 18 AND 23 THEN 1 ELSE 0 END)
        THEN 'Late Night'
        WHEN SUM(CASE WHEN occ_hour BETWEEN 6 AND 11 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 12 AND 17 THEN 1 ELSE 0 END)
         AND SUM(CASE WHEN occ_hour BETWEEN 6 AND 11 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 18 AND 23 THEN 1 ELSE 0 END)
        THEN 'Morning'
        WHEN SUM(CASE WHEN occ_hour BETWEEN 12 AND 17 THEN 1 ELSE 0 END) >= SUM(CASE WHEN occ_hour BETWEEN 18 AND 23 THEN 1 ELSE 0 END)
        THEN 'Afternoon'
        ELSE 'Evening'
      END AS peak_period
    FROM break_and_enter
    WHERE occ_year = :year
    GROUP BY premises_type
    ORDER BY total DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
