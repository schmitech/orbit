  - Which month had the highest number of Toronto auto thefts in 2023?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns, trends]

