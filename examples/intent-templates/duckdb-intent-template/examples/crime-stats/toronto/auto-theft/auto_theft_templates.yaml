- id: emerging_hotspots
  description: Neighbourhoods with the biggest year-over-year increase in auto theft
  sql: |
    WITH yearly AS (
      SELECT neighbourhood_158 AS neighbourhood, occ_year, COUNT(*) AS thefts
      FROM auto_theft
      WHERE neighbourhood_158 IS NOT NULL
      GROUP BY neighbourhood_158, occ_year
    ),
    yoy AS (
      SELECT
        c.neighbourhood,
        c.occ_year,
        c.thefts AS current_thefts,
        p.thefts AS previous_thefts,
        c.thefts - p.thefts AS absolute_change,
        ROUND((c.thefts - p.thefts) * 100.0 / NULLIF(p.thefts, 0), 1) AS pct_change
      FROM yearly c
      JOIN yearly p ON c.neighbourhood = p.neighbourhood AND c.occ_year = p.occ_year + 1
    )
    SELECT neighbourhood, current_thefts, previous_thefts, absolute_change, pct_change
    FROM yoy
    WHERE occ_year = :year AND previous_thefts >= :min_baseline
    ORDER BY pct_change DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  - name: min_baseline
    type: integer
    description: Minimum thefts in previous year to filter noise
    required: false
    default: 5
  - name: limit
    type: integer
    description: Number of results
    required: false
    default: 100
  nl_examples:
  - Which Toronto neighbourhoods saw the biggest increase in auto theft?
  - Where is auto theft surging in Toronto?
  - Emerging Toronto auto theft hotspots
  - Toronto neighbourhoods getting worse for car theft
  - Where in Toronto did vehicle theft spike this year?
