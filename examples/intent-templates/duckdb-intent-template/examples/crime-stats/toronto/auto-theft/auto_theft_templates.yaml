- id: crime_concentration
  description: How concentrated is auto theft — what percentage happens in the top neighbourhoods
  sql: |
    WITH ranked AS (
      SELECT
        neighbourhood_158 AS neighbourhood,
        COUNT(*) AS thefts,
        SUM(COUNT(*)) OVER () AS total,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM auto_theft
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL
      GROUP BY neighbourhood_158
    )
    SELECT
      CASE
        WHEN rank <= 5 THEN 'Top 5 neighbourhoods'
        WHEN rank <= 10 THEN 'Top 6-10'
        WHEN rank <= 20 THEN 'Top 11-20'
        ELSE 'All others'
      END AS tier,
      SUM(thefts) AS thefts,
      ROUND(SUM(thefts) * 100.0 / MAX(total), 1) AS pct_of_total,
      COUNT(*) AS neighbourhood_count
    FROM ranked
    GROUP BY CASE
      WHEN rank <= 5 THEN 'Top 5 neighbourhoods'
      WHEN rank <= 10 THEN 'Top 6-10'
      WHEN rank <= 20 THEN 'Top 11-20'
      ELSE 'All others'
    END
    ORDER BY MIN(rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - How concentrated is auto theft across Toronto neighbourhoods?
  - Do a few Toronto areas account for most auto thefts?
