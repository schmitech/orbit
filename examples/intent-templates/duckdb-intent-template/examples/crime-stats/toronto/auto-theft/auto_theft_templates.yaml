- id: thefts_by_time_period
  description: Analyze thefts by time period (morning, afternoon, evening, night)
  sql: |
    SELECT
      CASE
        WHEN occ_hour >= 6 AND occ_hour < 12 THEN 'Morning (6am-12pm)'
        WHEN occ_hour >= 12 AND occ_hour < 18 THEN 'Afternoon (12pm-6pm)'
        WHEN occ_hour >= 18 AND occ_hour < 22 THEN 'Evening (6pm-10pm)'
        ELSE 'Night (10pm-6am)'
      END AS time_period,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM auto_theft
    WHERE year = :year AND occ_hour IS NOT NULL
    GROUP BY time_period
    ORDER BY theft_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Are cars stolen more at night or during the day in Toronto?
  - Show me Toronto auto thefts by time of day
