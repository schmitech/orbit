  - Which Toronto neighbourhoods are becoming new hotspots for carjacking?
  - Where is the Toronto auto theft problem growing fastest?
  - Toronto neighbourhoods with the sharpest rise in vehicle theft year over year
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: auto_theft
    qualifiers: [hotspots, change, emerging]
  tags: [hotspots, trends, journalist, insight]

