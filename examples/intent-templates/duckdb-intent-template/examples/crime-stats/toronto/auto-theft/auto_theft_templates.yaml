- id: specific_neighbourhood_analysis
  description: Get detailed theft statistics for a specific neighbourhood
  sql: |
    SELECT
      premises_type,
      TRIM(occ_dow) AS weekday,
      COUNT(*) AS theft_count
    FROM auto_theft
    WHERE neighbourhood_158 ILIKE '%' || :neighbourhood || '%'
      AND occ_year = :year
    GROUP BY premises_type, TRIM(occ_dow)
    ORDER BY theft_count DESC
    LIMIT 20
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood name (partial match)
    required: true
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Show me Toronto auto thefts in Yorkdale
  - Toronto auto theft in Scarborough
  - Analyze Toronto auto thefts in North York
  - Toronto downtown auto theft details
  - How many cars were stolen in Toronto's Rexdale in 2024?
  - What does car theft look like in Toronto's Danforth area?
  - Stolen vehicle breakdown for Toronto's Etobicoke
  - Is auto theft bad in Toronto's Jane and Finch neighbourhood?
  - Tell me about Toronto vehicle theft patterns in Willowdale
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: auto_theft
    qualifiers: [neighbourhood]
  tags: [neighbourhood, detail, specific]

- id: year_over_year_comparison
  description: Compare theft statistics between two years
  sql: |
    SELECT
      :current_year AS current_year,
      :previous_year AS previous_year,
      (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :current_year) AS current_thefts,
      (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :previous_year) AS previous_thefts,
      ROUND(((SELECT COUNT(*) FROM auto_theft WHERE occ_year = :current_year) -
             (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :previous_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM auto_theft WHERE occ_year = :previous_year), 0), 1) AS change_pct
  parameters:
  - name: current_year
    type: integer
    description: Current year to compare
    required: false
    default: 2025
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2024
  nl_examples:
  - Compare Toronto 2024 to 2023 auto theft
  - Toronto year over year change in vehicle theft
  - How much has auto theft increased in Toronto?
  - Compare Toronto auto theft this year to last year
  - Toronto vehicle theft trend comparison
  - Did car theft go up or down between 2023 and 2024 in Toronto?
  - What is the percentage change in Toronto stolen vehicles from last year?
  - How does 2024 Toronto auto theft compare to 2022?
  - Is vehicle theft getting worse year over year in Toronto?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: auto_theft
    qualifiers: [yearly, change]
  tags: [comparison, yearly, trend]

- id: reporting_delay_analysis
  description: Analyze delay between occurrence and reporting
  sql: |
    SELECT
      CASE
        WHEN report_date = occ_date THEN 'Same day'
        WHEN report_date - occ_date <= 1 THEN '1 day'
        WHEN report_date - occ_date <= 7 THEN '2-7 days'
        WHEN report_date - occ_date <= 30 THEN '8-30 days'
        ELSE 'Over 30 days'
      END AS reporting_delay,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM auto_theft
    WHERE occ_year = :year
      AND report_date IS NOT NULL
      AND occ_date IS NOT NULL
    GROUP BY reporting_delay
    ORDER BY theft_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - How quickly are auto thefts reported in Toronto?
  - Toronto auto theft reporting delay analysis
  - Time between Toronto auto theft and report
  - Are Toronto auto thefts reported same day?
  - How long do people wait before reporting a stolen vehicle in Toronto?
  - What percentage of Toronto car thefts are reported within 24 hours?
  - Analysis of reporting lag for Toronto auto theft incidents in 2024
  - Do most Toronto stolen car victims file a report the same day?
  - How many days typically pass between a Toronto vehicle being stolen and reported?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [reporting, delay]
  tags: [reporting, delay, analysis]

