- id: yearly_theft_trends
  description: Track year-over-year changes in auto theft incidents
  sql: |
    SELECT
      occ_year AS year,
      COUNT(*) AS total_thefts,
      COUNT(DISTINCT neighbourhood_158) AS neighbourhoods_affected,
      COUNT(DISTINCT division) AS divisions_affected
    FROM auto_theft
    WHERE occ_year IS NOT NULL
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters: []
  nl_examples:
  - How has auto theft changed over the years in Toronto?
  - Show me yearly Toronto auto theft trends
  - What is the year-over-year Toronto vehicle theft rate?
  - Is auto theft increasing or decreasing in Toronto?
  - Track Toronto vehicle theft over time
  - How many auto thefts were there in Toronto in 2023 compared to other years?
  - Is car theft getting worse in Toronto?
  - Year-over-year comparison of Toronto auto theft totals
  - How many cars have been stolen each year in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, crime-stats]

- id: thefts_by_month
  description: Analyze monthly theft patterns to identify seasonal trends
  sql: |
    SELECT
      occ_month AS month,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM auto_theft
    WHERE occ_year = :year AND occ_month IS NOT NULL
    GROUP BY occ_month
    ORDER BY theft_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
