  - How much of the Toronto stolen vehicle problem comes from a small number of areas?
  - Is Toronto vehicle theft spread across the city or focused in certain hotspots?
  - What share of total Toronto auto theft do the worst neighbourhoods represent in 2024?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [concentration, equity]
  tags: [concentration, policy, researcher, insight]

- id: seasonal_deviation
  description: Compare recent months to their historical average to spot anomalies
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(cnt), 1) AS historical_avg
      FROM (
        SELECT EXTRACT(MONTH FROM occ_date) AS month, occ_year, COUNT(*) AS cnt
        FROM auto_theft
        WHERE occ_date IS NOT NULL AND occ_year < :year
        GROUP BY month, occ_year
      )
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM occ_date) AS month,
        COUNT(*) AS current_count
      FROM auto_theft
      WHERE occ_year = :year AND occ_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM occ_date)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.current_count,
      a.historical_avg,
      c.current_count - a.historical_avg AS deviation,
      ROUND((c.current_count - a.historical_avg) * 100.0 / NULLIF(a.historical_avg, 0), 1) AS deviation_pct
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY ABS(c.current_count - a.historical_avg) DESC
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2025
  nl_examples:
  - Which months were unusual for Toronto auto theft this year?
  - Is this month above or below average for Toronto car theft?
  - Seasonal anomalies in Toronto auto theft
  - Toronto auto theft months that deviate from the historical pattern
  - Unusual Toronto auto theft patterns this year
  - Was January 2024 above or below the historical Toronto average for stolen vehicles?
  - Which months in 2024 had abnormally high car theft in Toronto?
  - Compare this year's monthly Toronto auto theft numbers to the long-term average
  - Are there any Toronto months where vehicle theft spiked unexpectedly?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: auto_theft
    qualifiers: [seasonal, anomaly]
  tags: [seasonal, anomaly, researcher, insight]

- id: neighbourhood_safety_trend
  description: Is a specific neighbourhood getting safer or more dangerous over time
  sql: |
    SELECT
      occ_year AS year,
      COUNT(*) AS thefts,
      COUNT(DISTINCT premises_type) AS premises_types,
      COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY occ_year) AS change_from_prior,
      ROUND((COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY occ_year)) * 100.0 /
        NULLIF(LAG(COUNT(*)) OVER (ORDER BY occ_year), 0), 1) AS pct_change
    FROM auto_theft
    WHERE neighbourhood_158 ILIKE '%' || :neighbourhood || '%'
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters:
