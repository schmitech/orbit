- id: city_snapshot
  description: Quick city-wide pulse — total thefts, trend direction, top concern, top area
  sql: |
    SELECT
      :year AS year,
      (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :year) AS total_thefts,
      (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :year - 1) AS previous_year_thefts,
      ROUND(((SELECT COUNT(*) FROM auto_theft WHERE occ_year = :year) -
             (SELECT COUNT(*) FROM auto_theft WHERE occ_year = :year - 1)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM auto_theft WHERE occ_year = :year - 1), 0), 1) AS yoy_change_pct,
      (SELECT premises_type FROM auto_theft WHERE occ_year = :year AND premises_type IS NOT NULL
       GROUP BY premises_type ORDER BY COUNT(*) DESC LIMIT 1) AS top_premises_type,
      (SELECT neighbourhood_158 FROM auto_theft WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL
       GROUP BY neighbourhood_158 ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood,
      (SELECT division FROM auto_theft WHERE occ_year = :year AND division IS NOT NULL
       GROUP BY division ORDER BY COUNT(*) DESC LIMIT 1) AS top_division
  parameters:
  - name: year
    type: integer
    description: Year to summarize
    required: false
    default: 2025
  nl_examples:
