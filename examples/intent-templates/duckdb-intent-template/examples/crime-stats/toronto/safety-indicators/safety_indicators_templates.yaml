- id: yearly_csi_trends
  description: Track year-over-year changes across all Community Safety Indicator incidents
  sql: |
    SELECT
      report_year AS year,
      COUNT(*) AS total_incidents,
      COUNT(DISTINCT event_unique_id) AS distinct_events,
      COUNT(DISTINCT csi_category) AS categories_present,
      COUNT(DISTINCT neighbourhood_158) AS neighbourhoods_affected,
      COUNT(DISTINCT division) AS divisions_affected
    FROM safety_indicators
    WHERE report_year IS NOT NULL
    GROUP BY report_year
    ORDER BY report_year DESC
  parameters: []
  nl_examples:
  - How have Toronto major crime indicators changed over the years?
  - Show me yearly Toronto community safety indicator trends
  - Is major crime going up or down in Toronto?
  - Annual Toronto CSI incident totals
  - Track Toronto major crime indicators year over year
  - How many Toronto CSI incidents were reported each year?
  - Long-term trend for Toronto community safety indicators
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, csi]

- id: csi_category_breakdown
  description: Compare CSI categories for a selected report year
  sql: |
    SELECT
      csi_category,
      COUNT(*) AS incident_count,
      COUNT(DISTINCT event_unique_id) AS distinct_events,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM safety_indicators
    WHERE report_year = :year
      AND csi_category IS NOT NULL
    GROUP BY csi_category
    ORDER BY incident_count DESC
  parameters:
  - name: year
    type: integer
    description: Report year to analyze
    required: false
    default: 2025
  nl_examples:
  - What major crime categories are most common in Toronto?
  - Show me the Toronto CSI category breakdown for 2025
  - Compare Toronto assault, auto theft, robbery, and break and enter in the safety indicators data
  - Which Toronto community safety indicators dominate in 2024?
  - Major crime mix for Toronto in 2025
  - What share of Toronto CSI incidents are assaults versus auto thefts?
  - Breakdown of Toronto major crime indicators by category
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: safety_indicators
    qualifiers: [csi-category, yearly]
  tags: [category, comparison, csi, yearly]

- id: csi_category_trends
  description: Track how CSI categories have changed over time
  sql: |
    SELECT
      report_year AS year,
      csi_category,
      COUNT(*) AS incident_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (PARTITION BY report_year), 1) AS pct_of_year
    FROM safety_indicators
    WHERE report_year IS NOT NULL
      AND csi_category IS NOT NULL
    GROUP BY report_year, csi_category
    ORDER BY report_year DESC, incident_count DESC
  parameters: []
  nl_examples:
  - How has the mix of Toronto major crime categories changed over time?
  - Show me Toronto CSI category trends
  - Are Toronto auto thefts taking a bigger share of major crime?
  - Historical Toronto breakdown by community safety indicator
  - Year-over-year category composition for Toronto CSI data
  - Has robbery become a smaller share of Toronto major crime over time?
  - Trends in Toronto assault versus break and enter versus auto theft in CSI data
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [csi-category, trends]
  tags: [category, trends, csi, yearly]

- id: incidents_by_month
  description: Analyze monthly CSI patterns for a selected report year
  sql: |
    SELECT
      EXTRACT(MONTH FROM report_date) AS month,
      CASE EXTRACT(MONTH FROM report_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS incident_count,
      COUNT(DISTINCT event_unique_id) AS distinct_events
    FROM safety_indicators
    WHERE report_year = :year
      AND report_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM report_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Report year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which months have the most major crime incidents in Toronto?
  - Show me Toronto monthly CSI patterns for 2025
  - When do Toronto community safety indicators peak during the year?
  - Monthly Toronto major crime breakdown
  - Is summer worse than winter for Toronto CSI incidents?
  - What month had the most Toronto major crime reports in 2024?
  - Seasonal pattern of Toronto major crime indicators
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [seasonal, monthly]
  tags: [monthly, seasonal, csi, patterns]

