- id: data_coverage
  description: Summarize the time range and structural coverage of the CSI dataset
  sql: |
    SELECT
      COUNT(*) AS total_records,
      COUNT(DISTINCT event_unique_id) AS distinct_events,
      MIN(report_date) AS first_report_date,
      MAX(report_date) AS last_report_date,
      MIN(report_year) AS first_report_year,
      MAX(report_year) AS last_report_year,
      MIN(occ_date) AS first_occurrence_date,
      MAX(occ_date) AS last_occurrence_date,
      COUNT(DISTINCT csi_category) AS category_count,
      COUNT(DISTINCT neighbourhood_158) AS neighbourhoods_covered,
      COUNT(DISTINCT division) AS divisions_covered,
      SUM(CASE WHEN occ_year < 2014 THEN 1 ELSE 0 END) AS legacy_pre_2014_occurrence_rows
    FROM safety_indicators
  parameters: []
