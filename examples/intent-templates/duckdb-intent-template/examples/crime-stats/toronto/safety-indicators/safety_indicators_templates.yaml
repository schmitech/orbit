- id: yoy_csi_comparison
  description: Compare total CSI incidents between two selected report years
  sql: |
    WITH yearly AS (
      SELECT
        report_year,
        COUNT(*) AS incident_count,
        COUNT(DISTINCT event_unique_id) AS distinct_events
      FROM safety_indicators
      WHERE report_year IN (:year_a, :year_b)
      GROUP BY report_year
    )
    SELECT
      a.report_year AS base_year,
      a.incident_count AS base_year_incidents,
      a.distinct_events AS base_year_events,
      b.report_year AS comparison_year,
      b.incident_count AS comparison_year_incidents,
      b.distinct_events AS comparison_year_events,
      b.incident_count - a.incident_count AS absolute_change,
      ROUND((b.incident_count - a.incident_count) * 100.0 / NULLIF(a.incident_count, 0), 1) AS pct_change
    FROM yearly a
    JOIN yearly b ON a.report_year = :year_a AND b.report_year = :year_b
  parameters:
  - name: year_a
    type: integer
    description: Base year
    required: false
    default: 2024
  - name: year_b
    type: integer
    description: Comparison year
    required: false
    default: 2025
  nl_examples:
  - Compare Toronto major crime in 2024 vs 2025
  - Toronto year over year CSI comparison
  - How much did Toronto major crime change from 2023 to 2024?
  - Show the difference in Toronto community safety indicators between two years
  - Did Toronto have more CSI incidents in 2025 than 2024?
  - Compare Toronto major crime totals for 2022 and 2025
  - What was the year-over-year Toronto percentage change in CSI incidents?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: safety_indicators
    qualifiers: [year-over-year, comparison]
  tags: [comparison, yoy, csi, yearly]

