# INSIGHTS & POLICY ANALYTICS
# =============================================================================

- id: emerging_hotspots
  description: Find neighbourhoods with the fastest year-over-year growth in CSI incidents
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood_158,
        hood_158,
        report_year,
        COUNT(*) AS incident_count
      FROM safety_indicators
      WHERE neighbourhood_158 IS NOT NULL
        AND report_year IN (:year - 1, :year)
      GROUP BY neighbourhood_158, hood_158, report_year
    )
    SELECT
      cur.neighbourhood_158 AS neighbourhood,
      cur.hood_158 AS hood_code,
      prev.incident_count AS previous_year_count,
      cur.incident_count AS current_year_count,
      cur.incident_count - prev.incident_count AS absolute_growth,
      ROUND((cur.incident_count - prev.incident_count) * 100.0 / NULLIF(prev.incident_count, 0), 1) AS growth_pct
    FROM yearly cur
    JOIN yearly prev
      ON cur.neighbourhood_158 = prev.neighbourhood_158
     AND cur.hood_158 = prev.hood_158
     AND cur.report_year = :year
     AND prev.report_year = :year - 1
    WHERE prev.incident_count >= :minimum_baseline
      AND cur.incident_count > prev.incident_count
    ORDER BY growth_pct DESC, current_year_count DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Current report year for the YoY comparison
    required: false
    default: 2025
  - name: minimum_baseline
    type: integer
    description: Minimum prior-year count to suppress noise
    required: false
    default: 25
  - name: limit
    type: integer
    description: Number of neighbourhoods to return
    required: false
    default: 15
  nl_examples:
  - Which Toronto neighbourhoods are emerging major crime hotspots in 2025?
  - Show me the fastest growing Toronto CSI areas
  - What Toronto neighbourhoods had the biggest increase in major crime year over year?
  - Emerging Toronto community safety indicator hotspots for 2024
  - Which Toronto communities are getting worse for major crime?
  - Find Toronto neighbourhoods with sharp growth in CSI incidents
  - Where is major crime rising fastest in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [hotspots, neighbourhood, yoy]
  tags: [policy, hotspots, neighbourhood, yoy, csi]

- id: category_composition_shift
  description: Show each CSI category's share of total incidents by year
  sql: |
    WITH yearly_totals AS (
      SELECT
        report_year,
        COUNT(*) AS total_incidents
      FROM safety_indicators
      WHERE report_year IS NOT NULL
      GROUP BY report_year
    )
    SELECT
      s.report_year AS year,
      s.csi_category,
      COUNT(*) AS incident_count,
      ROUND(COUNT(*) * 100.0 / yt.total_incidents, 1) AS pct_of_year
    FROM safety_indicators s
    JOIN yearly_totals yt ON s.report_year = yt.report_year
    WHERE s.report_year IS NOT NULL
      AND s.csi_category IS NOT NULL
    GROUP BY s.report_year, s.csi_category, yt.total_incidents
    ORDER BY s.report_year DESC, incident_count DESC
  parameters: []
  nl_examples:
  - Is assault taking a bigger share of Toronto major crime over time?
  - Show me the composition shift of Toronto CSI categories
  - How has the Toronto share of auto theft changed year over year in the CSI data?
  - Toronto category share of total major crime by year
  - Has robbery become a smaller part of Toronto CSI incidents?
  - Strategic composition of Toronto major crime indicators
  - Which Toronto major crime categories make up the largest share of total incidents each year?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [category-share, trends]
  tags: [policy, category, composition, trends, csi]

- id: fastest_growing_categories
  description: Identify CSI categories with the strongest year-over-year growth
  sql: |
    WITH category_counts AS (
      SELECT
        csi_category,
        SUM(CASE WHEN report_year = :year - 1 THEN 1 ELSE 0 END) AS previous_year_count,
        SUM(CASE WHEN report_year = :year THEN 1 ELSE 0 END) AS current_year_count
      FROM safety_indicators
      WHERE report_year IN (:year - 1, :year)
        AND csi_category IS NOT NULL
      GROUP BY csi_category
    )
    SELECT
      csi_category,
      previous_year_count,
      current_year_count,
      current_year_count - previous_year_count AS absolute_growth,
      ROUND((current_year_count - previous_year_count) * 100.0 / NULLIF(previous_year_count, 0), 1) AS growth_pct
    FROM category_counts
    WHERE previous_year_count >= :minimum_baseline
      AND current_year_count > previous_year_count
    ORDER BY growth_pct DESC, current_year_count DESC
  parameters:
  - name: year
    type: integer
    description: Current report year for the YoY comparison
    required: false
    default: 2025
  - name: minimum_baseline
    type: integer
    description: Minimum prior-year count to suppress noise
    required: false
    default: 100
  nl_examples:
  - Which Toronto major crime categories are growing fastest in 2025?
  - Show me the fastest rising Toronto CSI categories
  - What Toronto major crime categories surged year over year?
  - Fastest growing Toronto community safety indicators for 2024
  - Which Toronto categories are driving the latest major crime increase?
  - Find Toronto CSI categories with the biggest percentage growth
  - What Toronto major crime types are rising fastest?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [category-growth, yoy]
  tags: [policy, category, growth, yoy, csi]

- id: weekend_vs_weekday_by_category
  description: Compare weekend and weekday intensity for each CSI category
  sql: |
    WITH category_day_split AS (
      SELECT
        csi_category,
        SUM(CASE WHEN DAYOFWEEK(occ_date) IN (1, 7) THEN 1 ELSE 0 END) AS weekend_incidents,
        SUM(CASE WHEN DAYOFWEEK(occ_date) BETWEEN 2 AND 6 THEN 1 ELSE 0 END) AS weekday_incidents
      FROM safety_indicators
      WHERE report_year = :year
        AND occ_date IS NOT NULL
        AND csi_category IS NOT NULL
      GROUP BY csi_category
    )
    SELECT
      csi_category,
      weekend_incidents,
      weekday_incidents,
      ROUND(weekend_incidents / 2.0, 1) AS avg_per_weekend_day,
      ROUND(weekday_incidents / 5.0, 1) AS avg_per_weekday,
      ROUND((weekend_incidents / 2.0) / NULLIF(weekday_incidents / 5.0, 0), 2) AS weekend_to_weekday_ratio
    FROM category_day_split
    ORDER BY weekend_to_weekday_ratio DESC, weekend_incidents DESC
  parameters:
  - name: year
    type: integer
    description: Report year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which Toronto major crime categories skew most toward weekends?
  - Toronto weekend vs weekday CSI ratio by category
  - Are Toronto robberies more weekend-driven than break and enter in the CSI data?
  - Show me Toronto weekend intensity for major crime categories in 2025
  - Compare Toronto weekend and weekday patterns by CSI category
  - What Toronto major crime categories are more weekday-driven versus weekend-driven?
  - Toronto weekend versus weekday major crime mix for 2024
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: safety_indicators
    qualifiers: [weekend, weekday, category]
  tags: [policy, weekend, weekday, category, csi]

- id: city_snapshot
  description: Return a one-row citywide dashboard summary for the CSI dataset
  sql: |
    SELECT
      :year AS year,
      (SELECT COUNT(*) FROM safety_indicators WHERE report_year = :year) AS total_incidents,
      (SELECT COUNT(DISTINCT event_unique_id) FROM safety_indicators WHERE report_year = :year) AS distinct_events,
      (SELECT COUNT(*) FROM safety_indicators WHERE report_year = :year - 1) AS previous_year_incidents,
      ROUND(
        (
          (SELECT COUNT(*) FROM safety_indicators WHERE report_year = :year) -
          (SELECT COUNT(*) FROM safety_indicators WHERE report_year = :year - 1)
        ) * 100.0 /
        NULLIF((SELECT COUNT(*) FROM safety_indicators WHERE report_year = :year - 1), 0),
        1
      ) AS yoy_pct_change,
      (
        SELECT csi_category
        FROM safety_indicators
        WHERE report_year = :year AND csi_category IS NOT NULL
        GROUP BY csi_category
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_category,
      (
        SELECT neighbourhood_158
        FROM safety_indicators
        WHERE report_year = :year AND neighbourhood_158 IS NOT NULL
        GROUP BY neighbourhood_158
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_neighbourhood,
      (
        SELECT division
        FROM safety_indicators
        WHERE report_year = :year AND division IS NOT NULL
        GROUP BY division
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_division
  parameters:
  - name: year
    type: integer
    description: Report year to summarize
    required: false
    default: 2025
  nl_examples:
  - Give me a Toronto major crime snapshot for 2025
  - Toronto citywide CSI dashboard for 2024
  - Summarize the latest Toronto community safety indicator picture in one row
  - What is the top category, neighbourhood, and division for Toronto CSI data?
  - Quick Toronto major crime summary for 2025
  - What does the Toronto citywide CSI snapshot look like?
  - One-line overview of Toronto major crime this year
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: safety_indicators
    qualifiers: [snapshot, dashboard, yearly]
  tags: [policy, snapshot, dashboard, csi]
