domain_name: Toronto Police Robbery Database
description: Toronto Police Service robbery incident database for DuckDB covering Toronto robbery-related Community Safety Indicator records, primarily from 2014-2025 with sparse legacy records.
domain_type: analytical
semantic_types:
  date_value:
    description: Date values in various formats
    patterns:
    - date
    - day
    - time
    - when
    - from
    - to
    - between
    regex_patterns:
    - \b\d{4}-\d{2}-\d{2}\b
    - \b\d{2}/\d{2}/\d{4}\b
  identifier:
    description: Unique identifiers and keys
    patterns:
    - id
    - identifier
    - key
    - event number
    regex_patterns:
    - \b(\d+)\b
  integer_value:
    description: Integer and count values
    patterns:
    - count
    - number
    - total
    - year
    - hour
    regex_patterns:
    - \b\d+\b
