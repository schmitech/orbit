entities:
  robbery:
    name: robbery
    entity_type: primary
    table_name: robbery
    description: Robbery-related CSI occurrence records across Toronto at the offence level
    primary_key: id
    display_name_field: neighbourhood_158
    searchable_fields:
    - event_unique_id
    - division
    - offence
    - premises_type
    - location_type
    - neighbourhood_158
    - neighbourhood_140
    common_filters:
    - occ_year
    - report_year
    - division
    - offence
    - premises_type
    - location_type
    - neighbourhood_158
    - occ_dow
    - occ_hour
    default_sort_field: occ_date
    default_sort_order: DESC
