- id: emerging_hotspots
  description: Find neighbourhoods with the fastest year-over-year robbery growth
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood_158,
        hood_158,
        occ_year,
        COUNT(*) AS robbery_count
      FROM robbery
      WHERE neighbourhood_158 IS NOT NULL
        AND occ_year IN (:year - 1, :year)
      GROUP BY neighbourhood_158, hood_158, occ_year
    )
    SELECT
      cur.neighbourhood_158 AS neighbourhood,
      cur.hood_158 AS hood_code,
      prev.robbery_count AS previous_year_count,
      cur.robbery_count AS current_year_count,
      cur.robbery_count - prev.robbery_count AS absolute_growth,
      ROUND((cur.robbery_count - prev.robbery_count) * 100.0 / NULLIF(prev.robbery_count, 0), 1) AS growth_pct
    FROM yearly cur
    JOIN yearly prev
      ON cur.neighbourhood_158 = prev.neighbourhood_158
     AND cur.hood_158 = prev.hood_158
     AND cur.occ_year = :year
     AND prev.occ_year = :year - 1
    WHERE prev.robbery_count >= :minimum_baseline
      AND cur.robbery_count > prev.robbery_count
    ORDER BY growth_pct DESC, current_year_count DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Current year for the YoY comparison
    required: false
    default: 2025
  - name: minimum_baseline
    type: integer
    description: Minimum prior-year count to suppress noise
    required: false
    default: 100
  - name: limit
    type: integer
    description: Number of neighbourhoods to return
    required: false
    default: 15
  nl_examples:
  - Which Toronto neighbourhoods are emerging robbery hotspots in 2025?
  - Show me the fastest growing Toronto robbery areas
  - What Toronto neighbourhoods had the biggest increase in robberies year over year?
  - Emerging Toronto robbery hotspots for 2024
  - Which Toronto communities are getting worse for robberies?
  - Find Toronto neighbourhoods with sharp robbery growth
  - Where is robbery rising fastest in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [hotspots, neighbourhood, yoy]
  tags: [policy, hotspots, neighbourhood, yoy, strategic]

- id: city_snapshot
  description: Return a one-row citywide dashboard summary for a selected year
  sql: |
    SELECT
      :year AS year,
      (SELECT COUNT(*) FROM robbery WHERE occ_year = :year) AS total_robberies,
      (SELECT COUNT(*) FROM robbery WHERE occ_year = :year - 1) AS previous_year_robberies,
      ROUND(
        (
          (SELECT COUNT(*) FROM robbery WHERE occ_year = :year) -
          (SELECT COUNT(*) FROM robbery WHERE occ_year = :year - 1)
        ) * 100.0 /
        NULLIF((SELECT COUNT(*) FROM robbery WHERE occ_year = :year - 1), 0),
        1
      ) AS yoy_pct_change,
      (
        SELECT offence
        FROM robbery
        WHERE occ_year = :year AND offence IS NOT NULL
        GROUP BY offence
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_offence,
      (
        SELECT neighbourhood_158
        FROM robbery
        WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL
        GROUP BY neighbourhood_158
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_neighbourhood,
      (
        SELECT division
        FROM robbery
        WHERE occ_year = :year AND division IS NOT NULL
        GROUP BY division
        ORDER BY COUNT(*) DESC
        LIMIT 1
      ) AS top_division
  parameters:
  - name: year
    type: integer
    description: Year to summarize
    required: false
    default: 2025
  nl_examples:
  - Give me a Toronto robbery snapshot for 2025
  - Toronto citywide robbery dashboard for 2024
  - Summarize the latest Toronto robbery picture in one row
  - What is the top robbery offence, neighbourhood, and division in Toronto?
  - Quick robbery summary for Toronto in 2025
  - What does the Toronto citywide robbery snapshot look like?
  - One-line overview of Toronto robberies this year
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [snapshot, dashboard, yearly]
  tags: [policy, snapshot, dashboard, strategic]

- id: crime_concentration
  description: Analyze how concentrated robberies are across neighbourhoods (Pareto analysis)
  sql: |
    WITH neighbourhood_stats AS (
      SELECT
        neighbourhood_158,
        COUNT(*) AS robbery_count,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS neighbourhood_rank,
        COUNT(*) * 100.0 / SUM(COUNT(*)) OVER() AS pct_of_total
      FROM robbery
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL
      GROUP BY neighbourhood_158
    )
    SELECT
      CASE
        WHEN neighbourhood_rank <= 5 THEN 'Top 5 Neighbourhoods'
        WHEN neighbourhood_rank <= 20 THEN 'Rank 6-20'
        ELSE 'Remaining Neighbourhoods'
      END AS concentration_tier,
      COUNT(*) AS neighbourhood_count,
      SUM(robbery_count) AS total_robberies,
      ROUND(SUM(pct_of_total), 1) AS cumulative_pct
    FROM neighbourhood_stats
    GROUP BY 1
    ORDER BY MIN(neighbourhood_rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Is robbery concentrated in a few neighbourhoods in Toronto?
  - Show me robbery concentration across Toronto
  - What percentage of Toronto robbery happens in the top 5 areas?
  - Toronto concentration analysis for robberies in 2025
  - Do a small number of Toronto neighbourhoods account for most robberies?
  - Pareto analysis of Toronto robbery distribution
  - How unevenly is robbery distributed in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [concentration, ranking]
  tags: [policy, concentration, ranking, strategic]

- id: category_composition_shift
  description: Track if violent robbery types (weapons) are increasing as a share of total
  sql: |
    WITH yearly_totals AS (
      SELECT occ_year, COUNT(*) AS total_robberies
      FROM robbery
      WHERE occ_year IS NOT NULL
      GROUP BY occ_year
    ),
    weapon_stats AS (
      SELECT
        occ_year,
        COUNT(*) AS weapon_robbery_count
      FROM robbery
      WHERE offence LIKE '%Weapon%' OR offence LIKE '%Firearm%'
      GROUP BY occ_year
    )
    SELECT
      yt.occ_year AS year,
      yt.total_robberies,
      COALESCE(ws.weapon_robbery_count, 0) AS weapon_robberies,
      ROUND(COALESCE(ws.weapon_robbery_count, 0) * 100.0 / yt.total_robberies, 1) AS weapon_share_pct
    FROM yearly_totals yt
    LEFT JOIN weapon_stats ws ON yt.occ_year = ws.occ_year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - Is armed robbery becoming a larger share of all Toronto robberies?
  - Track the share of weapon-related robberies over time in Toronto
  - Are violent Toronto robberies increasing proportionally?
  - Historical shift in Toronto robbery composition
  - Year over year change in Toronto robbery weapon share
  - Is the percentage of armed robberies growing in Toronto?
  - Compare Toronto weapon vs non-weapon robbery trends
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [offence, trends, composition]
  tags: [policy, offence, trends, violent-crime]

- id: seasonal_deviation
  description: Compare monthly robbery volume to the historical monthly average
  sql: |
    WITH monthly_counts AS (
      SELECT
        occ_year,
        EXTRACT(MONTH FROM occ_date) AS month,
        COUNT(*) AS robbery_count
      FROM robbery
      WHERE occ_date IS NOT NULL
      GROUP BY 1, 2
    ),
    averages AS (
      SELECT
        month,
        AVG(robbery_count) AS avg_robberies
      FROM monthly_counts
      GROUP BY 1
    )
    SELECT
      mc.occ_year AS year,
      CASE mc.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      mc.robbery_count AS current_count,
      ROUND(a.avg_robberies, 1) AS historical_avg,
      mc.robbery_count - ROUND(a.avg_robberies, 1) AS deviation,
      ROUND((mc.robbery_count - a.avg_robberies) * 100.0 / a.avg_robberies, 1) AS pct_deviation
    FROM monthly_counts mc
    JOIN averages a ON mc.month = a.month
    WHERE mc.occ_year = :year
    ORDER BY mc.month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - How did Toronto robberies in 2025 compare to historical averages?
  - Show me seasonal deviation for Toronto robberies
  - Was January 2025 worse than a typical January for Toronto robberies?
  - Monthly Toronto robbery anomaly detection
  - Compare current Toronto robbery counts to historical norms
  - Is the latest Toronto robbery volume unusual for this time of year?
  - Seasonal pattern deviation in Toronto robberies
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [seasonal, anomaly]
  tags: [policy, seasonal, trends, analysis]

- id: fastest_growing_types
  description: Which robbery offence types are surging the most?
  sql: |
    WITH counts AS (
      SELECT
        offence,
        SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) AS prev_count,
        SUM(CASE WHEN occ_year = :year THEN 1 ELSE 0 END) AS curr_count
      FROM robbery
      WHERE occ_year IN (:year - 1, :year) AND offence IS NOT NULL
      GROUP BY offence
    )
    SELECT
      offence,
      prev_count,
      curr_count,
      curr_count - prev_count AS growth,
      ROUND((curr_count - prev_count) * 100.0 / NULLIF(prev_count, 0), 1) AS growth_pct
    FROM counts
    WHERE prev_count >= :min_baseline
    ORDER BY growth_pct DESC
  parameters:
  - name: year
    type: integer
    description: Current year
    required: false
    default: 2025
  - name: min_baseline
    type: integer
    description: Minimum prior year count
    required: false
    default: 20
  nl_examples:
