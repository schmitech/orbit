- id: premises_weapon_breakdown
  description: Show what percentage of robberies at each premises type involve weapons
  sql: |
    SELECT
      premises_type,
      COUNT(*) AS total_robberies,
      SUM(CASE WHEN offence LIKE '%Weapon%' OR offence LIKE '%Firearm%' THEN 1 ELSE 0 END) AS weapon_robberies,
      ROUND(
        SUM(CASE WHEN offence LIKE '%Weapon%' OR offence LIKE '%Firearm%' THEN 1 ELSE 0 END) * 100.0
        / COUNT(*), 1
      ) AS weapon_pct
    FROM robbery
    WHERE occ_year = :year AND premises_type IS NOT NULL
    GROUP BY premises_type
    ORDER BY weapon_pct DESC
  parameters:
