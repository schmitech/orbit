- id: yearly_robbery_trends
  description: Track year-over-year changes in robbery incidents across Toronto
  sql: |
    SELECT
      occ_year AS year,
      COUNT(*) AS total_robberies,
      COUNT(DISTINCT event_unique_id) AS distinct_events,
      COUNT(DISTINCT neighbourhood_158) AS neighbourhoods_affected,
      COUNT(DISTINCT division) AS divisions_affected
    FROM robbery
    WHERE occ_year IS NOT NULL
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters: []
  nl_examples:
  - How has robbery changed over the years in Toronto?
  - Show me yearly Toronto robbery trends
  - Is robbery getting worse or better over time in Toronto?
  - Annual Toronto robbery counts
  - Compare Toronto robbery totals year over year
  - How many robbery incidents were there each year in Toronto?
  - What does the long-term Toronto robbery trend look like?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, crime-stats]

- id: robberies_by_month
  description: Analyze monthly robbery patterns for a selected year
  sql: |
    SELECT
      EXTRACT(MONTH FROM occ_date) AS month,
      CASE EXTRACT(MONTH FROM occ_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS robbery_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM robbery
    WHERE occ_year = :year AND occ_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occ_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2025
  nl_examples:
  - Which months have the most robberies in Toronto?
  - Show me Toronto monthly robbery patterns for 2025
  - When do robberies peak during the year in Toronto?
  - Monthly Toronto robbery breakdown
  - Is summer worse than winter for robberies in Toronto?
  - What month had the highest Toronto robbery count in 2024?
  - Seasonal pattern of robberies in Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: robbery
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, trends, patterns]

