- id: yoy_robbery_comparison
  description: Compare total robbery incidents between two selected years
  sql: |
    WITH yearly AS (
      SELECT occ_year, COUNT(*) AS robbery_count
      FROM robbery
      WHERE occ_year IN (:year_a, :year_b)
      GROUP BY occ_year
    )
    SELECT
      a.occ_year AS base_year,
      a.robbery_count AS base_year_robberies,
      b.occ_year AS comparison_year,
      b.robbery_count AS comparison_year_robberies,
      b.robbery_count - a.robbery_count AS absolute_change,
      ROUND((b.robbery_count - a.robbery_count) * 100.0 / NULLIF(a.robbery_count, 0), 1) AS pct_change
    FROM yearly a
    JOIN yearly b ON a.occ_year = :year_a AND b.occ_year = :year_b
  parameters:
  - name: year_a
    type: integer
    description: Base year
    required: false
    default: 2024
  - name: year_b
    type: integer
    description: Comparison year
    required: false
    default: 2025
  nl_examples:
  - Compare Toronto robberies in 2024 vs 2025
  - Toronto year over year robbery comparison
  - How much did Toronto robberies change from 2023 to 2024?
  - Show the difference in Toronto robberies between two years
  - Did Toronto have more robberies in 2025 than 2024?
  - Compare Toronto robbery totals for 2022 and 2025
  - What was the percentage change in Toronto robberies year over year?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: robbery
    qualifiers: [year-over-year, comparison]
  tags: [comparison, yoy, yearly, strategic]

