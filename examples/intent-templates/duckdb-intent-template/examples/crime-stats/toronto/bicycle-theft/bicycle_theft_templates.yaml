- id: bicycle_theft_concentration_toronto
  description: Analyze whether bicycle theft is concentrated in a few locations in Toronto (Pareto analysis)
  sql: |
    WITH neighbourhood_counts AS (
      SELECT
        neighbourhood_158,
        COUNT(*) AS theft_count,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM bicycle_theft
      WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL
      GROUP BY neighbourhood_158
    ),
    totals AS (
      SELECT COUNT(*) AS total_neighbourhoods, SUM(theft_count) AS total_thefts
      FROM neighbourhood_counts
    )
    SELECT
      CASE
        WHEN rank <= CEIL(total_neighbourhoods * 0.05) THEN 'Top 5%'
        WHEN rank <= CEIL(total_neighbourhoods * 0.10) THEN 'Top 6-10%'
        WHEN rank <= CEIL(total_neighbourhoods * 0.20) THEN 'Top 11-20%'
        ELSE 'Remaining 80%'
      END AS tier,
      COUNT(*) AS neighbourhoods_in_tier,
      SUM(theft_count) AS total_thefts,
      ROUND(SUM(theft_count) * 100.0 / MAX(t.total_thefts), 1) AS pct_of_all_thefts
    FROM neighbourhood_counts nc
    CROSS JOIN totals t
    GROUP BY tier
    ORDER BY MIN(rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Is bicycle theft concentrated in a few areas in Toronto?
  - Do a small number of neighbourhoods account for most bike thefts in Toronto?
  - Pareto analysis of bicycle theft hotspots Toronto
  - Bike theft concentration analysis Toronto
  - Does the 80/20 rule apply to bicycle theft in Toronto?
  - Are most bike thefts happening in the same few places in Toronto?
  - Bicycle theft geographic concentration Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [concentration, pareto, policy]
  tags: [concentration, pareto, policy, strategic, bike-theft]

- id: bicycle_theft_type_seasonality_toronto
  description: Analyze which bicycle types are stolen in which seasons in Toronto
  sql: |
    SELECT
      bike_type,
      CASE bike_type
        WHEN 'MT' THEN 'Mountain'
        WHEN 'RG' THEN 'Regular'
        WHEN 'OT' THEN 'Other'
        WHEN 'RC' THEN 'Racer'
        WHEN 'EL' THEN 'Electric'
        WHEN 'TO' THEN 'Touring'
        WHEN 'SC' THEN 'Scooter'
        WHEN 'BM' THEN 'BMX'
        WHEN 'FO' THEN 'Folding'
        ELSE bike_type
      END AS type_name,
      SUM(CASE WHEN EXTRACT(MONTH FROM occ_date) IN (12, 1, 2) THEN 1 ELSE 0 END) AS winter,
      SUM(CASE WHEN EXTRACT(MONTH FROM occ_date) IN (3, 4, 5) THEN 1 ELSE 0 END) AS spring,
      SUM(CASE WHEN EXTRACT(MONTH FROM occ_date) IN (6, 7, 8) THEN 1 ELSE 0 END) AS summer,
      SUM(CASE WHEN EXTRACT(MONTH FROM occ_date) IN (9, 10, 11) THEN 1 ELSE 0 END) AS fall,
      COUNT(*) AS total
    FROM bicycle_theft
    WHERE occ_year = :year
      AND bike_type IS NOT NULL
      AND occ_date IS NOT NULL
    GROUP BY bike_type
    HAVING COUNT(*) >= 5
    ORDER BY total DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which bike types are stolen most in summer vs winter in Toronto?
  - Seasonal patterns of bicycle theft by type in Toronto
  - Are mountain bikes stolen more in spring in Toronto?
  - Bicycle theft seasonality by type Toronto
  - When are different types of bikes stolen in Toronto?
  - Do theft patterns differ by bike type across seasons in Toronto?
  - Seasonal bicycle theft breakdown by type Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [seasonality, type, policy]
  tags: [seasonality, type, policy, strategic, bike-theft]

- id: bicycle_theft_persistent_hotspots_toronto
  description: Identify neighbourhoods consistently in the top 20 for bicycle theft across years in Toronto
  sql: |
    WITH yearly_ranks AS (
      SELECT
        neighbourhood_158,
        occ_year,
        COUNT(*) AS theft_count,
        RANK() OVER (PARTITION BY occ_year ORDER BY COUNT(*) DESC) AS year_rank
      FROM bicycle_theft
      WHERE neighbourhood_158 IS NOT NULL AND occ_year >= 2014
      GROUP BY neighbourhood_158, occ_year
    )
    SELECT
      neighbourhood_158 AS neighbourhood,
      COUNT(DISTINCT occ_year) AS years_in_top_20,
      SUM(theft_count) AS total_thefts,
      ROUND(AVG(year_rank), 1) AS avg_rank,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank
    FROM yearly_ranks
    WHERE year_rank <= 20
    GROUP BY neighbourhood_158
    HAVING COUNT(DISTINCT occ_year) >= 3
    ORDER BY years_in_top_20 DESC, total_thefts DESC
  parameters: []
  nl_examples:
  - Which areas are consistently bad for bike theft in Toronto?
  - Persistent bicycle theft hotspots in Toronto
  - What neighbourhoods always have high bike theft in Toronto?
  - Chronic bicycle theft problem areas in Toronto
  - Which Toronto neighbourhoods are repeatedly in the top for bike theft?
  - Long-term bike theft hotspots Toronto
  - Are the same areas always worst for bicycle theft in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: bicycle_theft
    qualifiers: [persistent, hotspots, policy]
  tags: [persistent, hotspots, policy, strategic, bike-theft]

- id: bicycle_theft_weekend_vs_weekday_toronto
  description: Compare weekend vs weekday bicycle theft patterns in Toronto
  sql: |
    WITH daily AS (
      SELECT
        occ_dow,
        CASE WHEN occ_dow IN ('Saturday', 'Sunday') THEN 'Weekend' ELSE 'Weekday' END AS day_type,
        COUNT(*) AS theft_count
      FROM bicycle_theft
      WHERE occ_year = :year AND occ_dow IS NOT NULL
      GROUP BY occ_dow
    )
    SELECT
      day_type,
      SUM(theft_count) AS total_thefts,
      ROUND(SUM(theft_count) * 1.0 /
        CASE day_type WHEN 'Weekend' THEN 2 ELSE 5 END, 1) AS avg_per_day,
      ROUND(SUM(theft_count) * 100.0 / (SELECT SUM(theft_count) FROM daily), 1) AS percentage
    FROM daily
    GROUP BY day_type
    ORDER BY avg_per_day DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Are bikes stolen more on weekends or weekdays in Toronto?
  - Weekend vs weekday bicycle theft in Toronto
  - Do more bike thefts happen on weekends in Toronto?
  - Bicycle theft weekend vs weekday comparison Toronto
  - Is my bike safer on weekends or weekdays in Toronto?
  - Weekday vs weekend bike theft rate Toronto
  - When are bikes more at risk weekday or weekend Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [weekend, weekday, patterns]
  tags: [weekend, weekday, patterns, policy, bike-theft]

- id: bicycle_theft_fastest_growing_neighbourhoods_toronto
  description: Identify neighbourhoods with the fastest growth in bicycle theft in Toronto
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood_158,
        SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) AS previous_count,
        SUM(CASE WHEN occ_year = :year THEN 1 ELSE 0 END) AS current_count
      FROM bicycle_theft
      WHERE neighbourhood_158 IS NOT NULL
        AND occ_year IN (:year - 1, :year)
      GROUP BY neighbourhood_158
      HAVING SUM(CASE WHEN occ_year = :year - 1 THEN 1 ELSE 0 END) >= 5
    )
    SELECT
      neighbourhood_158 AS neighbourhood,
      previous_count,
      current_count,
      current_count - previous_count AS change,
      ROUND((current_count - previous_count) * 100.0 / previous_count, 1) AS growth_pct
    FROM yearly
    WHERE current_count > previous_count
    ORDER BY growth_pct DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to compare (compares against previous year)
    required: false
    default: 2024
  - name: limit
    type: integer
    description: Number of results to return
    required: false
    default: 15
  nl_examples:
  - Which areas are seeing the biggest surge in bike theft in Toronto?
  - Fastest growing bicycle theft neighbourhoods Toronto
  - Where is bike theft increasing the most in Toronto?
  - Emerging bicycle theft hotspots in Toronto 2024
  - Which Toronto neighbourhoods are getting worse for bike theft?
  - Biggest increases in bicycle theft by neighbourhood Toronto
  - Where is bike theft surging in Toronto?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: bicycle_theft
    qualifiers: [growth, emerging, hotspots]
  tags: [growth, emerging, hotspots, policy, bike-theft]
