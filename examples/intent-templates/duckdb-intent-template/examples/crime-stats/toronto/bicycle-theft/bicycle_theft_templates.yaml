- id: bicycle_theft_by_hour
  description: Analyze bicycle theft by hour of occurrence in Toronto
  sql: |
    SELECT
      occ_hour AS hour,
      CASE
        WHEN occ_hour BETWEEN 0 AND 5 THEN 'Late Night (12am-6am)'
        WHEN occ_hour BETWEEN 6 AND 11 THEN 'Morning (6am-12pm)'
        WHEN occ_hour BETWEEN 12 AND 17 THEN 'Afternoon (12pm-6pm)'
        ELSE 'Evening (6pm-12am)'
      END AS time_period,
      COUNT(*) AS theft_count
    FROM bicycle_theft
    WHERE occ_year = :year AND occ_hour IS NOT NULL
    GROUP BY occ_hour
    ORDER BY occ_hour
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
