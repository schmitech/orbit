- id: neighbourhood_bicycle_theft_detail
  description: Get detailed bicycle theft statistics for a specific neighbourhood in Toronto
  sql: |
    SELECT
      occ_year,
      COUNT(*) AS total_incidents,
      COUNT(CASE WHEN status = 'STOLEN' THEN 1 END) AS stolen,
      COUNT(CASE WHEN status = 'RECOVERED' THEN 1 END) AS recovered,
      ROUND(AVG(bike_cost), 0) AS avg_cost,
      COUNT(DISTINCT primary_offence) AS offence_types
    FROM bicycle_theft
    WHERE neighbourhood_158 ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Toronto', ''), 'toronto', '')) || '%'
      AND occ_year >= 2014
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood name (partial match supported)
    required: true
  nl_examples:
