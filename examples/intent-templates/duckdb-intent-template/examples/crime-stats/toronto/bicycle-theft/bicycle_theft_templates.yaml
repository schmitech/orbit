- id: bicycle_theft_by_type
  description: Break down bicycle theft by bicycle type in Toronto
  sql: |
    SELECT
      bike_type,
      CASE bike_type
        WHEN 'MT' THEN 'Mountain'
        WHEN 'RG' THEN 'Regular'
        WHEN 'OT' THEN 'Other'
        WHEN 'RC' THEN 'Racer'
        WHEN 'EL' THEN 'Electric'
        WHEN 'TO' THEN 'Touring'
        WHEN 'SC' THEN 'Scooter'
        WHEN 'BM' THEN 'BMX'
        WHEN 'FO' THEN 'Folding'
        WHEN 'TR' THEN 'Tricycle'
        WHEN 'TA' THEN 'Tandem'
        WHEN 'UN' THEN 'Unknown'
        WHEN 'RE' THEN 'Recumbent'
        ELSE bike_type
      END AS type_name,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(AVG(bike_cost), 0) AS avg_cost
    FROM bicycle_theft
    WHERE occ_year = :year AND bike_type IS NOT NULL
    GROUP BY bike_type
    ORDER BY theft_count DESC
  parameters:
