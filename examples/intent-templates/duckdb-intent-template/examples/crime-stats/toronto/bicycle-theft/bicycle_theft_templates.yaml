- id: top_stolen_bicycle_brands_toronto
  description: Rank the most commonly stolen bicycle brands in Toronto
  sql: |
    SELECT
      TRIM(bike_make) AS brand,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(AVG(bike_cost), 0) AS avg_cost
    FROM bicycle_theft
    WHERE occ_year = :year
      AND bike_make IS NOT NULL
      AND TRIM(bike_make) != ''
      AND status = 'STOLEN'
    GROUP BY TRIM(bike_make)
    ORDER BY theft_count DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: limit
    type: integer
    description: Number of brands to return
    required: false
