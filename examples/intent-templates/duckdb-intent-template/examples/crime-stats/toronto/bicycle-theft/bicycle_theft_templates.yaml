- id: bicycle_value_analysis_toronto
  description: Analyze the value distribution of stolen bicycles in Toronto
  sql: |
    SELECT
      CASE
        WHEN bike_cost IS NULL OR bike_cost = 0 THEN 'Unknown/Not reported'
        WHEN bike_cost < 200 THEN 'Under $200'
        WHEN bike_cost < 500 THEN '$200-$499'
        WHEN bike_cost < 1000 THEN '$500-$999'
        WHEN bike_cost < 2000 THEN '$1,000-$1,999'
        WHEN bike_cost < 5000 THEN '$2,000-$4,999'
        ELSE '$5,000+'
      END AS value_range,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM bicycle_theft
    WHERE occ_year = :year AND status = 'STOLEN'
    GROUP BY value_range
    ORDER BY MIN(bike_cost)
  parameters:
