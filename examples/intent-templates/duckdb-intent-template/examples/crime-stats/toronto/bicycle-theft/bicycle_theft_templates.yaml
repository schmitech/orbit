    SELECT
      (SELECT COUNT(*) FROM bicycle_theft WHERE occ_year = :year) AS total_incidents,
      (SELECT COUNT(*) FROM bicycle_theft WHERE occ_year = :year - 1) AS previous_year_total,
      ROUND(
        ((SELECT COUNT(*) FROM bicycle_theft WHERE occ_year = :year) -
         (SELECT COUNT(*) FROM bicycle_theft WHERE occ_year = :year - 1)) * 100.0
        / NULLIF((SELECT COUNT(*) FROM bicycle_theft WHERE occ_year = :year - 1), 0), 1
      ) AS yoy_change_pct,
      (SELECT neighbourhood_158 FROM bicycle_theft WHERE occ_year = :year AND neighbourhood_158 IS NOT NULL GROUP BY neighbourhood_158 ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood,
      (SELECT bike_type FROM bicycle_theft WHERE occ_year = :year AND bike_type IS NOT NULL GROUP BY bike_type ORDER BY COUNT(*) DESC LIMIT 1) AS most_stolen_type,
      (SELECT division FROM bicycle_theft WHERE occ_year = :year AND division IS NOT NULL GROUP BY division ORDER BY COUNT(*) DESC LIMIT 1) AS top_division,
      (SELECT ROUND(AVG(bike_cost), 0) FROM bicycle_theft WHERE occ_year = :year) AS avg_bike_cost,
      (SELECT ROUND(COUNT(CASE WHEN status = 'RECOVERED' THEN 1 END) * 100.0 / NULLIF(COUNT(CASE WHEN status = 'STOLEN' THEN 1 END), 0), 1) FROM bicycle_theft WHERE occ_year = :year) AS recovery_rate_pct
  parameters:
  - name: year
    type: integer
    description: Year for snapshot
    required: false
    default: 2024
  nl_examples:
  - Give me a bicycle theft snapshot for Toronto
  - Toronto bike theft dashboard
  - Overall bike theft summary for Toronto 2024
  - Quick overview of bicycle theft in Toronto
  - How bad is bike theft in Toronto right now?
  - Bicycle theft at a glance Toronto
  - City-wide bike theft summary Toronto
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [snapshot, dashboard]
  tags: [snapshot, dashboard, summary, bike-theft]

- id: bicycle_theft_neighbourhood_safety_trend
  description: Show year-over-year bicycle theft safety trend for a neighbourhood in Toronto
  sql: |
    SELECT
      occ_year,
      COUNT(*) AS theft_count,
      LAG(COUNT(*)) OVER (ORDER BY occ_year) AS previous_year_count,
      COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY occ_year) AS change,
      ROUND(
        (COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY occ_year)) * 100.0
        / NULLIF(LAG(COUNT(*)) OVER (ORDER BY occ_year), 0), 1
      ) AS change_pct
    FROM bicycle_theft
    WHERE neighbourhood_158 ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Toronto', ''), 'toronto', '')) || '%'
      AND occ_year >= 2014
    GROUP BY occ_year
    ORDER BY occ_year
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood to analyze (partial match supported)
    required: true
  nl_examples:
