- id: yearly_bicycle_theft_trends
  description: Track year-over-year changes in bicycle theft incidents in Toronto
  sql: |
    SELECT
      occ_year,
      COUNT(*) AS total_incidents,
      COUNT(CASE WHEN status = 'STOLEN' THEN 1 END) AS stolen_count,
      COUNT(CASE WHEN status = 'RECOVERED' THEN 1 END) AS recovered_count,
      ROUND(COUNT(CASE WHEN status = 'RECOVERED' THEN 1 END) * 100.0 / NULLIF(COUNT(CASE WHEN status = 'STOLEN' THEN 1 END), 0), 1) AS recovery_rate_pct,
      ROUND(AVG(bike_cost), 0) AS avg_bike_cost
    FROM bicycle_theft
    WHERE occ_year >= 2014
    GROUP BY occ_year
    ORDER BY occ_year DESC
  parameters: []
  nl_examples:
  - How has bicycle theft changed over the years in Toronto?
  - Show me yearly bike theft trends in Toronto
  - Is bicycle theft increasing or decreasing in Toronto?
  - Year-over-year comparison of stolen bicycles in Toronto
  - How many bike thefts were there each year in Toronto?
  - Is bike theft getting worse in Toronto?
  - Toronto bicycle theft rate over time
  - Annual bicycle theft statistics Toronto
  - Track bike theft trends across years in Toronto
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, bike-theft]

- id: bicycle_theft_by_month
  description: Analyze monthly bicycle theft patterns in Toronto
  sql: |
    SELECT
      EXTRACT(MONTH FROM occ_date) AS month_num,
      CASE EXTRACT(MONTH FROM occ_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS theft_count,
      ROUND(AVG(bike_cost), 0) AS avg_cost
    FROM bicycle_theft
    WHERE occ_year = :year AND occ_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occ_date)
    ORDER BY month_num
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most bike thefts in Toronto?
  - Show me seasonal patterns in bicycle theft in Toronto
  - When do most bicycle thefts happen in Toronto?
  - Monthly bike theft breakdown Toronto
  - Peak months for bicycle theft in Toronto
  - Is bike theft more common in summer or winter in Toronto?
  - Monthly stolen bicycle counts for Toronto 2024
  - Are there seasonal spikes in bike theft in Toronto?
  - Which month had the highest number of bicycle thefts in Toronto 2023?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [monthly, seasonal]
  tags: [monthly, seasonal, trends, bike-theft]

- id: bicycle_theft_by_weekday
  description: Analyze bicycle theft patterns by day of the week in Toronto
  sql: |
    SELECT
      occ_dow AS day_of_week,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(AVG(bike_cost), 0) AS avg_cost
    FROM bicycle_theft
    WHERE occ_year = :year AND occ_dow IS NOT NULL
    GROUP BY occ_dow
    ORDER BY theft_count DESC
