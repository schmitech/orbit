- id: city_snapshot
  description: Quick city-wide pulse — total thefts, trend direction, top concern, top area
  sql: |
    SELECT
      :year AS year,
      (SELECT COUNT(*) FROM auto_theft WHERE year = :year) AS total_thefts,
      (SELECT COUNT(*) FROM auto_theft WHERE year = :year - 1) AS previous_year_thefts,
      ROUND(((SELECT COUNT(*) FROM auto_theft WHERE year = :year) -
             (SELECT COUNT(*) FROM auto_theft WHERE year = :year - 1)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM auto_theft WHERE year = :year - 1), 0), 1) AS yoy_change_pct,
      (SELECT vehicle_make FROM auto_theft WHERE year = :year AND vehicle_make IS NOT NULL
       GROUP BY vehicle_make ORDER BY COUNT(*) DESC LIMIT 1) AS most_stolen_make,
      (SELECT neighbourhood FROM auto_theft WHERE year = :year AND neighbourhood IS NOT NULL
       GROUP BY neighbourhood ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood,
      (SELECT ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1)
       FROM auto_theft WHERE year = :year) AS recovery_rate_pct
  parameters:
