  - How much of the Ottawa stolen vehicle problem is driven by a handful of areas?
  - Is Ottawa vehicle theft a city-wide issue or localized to certain hotspots?
  - What share of total Ottawa auto thefts come from the worst neighbourhoods in 2024?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [concentration, equity]
  tags: [concentration, policy, researcher, insight]

- id: seasonal_deviation
  description: Compare recent months to their historical average to spot anomalies
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(cnt), 1) AS historical_avg
      FROM (
        SELECT EXTRACT(MONTH FROM occurred_date) AS month, year, COUNT(*) AS cnt
        FROM auto_theft
        WHERE occurred_date IS NOT NULL AND year < :year
        GROUP BY month, year
      )
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM occurred_date) AS month,
        COUNT(*) AS current_count
      FROM auto_theft
      WHERE year = :year AND occurred_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM occurred_date)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.current_count,
      a.historical_avg,
      c.current_count - a.historical_avg AS deviation,
      ROUND((c.current_count - a.historical_avg) * 100.0 / NULLIF(a.historical_avg, 0), 1) AS deviation_pct
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY ABS(c.current_count - a.historical_avg) DESC
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2024
  nl_examples:
  - Which Ottawa months were unusual for auto theft this year?
  - Is this month above or below average for Ottawa car theft?
  - Ottawa seasonal anomalies in auto theft
  - Ottawa months that deviate from the historical auto theft pattern
  - Unusual Ottawa vehicle theft patterns this year
  - Were any months in 2024 abnormally high for Ottawa stolen vehicles compared to the average?
  - How does each month this year compare to the historical Ottawa norm for car theft?
  - Did any month in Ottawa have a surprising spike or drop in auto theft?
  - Which months in 2023 deviated most from their long-term Ottawa auto theft average?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: auto_theft
    qualifiers: [seasonal, anomaly]
  tags: [seasonal, anomaly, researcher, insight]

- id: reporting_lag_analysis
  description: Analyze the gap between when thefts occur and when they are reported
  sql: |
    SELECT
      CASE
        WHEN occurred_date = reported_date THEN 'Same day'
        WHEN reported_date - occurred_date = 1 THEN 'Next day'
        WHEN reported_date - occurred_date BETWEEN 2 AND 7 THEN '2-7 days'
        WHEN reported_date - occurred_date BETWEEN 8 AND 30 THEN '8-30 days'
        WHEN reported_date - occurred_date > 30 THEN 'Over 30 days'
        ELSE 'Unknown'
      END AS reporting_delay,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct
    FROM auto_theft
    WHERE year = :year AND occurred_date IS NOT NULL AND reported_date IS NOT NULL
    GROUP BY reporting_delay
    ORDER BY theft_count DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - How quickly are auto thefts reported in Ottawa?
  - What is the reporting delay for Ottawa car theft?
  - Time between Ottawa vehicle theft and report
  - Are Ottawa auto thefts reported the same day?
  - Does reporting delay affect Ottawa stolen vehicle recovery?
  - How long does it take Ottawa residents to report a stolen vehicle?
  - What percentage of Ottawa car thefts are reported within 24 hours in 2024?
  - Does waiting to report a stolen car in Ottawa hurt the chances of recovery?
