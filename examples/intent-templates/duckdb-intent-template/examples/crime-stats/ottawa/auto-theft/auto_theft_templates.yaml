  - What are the overall Ottawa stolen vehicle recovery stats for 2024?
  - Are most stolen vehicles in Ottawa eventually found?
  - What fraction of Ottawa auto thefts result in the vehicle being recovered?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [recovery, statistics]
  tags: [recovery, statistics, overview]

