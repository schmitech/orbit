  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [reporting, delay]
  tags: [reporting, delay, researcher, insight]

- id: neighbourhood_safety_trend
