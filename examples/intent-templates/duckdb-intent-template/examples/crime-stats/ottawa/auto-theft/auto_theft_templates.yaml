- id: overall_recovery_stats
  description: Get overall vehicle recovery statistics
  sql: |
    SELECT
      COUNT(*) AS total_thefts,
      COUNT(CASE WHEN recovered = 'Y' THEN 1 END) AS recovered,
      COUNT(CASE WHEN recovered = 'N' THEN 1 END) AS not_recovered,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct,
      ROUND(AVG(CASE WHEN recovered = 'Y' THEN vehicle_year END), 0) AS avg_recovered_year,
      ROUND(AVG(CASE WHEN recovered = 'N' THEN vehicle_year END), 0) AS avg_not_recovered_year
    FROM auto_theft
    WHERE year = :year
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - What is the overall Ottawa stolen vehicle recovery rate?
  - How many Ottawa stolen cars are recovered?
