- id: emerging_hotspots
  description: Neighbourhoods with the biggest year-over-year increase in auto theft
  sql: |
    WITH yearly AS (
      SELECT neighbourhood, year, COUNT(*) AS thefts
      FROM auto_theft
      WHERE neighbourhood IS NOT NULL
      GROUP BY neighbourhood, year
    ),
    yoy AS (
      SELECT
        c.neighbourhood,
        c.year,
        c.thefts AS current_thefts,
        p.thefts AS previous_thefts,
        c.thefts - p.thefts AS absolute_change,
        ROUND((c.thefts - p.thefts) * 100.0 / NULLIF(p.thefts, 0), 1) AS pct_change
      FROM yearly c
      JOIN yearly p ON c.neighbourhood = p.neighbourhood AND c.year = p.year + 1
    )
    SELECT neighbourhood, current_thefts, previous_thefts, absolute_change, pct_change
    FROM yoy
    WHERE year = :year AND previous_thefts >= :min_baseline
    ORDER BY pct_change DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: min_baseline
    type: integer
    description: Minimum thefts in previous year to filter noise
    required: false
    default: 5
  - name: limit
    type: integer
    description: Number of results
    required: false
    default: 100
  nl_examples:
  - Which Ottawa neighbourhoods saw the biggest increase in auto theft?
  - Where in Ottawa is auto theft surging?
  - Emerging Ottawa auto theft hotspots
  - Ottawa neighbourhoods getting worse for car theft
  - Where in Ottawa did vehicle theft spike this year?
  - What areas in Ottawa are seeing the fastest growth in stolen vehicles in 2024?
  - Which Ottawa communities went from low to high car theft?
  - Where should Ottawa Police focus new auto theft resources?
  - Are there any Ottawa neighbourhoods with a sudden jump in vehicle theft?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: auto_theft
    qualifiers: [hotspots, change, emerging]
  tags: [hotspots, trends, journalist, insight]

