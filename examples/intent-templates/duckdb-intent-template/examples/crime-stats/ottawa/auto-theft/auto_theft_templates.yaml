# =============================================================================
# THEFT TRENDS & STATISTICS - Overall crime patterns
# =============================================================================

- id: yearly_theft_trends
  description: Track year-over-year changes in auto theft incidents
  sql: |
    SELECT
      year,
      COUNT(*) AS total_thefts,
      COUNT(CASE WHEN recovered = 'Y' THEN 1 END) AS recovered_count,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct,
      ROUND(AVG(vehicle_value), 0) AS avg_vehicle_value
    FROM auto_theft
    GROUP BY year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - How has auto theft changed over the years in Ottawa?
  - Show me yearly Ottawa auto theft trends
  - What is the year-over-year Ottawa vehicle theft rate?
  - Is auto theft increasing or decreasing in Ottawa?
  - Track Ottawa vehicle theft over time
  - How many auto thefts were there in Ottawa in 2023 compared to previous years?
  - Is car theft getting worse in Ottawa?
  - Year-over-year comparison of stolen vehicles in Ottawa
  - How bad is the Ottawa auto theft problem historically?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, crime-stats]

- id: thefts_by_month
  description: Analyze monthly theft patterns to identify seasonal trends
  sql: |
    SELECT
      EXTRACT(MONTH FROM occurred_date) AS month,
      CASE EXTRACT(MONTH FROM occurred_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS theft_count,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct
    FROM auto_theft
    WHERE year = :year AND occurred_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occurred_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most auto thefts in Ottawa?
  - Show me seasonal patterns in Ottawa vehicle theft
  - When do most Ottawa car thefts happen?
  - Ottawa monthly auto theft breakdown
  - What are the peak months for vehicle theft in Ottawa?
  - Is car theft more common in summer or winter in Ottawa?
  - Ottawa monthly stolen vehicle counts for 2024
  - Are there seasonal spikes in Ottawa car theft?
  - Which month had the highest number of Ottawa auto thefts in 2023?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: auto_theft
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns, trends]

- id: thefts_by_time_of_day
  description: Analyze when thefts occur throughout the day
  sql: |
    SELECT
      time_of_day,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct
    FROM auto_theft
    WHERE year = :year AND time_of_day IS NOT NULL
    GROUP BY time_of_day
    ORDER BY theft_count DESC
  parameters:
