- id: specific_make_analysis
  description: Get detailed theft statistics for a specific vehicle make
  sql: |
    SELECT
      vehicle_model,
      COUNT(*) AS theft_count,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct,
      ROUND(AVG(vehicle_value), 0) AS avg_value
    FROM auto_theft
    WHERE vehicle_make ILIKE '%' || :vehicle_make || '%'
      AND year = :year
      AND vehicle_model IS NOT NULL
    GROUP BY vehicle_model
    ORDER BY theft_count DESC
  parameters:
