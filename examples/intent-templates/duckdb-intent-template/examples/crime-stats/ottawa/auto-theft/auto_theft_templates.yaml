- id: recovery_rate_by_vehicle_make
  description: Compare vehicle recovery rates by manufacturer
  sql: |
    SELECT
      vehicle_make,
      COUNT(*) AS total_stolen,
      COUNT(CASE WHEN recovered = 'Y' THEN 1 END) AS recovered_count,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct
    FROM auto_theft
    WHERE year = :year AND vehicle_make IS NOT NULL
    GROUP BY vehicle_make
    HAVING COUNT(*) >= :min_thefts
    ORDER BY recovery_rate_pct DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: min_thefts
    type: integer
    description: Minimum thefts to include
    required: false
    default: 20
