- id: total_value_stolen
  description: Calculate total value of stolen vehicles
  sql: |
    SELECT
      year,
      COUNT(*) AS total_thefts,
      COUNT(vehicle_value) AS with_value_reported,
      ROUND(SUM(vehicle_value), 0) AS total_value_stolen,
      ROUND(AVG(vehicle_value), 0) AS avg_value,
      MAX(vehicle_value) AS max_value
    FROM auto_theft
    WHERE vehicle_value IS NOT NULL AND vehicle_value > 0
    GROUP BY year
    ORDER BY year DESC
  parameters: []
