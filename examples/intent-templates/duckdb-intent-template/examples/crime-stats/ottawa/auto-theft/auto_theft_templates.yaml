- id: thefts_by_vehicle_age
  description: Analyze which vehicle ages are most targeted
  sql: |
    SELECT
      :year - vehicle_year AS vehicle_age,
      COUNT(*) AS theft_count,
      ROUND(COUNT(CASE WHEN recovered = 'Y' THEN 1 END) * 100.0 / COUNT(*), 1) AS recovery_rate_pct,
      ROUND(AVG(vehicle_value), 0) AS avg_value
    FROM auto_theft
    WHERE year = :year AND vehicle_year IS NOT NULL AND vehicle_year > 1980
    GROUP BY vehicle_age
    HAVING COUNT(*) >= 10
    ORDER BY theft_count DESC
    LIMIT 20
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
