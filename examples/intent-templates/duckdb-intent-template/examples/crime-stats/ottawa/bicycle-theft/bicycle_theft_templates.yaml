- id: bicycle_value_analysis
  description: Analyze the value distribution of stolen bicycles
  sql: |
    SELECT
      CASE
        WHEN bicycle_value IS NULL OR bicycle_value = 0 THEN 'Unknown/Not reported'
        WHEN bicycle_value < 200 THEN 'Under $200'
        WHEN bicycle_value < 500 THEN '$200-$499'
        WHEN bicycle_value < 1000 THEN '$500-$999'
        WHEN bicycle_value < 2000 THEN '$1,000-$1,999'
        WHEN bicycle_value < 5000 THEN '$2,000-$4,999'
        ELSE '$5,000+'
      END AS value_range,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM bicycle_theft
    WHERE year = :year AND status = 'Stolen'
    GROUP BY value_range
    ORDER BY MIN(bicycle_value)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
