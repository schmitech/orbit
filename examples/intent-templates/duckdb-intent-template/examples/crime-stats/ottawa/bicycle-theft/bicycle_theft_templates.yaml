  sql: |
    SELECT
      (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year) AS total_incidents,
      (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1) AS previous_year_total,
      ROUND(
        ((SELECT COUNT(*) FROM bicycle_theft WHERE year = :year) -
         (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1)) * 100.0
        / NULLIF((SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1), 0), 1
      ) AS yoy_change_pct,
      (SELECT neighbourhood FROM bicycle_theft WHERE year = :year AND neighbourhood IS NOT NULL GROUP BY neighbourhood ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood,
      (SELECT bicycle_type FROM bicycle_theft WHERE year = :year AND bicycle_type IS NOT NULL GROUP BY bicycle_type ORDER BY COUNT(*) DESC LIMIT 1) AS most_stolen_type,
      (SELECT TRIM(division) FROM bicycle_theft WHERE year = :year AND division IS NOT NULL GROUP BY TRIM(division) ORDER BY COUNT(*) DESC LIMIT 1) AS top_division,
      (SELECT ROUND(AVG(bicycle_value), 0) FROM bicycle_theft WHERE year = :year) AS avg_bicycle_value,
      (SELECT ROUND(COUNT(CASE WHEN status = 'Recovered' THEN 1 END) * 100.0 / NULLIF(COUNT(CASE WHEN status = 'Stolen' THEN 1 END), 0), 1) FROM bicycle_theft WHERE year = :year) AS recovery_rate_pct
  parameters:
  - name: year
    type: integer
    description: Year for snapshot
    required: false
    default: 2024
  nl_examples:
  - Give me a bicycle theft snapshot for Ottawa
  - Ottawa bike theft dashboard
  - Overall bike theft summary for Ottawa 2024
  - Quick overview of bicycle theft in Ottawa
  - How bad is bike theft in Ottawa right now?
  - Bicycle theft at a glance Ottawa
  - City-wide bike theft summary Ottawa
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [snapshot, dashboard]
  tags: [snapshot, dashboard, summary, bike-theft]

- id: bicycle_theft_neighbourhood_safety_trend
  description: Show year-over-year bicycle theft safety trend for a neighbourhood
  sql: |
    SELECT
      year,
      COUNT(*) AS theft_count,
      LAG(COUNT(*)) OVER (ORDER BY year) AS previous_year_count,
      COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year) AS change,
      ROUND(
        (COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year)) * 100.0
        / NULLIF(LAG(COUNT(*)) OVER (ORDER BY year), 0), 1
      ) AS change_pct
    FROM bicycle_theft
    WHERE neighbourhood ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Ottawa', ''), 'ottawa', '')) || '%'
    GROUP BY year
    ORDER BY year
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood to analyze (partial match supported)
    required: true
