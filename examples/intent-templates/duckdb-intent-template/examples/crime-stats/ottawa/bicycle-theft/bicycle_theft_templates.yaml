- id: neighbourhood_bicycle_theft_detail
  description: Get detailed bicycle theft statistics for a specific neighbourhood
  sql: |
    SELECT
      year,
      COUNT(*) AS total_incidents,
      COUNT(CASE WHEN status = 'Stolen' THEN 1 END) AS stolen,
      COUNT(CASE WHEN status = 'Recovered' THEN 1 END) AS recovered,
      ROUND(AVG(bicycle_value), 0) AS avg_value,
      COUNT(DISTINCT offence_category) AS offence_types
    FROM bicycle_theft
    WHERE neighbourhood ILIKE '%' || TRIM(REPLACE(REPLACE(:neighbourhood, 'Ottawa', ''), 'ottawa', '')) || '%'
    GROUP BY year
    ORDER BY year DESC
  parameters:
