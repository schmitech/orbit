# =============================================================================
# YEAR-OVER-YEAR COMPARISON
# =============================================================================

- id: bicycle_theft_yoy_comparison
  description: Compare bicycle theft between two consecutive years
  sql: |
    SELECT
      'Bicycle Theft' AS metric,
      (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1) AS previous_year,
      (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year) AS current_year,
      ROUND(
        ((SELECT COUNT(*) FROM bicycle_theft WHERE year = :year) -
         (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1)) * 100.0
        / NULLIF((SELECT COUNT(*) FROM bicycle_theft WHERE year = :year - 1), 0), 1
      ) AS change_pct,
      (SELECT COUNT(*) FROM bicycle_theft WHERE year = :year AND status = 'Stolen') AS current_stolen,
      (SELECT ROUND(AVG(bicycle_value), 0) FROM bicycle_theft WHERE year = :year) AS current_avg_value
  parameters:
  - name: year
    type: integer
    description: Year to compare (will compare against previous year)
    required: false
    default: 2024
  nl_examples:
  - Compare bike theft this year to last year in Ottawa
  - Year-over-year change in bicycle theft Ottawa
  - Is bicycle theft up or down compared to last year in Ottawa?
  - How does 2024 bike theft compare to 2023 in Ottawa?
  - Bicycle theft change from 2023 to 2024 Ottawa
  - Did bike theft increase in Ottawa this year?
  - Year-over-year bicycle theft comparison Ottawa
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [yoy, comparison]
  tags: [yoy, comparison, trends, bike-theft]

- id: bicycle_theft_yoy_by_neighbourhood
  description: Compare bicycle theft by neighbourhood between two consecutive years
  sql: |
    WITH current AS (
      SELECT neighbourhood, COUNT(*) AS current_count
      FROM bicycle_theft
      WHERE year = :year AND neighbourhood IS NOT NULL
      GROUP BY neighbourhood
    ),
    previous AS (
      SELECT neighbourhood, COUNT(*) AS previous_count
      FROM bicycle_theft
      WHERE year = :year - 1 AND neighbourhood IS NOT NULL
      GROUP BY neighbourhood
    )
    SELECT
      COALESCE(c.neighbourhood, p.neighbourhood) AS neighbourhood,
      COALESCE(p.previous_count, 0) AS previous_year,
      COALESCE(c.current_count, 0) AS current_year,
      COALESCE(c.current_count, 0) - COALESCE(p.previous_count, 0) AS change,
      ROUND(
        (COALESCE(c.current_count, 0) - COALESCE(p.previous_count, 0)) * 100.0
        / NULLIF(COALESCE(p.previous_count, 0), 0), 1
      ) AS change_pct
    FROM current c
    FULL OUTER JOIN previous p ON c.neighbourhood = p.neighbourhood
    ORDER BY COALESCE(c.current_count, 0) DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to compare (compares against previous year)
    required: false
    default: 2024
  - name: limit
    type: integer
    description: Number of neighbourhoods to return
    required: false
    default: 20
  nl_examples:
  - Which neighbourhoods saw the biggest increase in bike theft in Ottawa?
  - Emerging bicycle theft hotspots in Ottawa
  - Where is bike theft getting worse in Ottawa?
  - Neighbourhood bike theft changes year over year Ottawa
  - Which areas improved for bicycle theft in Ottawa?
  - Are new areas seeing more bike theft in Ottawa?
  - Bicycle theft emerging hotspots by neighbourhood Ottawa
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [neighbourhood, yoy, hotspots]
  tags: [neighbourhood, yoy, hotspots, emerging, bike-theft]

