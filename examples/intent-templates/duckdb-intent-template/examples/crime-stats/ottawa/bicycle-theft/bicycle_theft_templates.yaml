# POLICY & STRATEGIC ANALYTICS
# =============================================================================

- id: bicycle_theft_concentration
  description: Analyze whether bicycle theft is concentrated in a few locations (Pareto analysis)
  sql: |
    WITH neighbourhood_counts AS (
      SELECT
        neighbourhood,
        COUNT(*) AS theft_count,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM bicycle_theft
      WHERE year = :year AND neighbourhood IS NOT NULL
      GROUP BY neighbourhood
    ),
    totals AS (
      SELECT COUNT(*) AS total_neighbourhoods, SUM(theft_count) AS total_thefts
      FROM neighbourhood_counts
    )
    SELECT
      CASE
        WHEN rank <= CEIL(total_neighbourhoods * 0.05) THEN 'Top 5%'
        WHEN rank <= CEIL(total_neighbourhoods * 0.10) THEN 'Top 6-10%'
        WHEN rank <= CEIL(total_neighbourhoods * 0.20) THEN 'Top 11-20%'
        ELSE 'Remaining 80%'
      END AS tier,
      COUNT(*) AS neighbourhoods_in_tier,
      SUM(theft_count) AS total_thefts,
      ROUND(SUM(theft_count) * 100.0 / MAX(t.total_thefts), 1) AS pct_of_all_thefts
    FROM neighbourhood_counts nc
    CROSS JOIN totals t
    GROUP BY tier
    ORDER BY MIN(rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Is bicycle theft concentrated in a few areas in Ottawa?
  - Do a small number of neighbourhoods account for most bike thefts in Ottawa?
  - Pareto analysis of bicycle theft hotspots Ottawa
  - Bike theft concentration analysis Ottawa
  - Does the 80/20 rule apply to bicycle theft in Ottawa?
  - Are most bike thefts happening in the same few places in Ottawa?
  - Bicycle theft geographic concentration Ottawa
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [concentration, pareto, policy]
  tags: [concentration, pareto, policy, strategic, bike-theft]

- id: bicycle_theft_type_seasonality
  description: Analyze which bicycle types are stolen in which seasons
  sql: |
    SELECT
      bicycle_type,
      SUM(CASE WHEN EXTRACT(MONTH FROM occurred_date) IN (12, 1, 2) THEN 1 ELSE 0 END) AS winter,
      SUM(CASE WHEN EXTRACT(MONTH FROM occurred_date) IN (3, 4, 5) THEN 1 ELSE 0 END) AS spring,
      SUM(CASE WHEN EXTRACT(MONTH FROM occurred_date) IN (6, 7, 8) THEN 1 ELSE 0 END) AS summer,
      SUM(CASE WHEN EXTRACT(MONTH FROM occurred_date) IN (9, 10, 11) THEN 1 ELSE 0 END) AS fall,
      COUNT(*) AS total
    FROM bicycle_theft
    WHERE year = :year
      AND bicycle_type IS NOT NULL
      AND occurred_date IS NOT NULL
    GROUP BY bicycle_type
    HAVING COUNT(*) >= 5
    ORDER BY total DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which bike types are stolen most in summer vs winter in Ottawa?
  - Seasonal patterns of bicycle theft by type in Ottawa
  - Are mountain bikes stolen more in spring in Ottawa?
  - Bicycle theft seasonality by type Ottawa
  - When are different types of bikes stolen in Ottawa?
  - Do theft patterns differ by bike type across seasons in Ottawa?
  - Seasonal bicycle theft breakdown by type Ottawa
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [seasonality, type, policy]
  tags: [seasonality, type, policy, strategic, bike-theft]

- id: bicycle_theft_persistent_hotspots
  description: Identify neighbourhoods consistently in the top 20 for bicycle theft across years
  sql: |
    WITH yearly_ranks AS (
      SELECT
        neighbourhood,
        year,
        COUNT(*) AS theft_count,
        RANK() OVER (PARTITION BY year ORDER BY COUNT(*) DESC) AS year_rank
      FROM bicycle_theft
      WHERE neighbourhood IS NOT NULL
      GROUP BY neighbourhood, year
    )
    SELECT
      neighbourhood,
      COUNT(DISTINCT year) AS years_in_top_20,
      SUM(theft_count) AS total_thefts,
      ROUND(AVG(year_rank), 1) AS avg_rank,
      MIN(year_rank) AS best_rank,
      MAX(year_rank) AS worst_rank
    FROM yearly_ranks
    WHERE year_rank <= 20
    GROUP BY neighbourhood
    HAVING COUNT(DISTINCT year) >= 2
    ORDER BY years_in_top_20 DESC, total_thefts DESC
  parameters: []
  nl_examples:
  - Which areas are consistently bad for bike theft in Ottawa?
  - Persistent bicycle theft hotspots in Ottawa
  - What neighbourhoods always have high bike theft in Ottawa?
  - Chronic bicycle theft problem areas in Ottawa
  - Which Ottawa neighbourhoods are repeatedly in the top for bike theft?
  - Long-term bike theft hotspots Ottawa
  - Are the same areas always worst for bicycle theft in Ottawa?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: bicycle_theft
    qualifiers: [persistent, hotspots, policy]
  tags: [persistent, hotspots, policy, strategic, bike-theft]

- id: bicycle_theft_weekend_vs_weekday
  description: Compare weekend vs weekday bicycle theft patterns
  sql: |
    WITH daily AS (
      SELECT
        weekday,
        CASE WHEN weekday IN ('Saturday', 'Sunday') THEN 'Weekend' ELSE 'Weekday' END AS day_type,
        COUNT(*) AS theft_count
      FROM bicycle_theft
      WHERE year = :year AND weekday IS NOT NULL
      GROUP BY weekday
    )
    SELECT
      day_type,
      SUM(theft_count) AS total_thefts,
      ROUND(SUM(theft_count) * 1.0 /
        CASE day_type WHEN 'Weekend' THEN 2 ELSE 5 END, 1) AS avg_per_day,
      ROUND(SUM(theft_count) * 100.0 / (SELECT SUM(theft_count) FROM daily), 1) AS percentage
    FROM daily
    GROUP BY day_type
    ORDER BY avg_per_day DESC
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Are bikes stolen more on weekends or weekdays in Ottawa?
  - Weekend vs weekday bicycle theft in Ottawa
  - Do more bike thefts happen on weekends in Ottawa?
  - Bicycle theft weekend vs weekday comparison Ottawa
  - Is my bike safer on weekends or weekdays in Ottawa?
  - Weekday vs weekend bike theft rate Ottawa
  - When are bikes more at risk weekday or weekend Ottawa?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [weekend, weekday, patterns]
  tags: [weekend, weekday, patterns, policy, bike-theft]

- id: bicycle_theft_fastest_growing_neighbourhoods
  description: Identify neighbourhoods with the fastest growth in bicycle theft
  sql: |
    WITH yearly AS (
      SELECT
        neighbourhood,
        SUM(CASE WHEN year = :year - 1 THEN 1 ELSE 0 END) AS previous_count,
        SUM(CASE WHEN year = :year THEN 1 ELSE 0 END) AS current_count
      FROM bicycle_theft
      WHERE neighbourhood IS NOT NULL
        AND year IN (:year - 1, :year)
      GROUP BY neighbourhood
      HAVING SUM(CASE WHEN year = :year - 1 THEN 1 ELSE 0 END) >= 5
    )
    SELECT
      neighbourhood,
      previous_count,
      current_count,
      current_count - previous_count AS change,
      ROUND((current_count - previous_count) * 100.0 / previous_count, 1) AS growth_pct
    FROM yearly
    WHERE current_count > previous_count
    ORDER BY growth_pct DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to compare (compares against previous year)
    required: false
    default: 2024
  - name: limit
    type: integer
    description: Number of results to return
    required: false
    default: 15
  nl_examples:
  - Which areas are seeing the biggest surge in bike theft in Ottawa?
  - Fastest growing bicycle theft neighbourhoods Ottawa
  - Where is bike theft increasing the most in Ottawa?
  - Emerging bicycle theft hotspots in Ottawa 2024
  - Which Ottawa neighbourhoods are getting worse for bike theft?
  - Biggest increases in bicycle theft by neighbourhood Ottawa
  - Where is bike theft surging in Ottawa?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: bicycle_theft
    qualifiers: [growth, emerging, hotspots]
  tags: [growth, emerging, hotspots, policy, bike-theft]
