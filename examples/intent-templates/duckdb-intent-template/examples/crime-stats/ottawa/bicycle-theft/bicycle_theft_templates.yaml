  - Are expensive bikes stolen more often in Ottawa?
  - How much are stolen bicycles worth in Ottawa?
  - Value breakdown of stolen bikes Ottawa
  - What price range of bicycles are stolen most in Ottawa?
  - Do thieves target expensive bikes in Ottawa?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [value, distribution]
  tags: [value, distribution, analysis, bike-theft]

- id: bicycle_theft_hourly
  description: Analyze bicycle theft by hour of occurrence
  sql: |
    SELECT
      occurred_hour AS hour,
      CASE
        WHEN occurred_hour BETWEEN 0 AND 559 THEN 'Late Night (12am-6am)'
        WHEN occurred_hour BETWEEN 600 AND 1159 THEN 'Morning (6am-12pm)'
        WHEN occurred_hour BETWEEN 1200 AND 1759 THEN 'Afternoon (12pm-6pm)'
        ELSE 'Evening (6pm-12am)'
      END AS time_period,
      COUNT(*) AS theft_count
    FROM bicycle_theft
    WHERE year = :year AND occurred_hour IS NOT NULL
    GROUP BY occurred_hour
    ORDER BY occurred_hour
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
