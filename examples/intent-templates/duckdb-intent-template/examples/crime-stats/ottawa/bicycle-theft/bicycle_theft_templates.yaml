- id: top_stolen_bicycle_brands
  description: Rank the most commonly stolen bicycle brands
  sql: |
    SELECT
      TRIM(bicycle_make) AS brand,
      COUNT(*) AS theft_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage,
      ROUND(AVG(bicycle_value), 0) AS avg_value
    FROM bicycle_theft
    WHERE year = :year
      AND bicycle_make IS NOT NULL
      AND TRIM(bicycle_make) != ''
      AND status = 'Stolen'
    GROUP BY TRIM(bicycle_make)
    ORDER BY theft_count DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: limit
    type: integer
    description: Number of brands to return
    required: false
