- id: yearly_bicycle_theft_trends
  description: Track year-over-year changes in bicycle theft incidents
  sql: |
    SELECT
      year,
      COUNT(*) AS total_incidents,
      COUNT(CASE WHEN status = 'Stolen' THEN 1 END) AS stolen_count,
      COUNT(CASE WHEN status = 'Recovered' THEN 1 END) AS recovered_count,
      ROUND(COUNT(CASE WHEN status = 'Recovered' THEN 1 END) * 100.0 / NULLIF(COUNT(CASE WHEN status = 'Stolen' THEN 1 END), 0), 1) AS recovery_rate_pct,
      ROUND(AVG(bicycle_value), 0) AS avg_bicycle_value
    FROM bicycle_theft
    GROUP BY year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - How has bicycle theft changed over the years in Ottawa?
  - Show me yearly bike theft trends in Ottawa
  - Is bicycle theft increasing or decreasing in Ottawa?
  - Year-over-year comparison of stolen bicycles in Ottawa
  - How many bike thefts were there each year?
  - Is bike theft getting worse in Ottawa?
  - Ottawa bicycle theft rate over time
  - Annual bicycle theft statistics Ottawa
  - Track bike theft trends across years in Ottawa
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, bike-theft]

- id: bicycle_theft_by_month
  description: Analyze monthly bicycle theft patterns to identify seasonal trends
  sql: |
    SELECT
      EXTRACT(MONTH FROM occurred_date) AS month,
      CASE EXTRACT(MONTH FROM occurred_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS theft_count,
      ROUND(AVG(bicycle_value), 0) AS avg_value
    FROM bicycle_theft
    WHERE year = :year AND occurred_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occurred_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most bike thefts in Ottawa?
  - Show me seasonal patterns in bicycle theft in Ottawa
  - When do most bicycle thefts happen in Ottawa?
  - Monthly bike theft breakdown Ottawa
  - Peak months for bicycle theft in Ottawa
  - Is bike theft more common in summer or winter in Ottawa?
  - Monthly stolen bicycle counts for 2024
  - Are there seasonal spikes in bike theft in Ottawa?
  - Which month had the highest number of bicycle thefts in 2023?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: bicycle_theft
    qualifiers: [monthly, seasonal]
  tags: [monthly, seasonal, trends, bike-theft]

