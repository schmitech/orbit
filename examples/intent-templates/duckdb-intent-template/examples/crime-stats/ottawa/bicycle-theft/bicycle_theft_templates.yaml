  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: bicycle_theft
    qualifiers: [neighbourhood, safety, trend]
  tags: [neighbourhood, safety, trend, bike-theft]

