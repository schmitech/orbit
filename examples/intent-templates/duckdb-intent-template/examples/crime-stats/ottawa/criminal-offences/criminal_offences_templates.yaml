    primary_entity: criminal_offences
    qualifiers: [concentration, equity]
  tags: [concentration, policy, researcher, insight]

- id: seasonal_deviation
  description: Compare recent months to their historical average to spot anomalies
  sql: |
    WITH monthly_avg AS (
      SELECT
        month,
        ROUND(AVG(cnt), 1) AS historical_avg
      FROM (
        SELECT EXTRACT(MONTH FROM occurred_date) AS month, year, COUNT(*) AS cnt
        FROM criminal_offences
        WHERE occurred_date IS NOT NULL AND year < :year
        GROUP BY month, year
      )
      GROUP BY month
    ),
    current AS (
      SELECT
        EXTRACT(MONTH FROM occurred_date) AS month,
        COUNT(*) AS current_count
      FROM criminal_offences
      WHERE year = :year AND occurred_date IS NOT NULL
      GROUP BY EXTRACT(MONTH FROM occurred_date)
    )
    SELECT
      c.month,
      CASE c.month
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      c.current_count,
      a.historical_avg,
      c.current_count - a.historical_avg AS deviation,
      ROUND((c.current_count - a.historical_avg) * 100.0 / NULLIF(a.historical_avg, 0), 1) AS deviation_pct
    FROM current c
    JOIN monthly_avg a ON c.month = a.month
    ORDER BY ABS(c.current_count - a.historical_avg) DESC
  parameters:
  - name: year
    type: integer
    description: Year to compare against historical average
    required: false
    default: 2024
  nl_examples:
  - Which Ottawa months were unusual for crime this year?
  - Is this month above or below average for criminal offences in Ottawa?
  - Ottawa seasonal anomalies in crime
  - Months that deviate from the historical Ottawa crime pattern
  - Unusual Ottawa crime patterns this year
  - Were any months in 2024 significantly above the historical average for Ottawa offences?
  - Which Ottawa months had abnormal crime levels compared to past years?
  - How does each month in 2023 compare to the long-term Ottawa crime average?
  - Are there any outlier months for Ottawa criminal offences this year?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: criminal_offences
    qualifiers: [seasonal, anomaly]
  tags: [seasonal, anomaly, researcher, insight]

- id: crime_composition_shift
  description: How the mix of crime types has changed over time
  sql: |
    WITH totals AS (
      SELECT year, COUNT(*) AS year_total
      FROM criminal_offences
      GROUP BY year
    ),
    by_type AS (
      SELECT
        c.year,
        c.offence_summary,
        COUNT(*) AS offences,
        ROUND(COUNT(*) * 100.0 / t.year_total, 1) AS pct_of_total
      FROM criminal_offences c
      JOIN totals t ON c.year = t.year
      WHERE c.offence_summary IS NOT NULL
      GROUP BY c.year, c.offence_summary, t.year_total
    )
    SELECT year, offence_summary, offences, pct_of_total
    FROM by_type
    ORDER BY offence_summary, year DESC
