- id: emerging_hotspots
  description: Neighbourhoods with the biggest year-over-year increase in criminal offences
  sql: |
    WITH yearly AS (
      SELECT neighbourhood, year, COUNT(*) AS offences
      FROM criminal_offences
      WHERE neighbourhood IS NOT NULL
      GROUP BY neighbourhood, year
    ),
    yoy AS (
      SELECT
        c.neighbourhood,
        c.year,
        c.offences AS current_offences,
        p.offences AS previous_offences,
        c.offences - p.offences AS absolute_change,
        ROUND((c.offences - p.offences) * 100.0 / NULLIF(p.offences, 0), 1) AS pct_change
      FROM yearly c
      JOIN yearly p ON c.neighbourhood = p.neighbourhood AND c.year = p.year + 1
    )
    SELECT neighbourhood, current_offences, previous_offences, absolute_change, pct_change
    FROM yoy
    WHERE year = :year AND previous_offences >= :min_baseline
    ORDER BY pct_change DESC
    LIMIT :limit
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  - name: min_baseline
    type: integer
    description: Minimum offences in previous year to filter noise
    required: false
    default: 20
  - name: limit
    type: integer
    description: Number of results
    required: false
    default: 100
  nl_examples:
  - Which Ottawa neighbourhoods saw the biggest increase in crime?
  - Where is Ottawa crime surging?
  - Emerging Ottawa crime hotspots
  - Ottawa neighbourhoods getting worse for crime
  - Where did Ottawa criminal offences spike this year?
  - What Ottawa areas had the biggest jump in offences in 2024?
  - Which Ottawa communities are seeing crime spikes?
  - Ottawa neighbourhoods with rising crime rates compared to last year
  - Where is crime growing the fastest in Ottawa?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: find
    primary_entity: criminal_offences
    qualifiers: [hotspots, change, emerging]
  tags: [hotspots, trends, journalist, insight]

