- id: crime_concentration
  description: How concentrated is crime — what percentage happens in the top neighbourhoods
  sql: |
    WITH ranked AS (
      SELECT
        neighbourhood,
        COUNT(*) AS offences,
        SUM(COUNT(*)) OVER () AS total,
        ROW_NUMBER() OVER (ORDER BY COUNT(*) DESC) AS rank
      FROM criminal_offences
      WHERE year = :year AND neighbourhood IS NOT NULL
      GROUP BY neighbourhood
    )
    SELECT
      CASE
        WHEN rank <= 5 THEN 'Top 5 neighbourhoods'
        WHEN rank <= 10 THEN 'Top 6-10'
        WHEN rank <= 20 THEN 'Top 11-20'
        ELSE 'All others'
      END AS tier,
      SUM(offences) AS offences,
      ROUND(SUM(offences) * 100.0 / MAX(total), 1) AS pct_of_total,
      COUNT(*) AS neighbourhood_count
    FROM ranked
    GROUP BY CASE
      WHEN rank <= 5 THEN 'Top 5 neighbourhoods'
      WHEN rank <= 10 THEN 'Top 6-10'
      WHEN rank <= 20 THEN 'Top 11-20'
      ELSE 'All others'
    END
    ORDER BY MIN(rank)
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - How concentrated is crime across Ottawa neighbourhoods?
  - Do a few Ottawa areas account for most crime?
  - Ottawa crime concentration analysis
  - What percentage of Ottawa crime happens in the top areas?
  - Is Ottawa crime spread evenly or concentrated?
  - What share of Ottawa offences come from the top 5 neighbourhoods in 2024?
  - How much Ottawa crime do the worst areas account for?
  - Is Ottawa crime concentrated in just a few places?
  - Equity analysis of crime distribution across Ottawa neighbourhoods
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
