- id: neighbourhood_safety_snapshot
  description: Safety overview for a specific neighbourhood — total offences, YoY change, top crimes, and city-wide rank
  sql: |
    WITH neighbourhood_stats AS (
      SELECT
        neighbourhood,
        COUNT(*) AS total_offences,
        RANK() OVER (ORDER BY COUNT(*) DESC) AS city_rank
      FROM criminal_offences
      WHERE year = :year AND neighbourhood IS NOT NULL
      GROUP BY neighbourhood
    ),
    previous AS (
      SELECT COUNT(*) AS prev_offences
      FROM criminal_offences
      WHERE neighbourhood ILIKE '%' || :neighbourhood || '%'
        AND year = :year - 1
    ),
    top_crimes AS (
      SELECT offence_category, COUNT(*) AS cnt
      FROM criminal_offences
      WHERE neighbourhood ILIKE '%' || :neighbourhood || '%'
        AND year = :year AND offence_category IS NOT NULL
      GROUP BY offence_category
      ORDER BY cnt DESC
      LIMIT 5
    )
    SELECT
      ns.neighbourhood,
      ns.total_offences,
      ns.city_rank || ' of ' || (SELECT COUNT(*) FROM neighbourhood_stats) AS rank_among_neighbourhoods,
      p.prev_offences AS previous_year_offences,
      ns.total_offences - p.prev_offences AS change,
      ROUND((ns.total_offences - p.prev_offences) * 100.0 / NULLIF(p.prev_offences, 0), 1) AS change_pct,
      (SELECT STRING_AGG(offence_category || ' (' || cnt || ')', ', ' ORDER BY cnt DESC) FROM top_crimes) AS top_offence_types
    FROM neighbourhood_stats ns
    CROSS JOIN previous p
    WHERE ns.neighbourhood ILIKE '%' || :neighbourhood || '%'
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood name (partial match)
    required: true
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - How safe is the Byward Market in Ottawa based on criminal offences?
  - Is Centretown Ottawa safe from crime?
  - How dangerous is Vanier Ottawa for criminal offences?
  - Safety of Ottawa Barrhaven based on crime data
  - How is crime in Orleans Ottawa?
  - Is Kanata an Ottawa safe neighbourhood for criminal offences?
  - Give me an Ottawa crime safety snapshot for Sandy Hill in 2024
  - How does Ottawa Westboro rank for crime among all neighbourhoods?
  - Should I be worried about Ottawa crime in Gloucester?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: criminal_offences
    qualifiers: [neighbourhood, safety, snapshot]
  tags: [neighbourhood, safety, snapshot, public, insight]

- id: neighbourhood_safety_trend
  description: Is a specific neighbourhood getting safer or more dangerous over time
  sql: |
    SELECT
      year,
      COUNT(*) AS offences,
      COUNT(DISTINCT offence_category) AS offence_types,
      COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year) AS change_from_prior,
      ROUND((COUNT(*) - LAG(COUNT(*)) OVER (ORDER BY year)) * 100.0 /
        NULLIF(LAG(COUNT(*)) OVER (ORDER BY year), 0), 1) AS pct_change
    FROM criminal_offences
    WHERE neighbourhood ILIKE '%' || :neighbourhood || '%'
    GROUP BY year
    ORDER BY year DESC
