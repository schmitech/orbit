  tags: [neighbourhood, offence-type, specific, detail]

- id: year_over_year_comparison
  description: Compare crime statistics between two years
  sql: |
    SELECT
      :current_year AS current_year,
      :previous_year AS previous_year,
      (SELECT COUNT(*) FROM criminal_offences WHERE year = :current_year) AS current_offences,
      (SELECT COUNT(*) FROM criminal_offences WHERE year = :previous_year) AS previous_offences,
      ROUND(((SELECT COUNT(*) FROM criminal_offences WHERE year = :current_year) -
             (SELECT COUNT(*) FROM criminal_offences WHERE year = :previous_year)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM criminal_offences WHERE year = :previous_year), 0), 1) AS change_pct
  parameters:
  - name: current_year
    type: integer
    description: Current year to compare
    required: false
    default: 2024
  - name: previous_year
    type: integer
    description: Previous year to compare
    required: false
    default: 2023
  nl_examples:
  - Compare 2024 to 2023 Ottawa crime rates
  - Year over year change in Ottawa crime
  - How much has Ottawa crime increased?
  - Compare this Ottawa year to last year for criminal offences
  - Ottawa crime trend comparison
  - What is the percentage change in Ottawa crime from 2022 to 2023?
  - Did Ottawa crime go up or down between 2023 and 2024?
  - How does Ottawa 2024 stack up against 2023 for total offences?
  - Is Ottawa crime getting worse compared to last year?
  result_format: summary
  version: 1.0.0
  approved: true
  semantic_tags:
    action: compare
    primary_entity: criminal_offences
    qualifiers: [yearly, change]
  tags: [comparison, yearly, trend]

