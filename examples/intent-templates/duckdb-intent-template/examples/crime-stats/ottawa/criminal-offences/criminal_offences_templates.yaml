- id: offence_in_neighbourhood
  description: Year-by-year counts of a specific offence type in a specific neighbourhood
  sql: |
    WITH params AS (
      SELECT
        TRIM(REGEXP_REPLACE(
          REGEXP_REPLACE(LOWER(:neighbourhood), '\b(ontario|ottawa|area|the|neighbourhood|city)\b', '', 'g'),
          '\s+', ' ', 'g'
        )) AS clean_neighbourhood,
        SPLIT_PART(TRIM(REPLACE(:offence_category, '-', ' ')), ' ', 1) AS clean_offence
    )
    SELECT
      year,
      COUNT(*) AS offence_count
    FROM criminal_offences, params
    WHERE neighbourhood ILIKE '%' || clean_neighbourhood || '%'
      AND (offence_category ILIKE '%' || clean_offence || '%'
           OR offence_summary ILIKE '%' || clean_offence || '%')
    GROUP BY year
    ORDER BY year DESC
  parameters:
  - name: neighbourhood
    type: string
    description: Neighbourhood name (partial, case-insensitive match)
    required: true
  - name: offence_category
    type: string
    description: Offence category or type (e.g., break and enter, theft, assault, fraud)
    required: true
  nl_examples:
  - How many break-ins in Greely Ottawa?
  - Break-ins in Greely Ontario area
  - Ottawa break and enter count for Barrhaven
  - Ottawa theft in Vanier by year
  - Assaults in Ottawa Centretown over time
  - How often does fraud happen in Orleans Ottawa?
  - Yearly B&E numbers for Hintonburg Ottawa
