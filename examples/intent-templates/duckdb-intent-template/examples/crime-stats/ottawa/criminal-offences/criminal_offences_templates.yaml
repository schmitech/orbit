- id: city_snapshot
  description: Quick city-wide pulse — total offences, trend direction, top concern, top area
  sql: |
    SELECT
      :year AS year,
      (SELECT COUNT(*) FROM criminal_offences WHERE year = :year) AS total_offences,
      (SELECT COUNT(*) FROM criminal_offences WHERE year = :year - 1) AS previous_year_offences,
      ROUND(((SELECT COUNT(*) FROM criminal_offences WHERE year = :year) -
             (SELECT COUNT(*) FROM criminal_offences WHERE year = :year - 1)) * 100.0 /
            NULLIF((SELECT COUNT(*) FROM criminal_offences WHERE year = :year - 1), 0), 1) AS yoy_change_pct,
      (SELECT offence_category FROM criminal_offences WHERE year = :year AND offence_category IS NOT NULL
       GROUP BY offence_category ORDER BY COUNT(*) DESC LIMIT 1) AS top_offence_type,
      (SELECT neighbourhood FROM criminal_offences WHERE year = :year AND neighbourhood IS NOT NULL
       GROUP BY neighbourhood ORDER BY COUNT(*) DESC LIMIT 1) AS top_neighbourhood
  parameters:
