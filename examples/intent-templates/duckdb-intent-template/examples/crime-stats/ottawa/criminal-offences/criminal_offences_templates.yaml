- id: yearly_crime_trends
  description: Track year-over-year changes in criminal offences
  sql: |
    SELECT
      year,
      COUNT(*) AS total_offences,
      COUNT(DISTINCT offence_category) AS unique_categories,
      COUNT(DISTINCT neighbourhood) AS affected_neighbourhoods
    FROM criminal_offences
    GROUP BY year
    ORDER BY year DESC
  parameters: []
  nl_examples:
  - How has crime changed over the years in Ottawa?
  - Show me yearly Ottawa crime trends
  - What is the year-over-year Ottawa crime rate?
  - Is crime increasing or decreasing in Ottawa?
  - Track Ottawa criminal offences over time
  - Year-over-year comparison of total criminal offences in Ottawa
  - How bad was Ottawa crime in 2023 compared to previous years?
  - Are things getting worse in Ottawa crime-wise?
  - What does the long-term Ottawa crime trend look like?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: criminal_offences
    qualifiers: [trends, yearly]
  tags: [trends, yearly, strategic, crime-stats]

- id: offences_by_month
  description: Analyze monthly crime patterns to identify seasonal trends
  sql: |
    SELECT
      EXTRACT(MONTH FROM occurred_date) AS month,
      CASE EXTRACT(MONTH FROM occurred_date)
        WHEN 1 THEN 'January' WHEN 2 THEN 'February' WHEN 3 THEN 'March'
        WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN 6 THEN 'June'
        WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN 'September'
        WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN 'December'
      END AS month_name,
      COUNT(*) AS offence_count
    FROM criminal_offences
    WHERE year = :year AND occurred_date IS NOT NULL
    GROUP BY EXTRACT(MONTH FROM occurred_date)
    ORDER BY month
  parameters:
  - name: year
    type: integer
    description: Year to analyze
    required: false
    default: 2024
  nl_examples:
  - Which months have the most crime in Ottawa?
  - Show me seasonal patterns in Ottawa criminal offences
  - When do most Ottawa crimes happen?
  - Ottawa monthly crime breakdown
  - What are the peak Ottawa months for crime?
  - Does crime go up in the summer months in Ottawa?
  - Ottawa monthly offence counts for 2023
  - Is there a seasonal pattern to crime in Ottawa in 2024?
  - Which month had the fewest Ottawa criminal offences?
  result_format: table
  version: 1.0.0
  approved: true
  semantic_tags:
    action: calculate
    primary_entity: criminal_offences
    qualifiers: [seasonal, monthly]
  tags: [seasonal, monthly, patterns, trends]

- id: offences_by_time_of_day
  description: Analyze when offences occur throughout the day
  sql: |
    SELECT
      time_of_day,
      COUNT(*) AS offence_count,
      ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) AS percentage
    FROM criminal_offences
    WHERE year = :year AND time_of_day IS NOT NULL
